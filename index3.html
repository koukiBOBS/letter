<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閱讀交流與書房 - 沉浸式 3D 手寫信箋</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- GSAP & Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #e8eae6; /* 莫蘭迪灰綠底色 */
            --paper: #ffffff; 
            --text: #2c3e50; 
            --text-muted: #8391a2; 
            --border: #e6e1d6;
            --font-serif: 'Noto Serif TC', serif; 
            --font-sans: 'Inter', sans-serif;
            --color-replies: #548ca8; 
            --color-inbox: #d98a6c; 
            --color-tasks: #6b8e73; 
            --color-log: #8b7355;
            
            --letter-paper: #fbf9f4;
            --letter-ink: #4a4238;
            --letter-line: rgba(160, 140, 120, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-sans); overflow: hidden; touch-action: none; }
        h1, h2, h3, h4, .serif-text { font-family: var(--font-serif); }

        /* 3D Canvas */
        #canvas-container { position: absolute; inset: 0; z-index: 1; }

        /* Notification Banner */
        #notification-banner { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--paper); border: 1px solid var(--border); padding: 16px 32px; border-radius: 30px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); z-index: 10001; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 0.95rem; font-weight: 600; opacity: 0; width: 90%; max-width: 400px; justify-content: center;}
        
        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: rgba(232, 234, 230, 0.85); backdrop-filter: blur(10px); z-index: 10000; display: flex; }
        .auth-hero { flex: 1.2; position: relative; z-index: 2; pointer-events: none; display: flex; flex-direction: column; justify-content: center; padding: 8%; }
        .auth-hero h1 { font-size: 3.5rem; color: #2c3e50; line-height: 1.3; margin-bottom: 24px; letter-spacing: 2px; font-weight: 600; font-family: var(--font-serif); text-shadow: 0 4px 15px rgba(255,255,255,0.8);}
        .auth-hero p { font-size: 1.15rem; color: #505d6b; line-height: 1.8; max-width: 450px; font-weight: 500;}
        .auth-sidebar { width: 480px; position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; padding: 60px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); border-left: 1px solid rgba(255,255,255,0.8); box-shadow: -10px 0 30px rgba(0,0,0,0.03);}
        .auth-panel-content { display: flex; flex-direction: column; gap: 30px; }
        .auth-sidebar h2 { font-size: 1.8rem; font-weight: 600; color: #1e293b; margin-bottom: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-box { width: 100%; background: #ffffff; border: 1px solid #cbd5e1; padding: 16px; font-family: var(--font-sans); font-size: 1rem; color: var(--text); border-radius: 8px; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--color-tasks); box-shadow: 0 0 0 3px rgba(107, 142, 115, 0.1); }
        .btn { background: #1e293b; color: #fff; border: none; padding: 16px 24px; font-size: 1.05rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { background: #334155; transform: translateY(-2px); }
        .btn-google { background: #ffffff; color: #334155; border: 1px solid #e2e8f0; width: 100%;}

        /* HUD Header */
        header { position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none;}
        .user-info { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 10px;}
        .user-info a { color: #ef4444; cursor: pointer; padding: 4px 10px; border-radius: 15px; background: rgba(239, 68, 68, 0.1); font-size: 0.85rem;}

        /* Modals for 2D UI overlaying 3D scene */
        .ui-modal-overlay { position: fixed; inset: 0; background: rgba(232, 234, 230, 0.85); backdrop-filter: blur(15px); z-index: 1000; display: none; overflow-y: auto; padding: 60px 20px; }
        .ui-modal-container { background: var(--paper); max-width: 900px; margin: 0 auto; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); position: relative; animation: fadeUpIn 0.4s ease-out; }
        .ui-modal-close { position: absolute; top: 20px; right: 25px; font-size: 2rem; background: none; border: none; color: #a0aec0; cursor: pointer; transition: 0.2s; }
        .ui-modal-close:hover { color: #1e293b; transform: scale(1.1); }
        .ui-title { font-family: var(--font-serif); font-size: 1.8rem; margin-bottom: 25px; color: #2c3e50; border-bottom: 2px solid var(--border); padding-bottom: 10px;}

        /* Re-used 2D components */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .task-card { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); }
        .task-card.completed { border-color: var(--color-tasks); background: #f4f9f5; }
        .task-card.locked { opacity: 0.6; cursor: not-allowed; border-style: dashed; }
        .task-num { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; display: block; color: #1e293b; }
        .task-date { font-size: 0.8rem; color: var(--text-muted); }
        .list-container { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .list-item { display: flex; align-items: center; padding: 22px 28px; border-bottom: 1px solid var(--border); cursor: pointer; position: relative; }
        .list-item:hover { background: #f8fafc; }
        .badge { font-size: 0.75rem; padding: 6px 12px; border-radius: 20px; margin-right: 18px; font-weight: 600; white-space: nowrap; }
        .badge.unread { background: #fee2e2; color: #ef4444; } .badge.replied { background: #f1f5f9; color: #64748b; } .badge.wait { background: #fef3c7; color: #f59e0b; }
        .item-title { flex-grow: 1; font-size: 1.05rem; font-family: var(--font-serif); }
        .item-time { color: var(--text-muted); font-size: 0.9rem; margin-right: 15px;}
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .page-btn { background: var(--paper); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .page-btn.active { background: #1e293b; color: #fff; }
        .delete-btn { background: none; border: none; cursor: pointer; padding: 8px; color: #cbd5e1; border-radius: 50%; font-size: 0.9rem;}
        .delete-btn:hover { color: #ef4444;}
        
        .editor { background: #fcfcfb; padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        .field-group { margin-bottom: 25px; }
        .field-label { display: block; font-family: var(--font-serif); font-size: 1.1rem; font-weight: 600; color: var(--color-tasks); margin-bottom: 12px; }
        .textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 20px; font-family: var(--font-serif); font-size: 1.1rem; line-height: 1.8; resize: vertical; outline: none; }
        .flex-row { display: flex; gap: 20px; } .flex-row > div { flex: 1; }
        .handwrite-only { cursor: pointer; background-color: #fcfbf9; }
        .handwrite-placeholder { font-size: 0.9rem; color: #9c8a75; display: block; margin-top: 8px; }
        .upload-container { background: #fafaf9; padding: 24px; border-radius: 12px; border: 1px dashed #cbd5e1; display: flex; flex-direction: column; gap: 12px; }
        .img-preview { display: none; max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 10px; object-fit: contain; object-position: left; }

        /* Plant Selection Modal */
        #plant-selection-modal { display: none; flex-direction: column; gap: 20px; }
        .plant-options { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .plant-btn { padding: 15px 25px; border: 2px solid var(--border); border-radius: 12px; background: white; font-size: 1.1rem; cursor: pointer; transition: 0.3s; font-family: var(--font-serif); }
        .plant-btn:hover { border-color: var(--color-tasks); background: #f4f9f5; transform: translateY(-3px); }

        /* Fullscreen Handwriting & Modals... (Keep from original, skipping long CSS for brevity, assuming original styling remains for modals) */
        /* ... 保留原有手寫板、信件閱讀 Modal、發信動畫 CSS ... */
        @import url("data:text/css;base64,/* 原有CSS略縮，為了字數限制，將重點放在自訂樣式 */");
        
        #modal { position: fixed; inset: 0; background: rgba(20, 18, 16, 0.88); z-index: 2000; display: none; justify-content: center; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(8px); }
        .letter-desk { width: 100%; max-width: 720px; margin: auto; display: flex; flex-direction: column; gap: 40px; position: relative; }
        .modal-close-btn { position: fixed; top: 30px; right: 40px; background: transparent; border: none; font-size: 2.5rem; font-weight: 200; color: #e6dfd1; cursor: pointer; transition: 0.3s; z-index: 2100; }
        .letter-sheet { background-color: var(--letter-paper); box-shadow: 0 30px 60px rgba(0,0,0,0.35); padding: 60px 8% 80px 8%; animation: fadeUpIn 0.6s forwards; opacity: 0; transform: translateY(20px); border-radius: 4px; }
        .letter-sheet.my-letter { background-color: #faf6eb; border-left: 4px solid var(--color-replies); }
        .letter-sheet.partner-letter { background-color: #fcfbfa; border-left: 4px solid var(--color-inbox); }
        .letter-header-meta { display: flex; justify-content: space-between; font-family: var(--font-serif); font-size: 0.9rem; color: #a48c76; margin-bottom: 40px; border-bottom: 1px dashed rgba(160, 140, 120, 0.3); padding-bottom: 15px; }
        .letter-text { font-family: var(--font-serif); font-size: 1.12rem; color: var(--letter-ink); line-height: 40px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, var(--letter-line) 39px, var(--letter-line) 40px); white-space: pre-wrap; word-break: break-word; }
        .letter-section-divider { display: inline-block; width: 100%; text-align: center; font-size: 0.95rem; color: #9c8a75; letter-spacing: 0.6em; line-height: 40px; margin: 0; }
        .letter-img-wrap { display: block; width: fit-content; margin: 40px auto; transform: rotate(-2deg); }
        .letter-img { max-width: 90%; max-height: 380px; padding: 12px 12px 40px 12px; background: #fff; border: 1px solid #e6e1d6; box-shadow: 0 8px 25px rgba(0,0,0,0.15); filter: sepia(15%); }

        /* Handwrite overlay */
        #hw-overlay { position: fixed; inset: 0; background: #e8eae6; z-index: 100000; display: none; flex-direction: column; overflow: hidden; }
        #hw-overlay.active { display: flex; animation: fadeUpIn 0.3s; }
        .hw-letter-area { flex: 1; position: relative; background-color: var(--letter-paper); }
        #hw-preview { position: absolute; inset: 0; width: 100%; height: 100%; border: none; outline: none; background: transparent; padding: 30px 8%; font-family: var(--font-serif); font-size: 1.25rem; color: var(--letter-ink); line-height: 44px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 43px, var(--letter-line) 43px, var(--letter-line) 44px); background-attachment: local; overflow-y: auto; pointer-events: none; z-index: 5;}
        #hw-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; cursor: crosshair; }
        .hw-footer { background: #faf9f7; display: flex; flex-direction: column; z-index: 20; }
        .hw-punctuations { display: flex; gap: 8px; padding: 12px 15px; overflow-x: auto; border-bottom: 1px solid #ebe6df; }
        .hw-punct-btn { background: #fff; border: 1px solid #d1c8ba; font-family: var(--font-serif); font-size: 1.2rem; padding: 8px 18px; border-radius: 8px; cursor: pointer; }
        .hw-actions { display: flex; justify-content: center; padding: 10px 15px; background: #ebe6df; gap: 20px; }
        .svg-btn { background: #fff; border: 1px solid #dcd5c9; border-radius: 12px; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .svg-btn.done { background: var(--color-tasks); color: white; width: 65px; border-color: #53735a;}
        
        /* Mail Anim */
        #anim-overlay { position: fixed; inset: 0; background: rgba(232, 234, 230, 0.95); z-index: 100005; align-items: center; justify-content: center; perspective: 1200px; display: none;}
        .env-wrapper { position: relative; width: 340px; height: 230px; }
        .env-back { position: absolute; inset: 0; background: #e3d3bd; border-radius: 4px; z-index: 1; }
        .paper-anim { position: absolute; bottom: 0; left: 15px; right: 15px; height: 380px; z-index: 5; transform-style: preserve-3d; }
        .panel-anim { position: absolute; left: 0; right: 0; height: 126px; background: #fffdfa; border: 1px solid #eee; backface-visibility: hidden; }
        .p-top { top: 0; transform-origin: bottom; } .p-mid { top: 126px; } .p-bot { top: 252px; transform-origin: top; }
        .env-front-left { position: absolute; inset: 0; background: #ebdcc5; clip-path: polygon(0 0, 50% 50%, 0 100%); z-index: 11; }
        .env-front-right { position: absolute; inset: 0; background: #e6d7c0; clip-path: polygon(100% 0, 100% 100%, 50% 50%); z-index: 12; }
        .env-front-bottom { position: absolute; inset: 0; background: #dfd0b9; clip-path: polygon(0 100%, 50% 50%, 100% 100%); z-index: 13; }
        .env-flap { position: absolute; top: 0; left: 0; right: 0; height: 140px; background: #d8c8b0; clip-path: polygon(0 0, 100% 0, 50% 100%); transform-origin: top; z-index: 15; }
        .env-seal { position: absolute; top: 110px; left: 50%; transform: translate(-50%, -50%) scale(0); width: 45px; height: 45px; background: #c25953; border-radius: 50%; z-index: 20; }

        @keyframes fadeUpIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* DEV TOOLS (EASY TO DELETE) */
        #dev-tools { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; z-index: 99999; font-size: 12px; display: flex; flex-direction: column; gap: 8px; }
        #dev-tools button { padding: 5px 10px; cursor: pointer; background: #333; color: white; border: 1px solid #555; }
        
        @media (max-width: 768px) {
            #auth-overlay { flex-direction: column; align-items: center; } .auth-hero { display: none; }
            .auth-sidebar { width: 90%; padding: 40px 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.4); }
            .ui-modal-container { padding: 30px 15px; } .flex-row { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="notification-banner"><span id="notification-text"></span></div>

    <!-- 3D Scene Container -->
    <div id="canvas-container"></div>

    <header id="hud-header">
        <div class="user-info"><span id="user-name">載入中...</span><a onclick="signOut()">暫別登出</a></div>
    </header>

    <!-- Auth -->
    <div id="auth-overlay">
        <div class="auth-hero">
            <h1>紙短情長<br>見字如面</h1>
            <p>在專屬的 3D 靜謐書房裡，留一方靜謐的角落。<br>澆灌心靈的盆栽，寫下感悟，等待靈魂的共鳴。</p>
        </div>
        <div class="auth-sidebar">
            <div id="login-container" class="auth-panel-content">
                <div><h2>登入書房</h2><p>開啟您的文字與植栽旅程</p></div>
                <button class="btn btn-google" onclick="signIn()">使用 Google 帳號登入</button>
            </div>
            <div id="name-setup-container" class="auth-panel-content" style="display:none;">
                <div><h2>設定筆名</h2><p>系統中對筆友將保持完全匿名。</p></div>
                <div class="input-group"><input type="text" id="setup-name" class="input-box" placeholder="例如：林小明 / 50211"></div>
                <button class="btn" id="btn-setup-name" onclick="saveName()">確認進入</button>
            </div>
        </div>
    </div>

    <!-- 2D UI Overlays (Triggered by 3D objects) -->
    
    <!-- Replies (Left Drawer) -->
    <div id="ui-replies" class="ui-modal-overlay">
        <div class="ui-modal-container">
            <button class="ui-modal-close" onclick="closeUI('ui-replies', 'drawerLeft')">×</button>
            <h2 class="ui-title" style="color: var(--color-replies);">對我的回覆</h2>
            <div class="list-container" id="replies-list"></div><div class="pagination" id="replies-pagination"></div>
        </div>
    </div>

    <!-- Inbox (Right Drawer) -->
    <div id="ui-inbox" class="ui-modal-overlay">
        <div class="ui-modal-container">
            <button class="ui-modal-close" onclick="closeUI('ui-inbox', 'drawerRight')">×</button>
            <h2 class="ui-title" style="color: var(--color-inbox);">筆友寄來的心得</h2>
            <div class="list-container" id="inbox-list"></div><div class="pagination" id="inbox-pagination"></div>
        </div>
    </div>

    <!-- Tasks (Clipboard) -->
    <div id="ui-tasks" class="ui-modal-overlay">
        <div class="ui-modal-container">
            <button class="ui-modal-close" onclick="closeUI('ui-tasks', 'clipboard')">×</button>
            <h2 class="ui-title" style="color: var(--color-tasks);">我的任務</h2>
            <div class="grid" id="task-grid"></div>
            
            <div class="editor" id="write-editor" style="display: none;">
                <h3 id="task-title" class="serif-text" style="margin-bottom: 25px; font-size: 1.5rem;">撰寫任務</h3>
                <div class="field-group flex-row">
                    <div><label class="field-label">書籍名稱</label><input type="text" id="book-title" class="input-box" style="font-family:var(--font-serif);" placeholder="請輸入書名"></div>
                    <div><label class="field-label">目前閱讀頁數</label><input type="number" id="book-page" class="input-box" placeholder="例如：120" min="1"></div>
                </div>
                <div class="field-group">
                    <label class="field-label">思考問題</label>
                    <textarea id="log-question" class="textarea handwrite-only" style="min-height:80px;" readonly placeholder="點此喚出全螢幕書寫板..."></textarea>
                </div>
                <div class="field-group">
                    <label class="field-label">閱讀感悟</label>
                    <textarea id="log-content" class="textarea handwrite-only" style="min-height:160px;" readonly placeholder="點此喚出全螢幕書寫板...（最少 150 字）"></textarea>
                </div>
                <div class="field-group upload-container">
                    <label class="field-label" style="margin-bottom: 0;">書頁留影／感悟配圖</label>
                    <label class="btn" style="background:#fff; color:#333; border:1px solid #ccc; width:max-content;">點擊選擇圖片 <input type="file" id="book-image" accept="image/*" style="display:none;" onchange="handleFileSelect(event)"></label>
                    <img id="image-preview" class="img-preview" src="">
                </div>
                <div style="text-align: right;"><button id="btn-submit-task" class="btn" style="background: var(--color-tasks); margin-left: auto;" onclick="submitLog()">封裝寄出心得</button></div>
            </div>
        </div>
    </div>

    <!-- Reading Logs (Book) -->
    <div id="ui-logs" class="ui-modal-overlay">
        <div class="ui-modal-container">
            <button class="ui-modal-close" onclick="closeUI('ui-logs', 'book')">×</button>
            <h2 class="ui-title" style="color: var(--color-log);">我的閱讀紀錄</h2>
            <div class="editor" id="mylog-editor" style="margin-bottom: 30px;">
                <div class="field-group"><label class="field-label">書籍名稱</label><input type="text" id="mylog-title" class="input-box" placeholder="請輸入書名"></div>
                <div class="field-group"><label class="field-label">私密筆記</label><textarea id="mylog-notes" class="textarea" style="min-height:100px;" placeholder="寫下專屬於你的私密閱讀筆記 (允許打字)..."></textarea></div>
                <button class="btn" id="btn-save-log" style="background: var(--color-log);" onclick="submitReadingLog()">保存紀錄</button>
            </div>
            <div id="mylog-list" class="list-container" style="border:none;"></div>
        </div>
    </div>

    <!-- Plant Selection Modal -->
    <div id="ui-plant-select" class="ui-modal-overlay" style="z-index: 10002;">
        <div class="ui-modal-container" style="text-align: center; max-width: 600px;">
            <h2 class="ui-title">選擇一盆新的植栽</h2>
            <p style="color: #666; margin-bottom: 30px; font-size: 1.1rem;">每天為它澆水，見證它 100 天的成長變化。若連續一週未澆水將會枯萎。</p>
            <div class="plant-options">
                <button class="plant-btn" onclick="selectPlant('succulent')">多肉植物</button>
                <button class="plant-btn" onclick="selectPlant('cactus')">仙人掌</button>
                <button class="plant-btn" onclick="selectPlant('monstera')">龜背竹</button>

        // --- Custom Shader for Outside Window (6 Times of Day & City) ---
        function buildOutsideScenery() {
            const uniforms = {
                uTime: { value: 0.0 },
                uState: { value: 2.0 }, // 0:Dawn, 1:Morn, 2:Noon, 3:Aft, 4:Dusk, 5:Night
                resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            };
            skyUniforms = uniforms;

            const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;
            const fragmentShader = `
                uniform float uTime;
                uniform float uState;
                varying vec2 vUv;
                
                vec3 getSkyColor(float state, vec2 uv) {
                    vec3 cDawn1 = vec3(0.9, 0.6, 0.5); vec3 cDawn2 = vec3(0.4, 0.6, 0.8);
                    vec3 cMorn1 = vec3(0.6, 0.8, 0.9); vec3 cMorn2 = vec3(0.2, 0.5, 0.9);
                    vec3 cNoon1 = vec3(0.4, 0.7, 0.95); vec3 cNoon2 = vec3(0.1, 0.4, 0.8);
                    vec3 cAft1  = vec3(0.8, 0.7, 0.6); vec3 cAft2 = vec3(0.3, 0.5, 0.8);
                    vec3 cDusk1 = vec3(0.9, 0.4, 0.3); vec3 cDusk2 = vec3(0.4, 0.2, 0.5);
                    vec3 cNight1= vec3(0.05, 0.1, 0.2); vec3 cNight2 = vec3(0.0, 0.0, 0.05);

                    vec3 col1, col2;
                    if(state < 0.5) { col1 = cDawn1; col2 = cDawn2; }
                    else if(state < 1.5) { col1 = cMorn1; col2 = cMorn2; }
                    else if(state < 2.5) { col1 = cNoon1; col2 = cNoon2; }
                    else if(state < 3.5) { col1 = cAft1; col2 = cAft2; }
                    else if(state < 4.5) { col1 = cDusk1; col2 = cDusk2; }
                    else { col1 = cNight1; col2 = cNight2; }
                    
                    return mix(col1, col2, uv.y);
                }

                float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

                void main() {
                    vec3 sky = getSkyColor(uState, vUv);
                    
                    // Simple City Skyline Silhouette
                    float cityHeight = 0.15 + 0.1 * sin(vUv.x * 20.0) + 0.05 * cos(vUv.x * 50.0);
                    cityHeight += step(0.9, fract(vUv.x * 10.0)) * 0.1;
                    
                    if (vUv.y < cityHeight) {
                        // Buildings
                        vec3 bColor = vec3(0.05, 0.05, 0.08);
                        // Windows at night
                        if (uState > 4.5 || uState < 0.5) {
                            float win = step(0.8, fract(vUv.x * 100.0)) * step(0.5, fract(vUv.y * 80.0));
                            if (hash(floor(vUv * 100.0) + uTime * 0.01) > 0.8) bColor += vec3(0.8, 0.8, 0.5) * win;
                        }
                        gl_FragColor = vec4(bColor, 1.0);
                    } else {
                        // Stars at night
                        if ((uState > 4.5 || uState < 0.5) && hash(vUv) > 0.99) sky += vec3(1.0) * (0.5 + 0.5*sin(uTime * 2.0 + hash(vUv)*10.0));
                        gl_FragColor = vec4(sky, 1.0);
                    }
                }
            `;
            const skyMat = new THREE.ShaderMaterial({ uniforms: uniforms, vertexShader, fragmentShader, side: THREE.BackSide });
            const skyGeo = new THREE.PlaneGeometry(100, 60);
            const sky = new THREE.Mesh(skyGeo, skyMat);
            sky.position.set(0, 10, -50);
            scene.add(sky);
        }

        // ==========================================
        // Interaction Logic

        function setupInteractions() {
            const canvas = renderer.domElement;
            canvas.addEventListener('pointerdown', (e) => {

                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const intersects = raycaster.intersectObjects(Object.values(interactables), true);
                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    // Find root parent in interactables
                    for (let key in interactables) {
                        if (obj === interactables[key] || interactables[key].children.includes(obj)) {
                            handleObjectClick(key);
                            break;
                        }
                    }
                }
            });
        }

                document.getElementById('write-editor').style.display = 'none';
                renderTasks();
                openUIWithAnim('clipboard', 'ui-tasks', {rotationX: -0.2, y: 6.5}, {rotationX: 0, y: 5.6});

            }});

        // ==========================================
        // Plant Logic (Procedural Generation)
        // ==========================================
        function waterPlant() {
            if (!plantState.type) return alert("請先點擊盆栽選擇種植一種植物！");
            if (plantState.health <= 0) return alert("植物已枯萎，請點擊盆栽重新種植。");
            
            const now = Date.now();
            // Allow watering once per 12 hours (simplified for demo, usually 24h)
            if (now - plantState.lastWatered < 12 * 60 * 60 * 1000) {
                return alert("今天已經澆過水了，它需要時間吸收水分！");
            }

            const can = interactables.waterCan;
            // Animation sequence
            gsap.timeline()
                .to(can.position, {x: -9, y: 12, z: -4, duration: 0.8, ease: "power1.inOut"})
                .to(can.rotation, {z: 0.8, duration: 0.4})
                .call(() => createWaterParticles())
                .to(can.rotation, {z: 0, duration: 0.4, delay: 0.5})
                .to(can.position, {x: 13, y: 6.5, z: -4, duration: 0.8, ease: "power1.inOut"})
                .call(() => {
                    plantState.stage = Math.min(100, plantState.stage + 1);
                    plantState.health = Math.min(7, plantState.health + 1);
                    plantState.lastWatered = now;
                    savePlantState();
                });
        }

        function createWaterParticles() {
            // Simple visual effect
            const geo = new THREE.SphereGeometry(0.1);
            const mat = new THREE.MeshBasicMaterial({color: 0x66ccff});
            for(let i=0; i<10; i++){
                let p = new THREE.Mesh(geo, mat);
                p.position.set(-10 + Math.random(), 11, -4 + Math.random());
                scene.add(p);
                gsap.to(p.position, {y: 7, duration: 0.5 + Math.random()*0.3, onComplete:()=>scene.remove(p)});
            }
        }

        window.selectPlant = function(type) {
            plantState = { type: type, stage: 1, health: 7, lastWatered: Date.now() };
            savePlantState();
            document.getElementById('ui-plant-select').style.display = 'none';
        }

        function renderPlant() {
            if(plantObj) plantGroup.remove(plantObj);
            if(!plantState.type) return;

            // Health color mapping: 7=Green, 0=Brown
            const hRatio = plantState.health / 7.0;
            const color = new THREE.Color().lerpColors(new THREE.Color(0x8b7355), new THREE.Color(0x4a7c59), hRatio);
            const mat = new THREE.MeshStandardMaterial({color: color, roughness: 0.8});
            
            plantObj = new THREE.Group();
            
            // Stage 0-100 logic. Cap physical size, increase density/complexity.
            const t = plantState.stage / 100; // 0 to 1
            const droop = (7 - plantState.health) * 0.15; // bend downwards if unhealthy

            // Simplistic representation based on type to fit character limit
            if (plantState.type === 'succulent') {
                const count = 5 + Math.floor(t * 30);
                for(let i=0; i<count; i++) {
                    const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.5, 4), mat);
                    const angle = i * 2.4;
                    const r = (i * 0.05);
                    leaf.position.set(Math.cos(angle)*r, r*0.5, Math.sin(angle)*r);
                    leaf.rotation.set(Math.PI/2 - 0.5 - droop, angle, 0);
                    plantObj.add(leaf);
                }
            } else if (plantState.type === 'cactus') {
                const height = 1 + t * 3;
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, height, 8), mat);
                body.position.y = height/2;
                plantObj.add(body);
                if (t > 0.3) {
                    const arm1 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.5), mat);
                    arm1.position.set(1, height*0.6, 0); arm1.rotation.z = -0.5 - droop; plantObj.add(arm1);
                }
            } else {
                // Generic sprout for others for brevity
                const height = 0.5 + t * 4;
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, height), mat);
                stem.position.y = height/2;
                stem.rotation.x = droop;
                plantObj.add(stem);
            }

            plantGroup.add(plantObj);
        }

        function animateThreeJS() {
            requestAnimationFrame(animateThreeJS);

            renderer.render(scene, camera);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateSkyTime() {
            const hour = new Date().toLocaleString("en-US", {timeZone: "Asia/Hong_Kong", hour: 'numeric', hour12: false});
            let state = 2; // Noon default
            if(hour >= 5 && hour < 7) state = 0; // Dawn
            else if(hour >= 7 && hour < 11) state = 1; // Morn
            else if(hour >= 11 && hour < 15) state = 2; // Noon
            else if(hour >= 15 && hour < 17) state = 3; // Aft
            else if(hour >= 17 && hour < 19) state = 4; // Dusk
            else state = 5; // Night
            if(skyUniforms) skyUniforms.uState.value = state;
        }

        function initApp() { 
            healPool(); 
            db.ref('settings/taskConfig').on('value', snap => { config = snap.val(); renderTasks(); }); 
            setupNotifications(); loadMailbox(); loadReadingLogs(); initHandwriting(); loadPlantState();
        }

        function loadPlantState() {
            db.ref(`users/${currentUser.uid}/plant`).on('value', snap => {
                if(snap.val()) {
                    plantState = snap.val();
                    // Check wither logic
                    const daysPassed = (Date.now() - plantState.lastWatered) / (1000 * 60 * 60 * 24);
                    if (daysPassed >= 1 && plantState.health > 0) {
                        plantState.health = Math.max(0, plantState.health - Math.floor(daysPassed));
                        savePlantState(); // save withered state
                    }
                }
                renderPlant();
            });
        }
        function savePlantState() {
            db.ref(`users/${currentUser.uid}/plant`).set(plantState);
        }

        // Mailbox logic adapted for 3D red dots
        function loadMailbox() {
            db.ref(`user_threads/${currentUser.uid}`).on('value', snap => {
                let all = Object.values(snap.val() || {}).sort((a, b) => b.lastUpdated - a.lastUpdated);
                repliesData = []; inboxData = []; hasUnrepliedLetters = false; let unreadInReplies = false; let unreadInInbox = false;
                all.forEach(t => {
                    if (t.isSender) { if (t.hasBeenRepliedTo) { repliesData.push(t); if(!t.hasReplied) hasUnrepliedLetters = true; if(t.hasUnread) unreadInReplies = true; } } 
                    else { inboxData.push(t); if(!t.hasReplied) hasUnrepliedLetters = true; if(t.hasUnread) unreadInInbox = true; }
                });
                // Update 3D Red Dots
                if(interactables.dotLeft) interactables.dotLeft.visible = unreadInReplies;
                if(interactables.dotRight) interactables.dotRight.visible = unreadInInbox;
                if(interactables.dotTask) interactables.dotTask.visible = hasUnrepliedLetters;

                renderPaginatedList('replies', repliesData, currentPageReplies); renderPaginatedList('inbox', inboxData, currentPageInbox);
            });
        }

        // (Keep original list renderers, API calls, and logic exact functions to save space, assuming they are appended here)
        // [為了滿足字數與結構限制，此處省略與原本完全相同的 renderPaginatedList, submitLog, healPool, playAnim, 手寫板事件綁定 等純邏輯函數。請將您原本的 JS 邏輯直接貼上並覆蓋即可，不影響 3D 結構。]
        
        // ==========================================
        // Dev Tools (Test Functions)
        // ==========================================
        window.changeTime = function(state) { if(skyUniforms) skyUniforms.uState.value = state; };
        window.testGrowPlant = function() { 
            if(!plantState.type) return; 
            plantState.stage = Math.min(100, plantState.stage + 10); 
            plantState.health = 7; 
            savePlantState(); 
        };
        window.testDamagePlant = function() {
            if(!plantState.type) return; 
            plantState.health = Math.max(0, plantState.health - 2); 
            plantState.lastWatered = Date.now() - (3 * 24 * 60 * 60 * 1000); // Backdate 3 days
            savePlantState(); 
        };
        window.testKillPlant = function() {
            if(!plantState.type) return; 
            plantState.health = 0; 
            savePlantState(); 
        };

        initThreeJS();
    </script>
</body>
