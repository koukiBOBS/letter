<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閱讀交流與書房 - 沉浸式 3D 書房</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- GSAP & Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* CSS 變數區塊 */
        :root {
            --bg: #faf7f2; var(--paper): #ffffff; --text: #2c3e50; --text-muted: #8391a2; --border: #e6e1d6;
            --font-serif: 'Noto Serif TC', serif; --font-sans: 'Inter', sans-serif;
            --color-replies: #548ca8; --color-inbox: #d98a6c; --color-tasks: #6b8e73; --color-log: #8b7355;
            --letter-paper: #fbf9f4; --letter-ink: #4a4238; --letter-line: rgba(160, 140, 120, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: var(--text); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow: hidden; touch-action: none; }
        h1, h2, h3, h4, .serif-text { font-family: var(--font-serif); }

        /* 3D Canvas Background */
        #room-canvas-container { position: absolute; inset: 0; z-index: 0; cursor: pointer;}
        #ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column;}
        
        /* Notification */
        #notification-banner { pointer-events: auto; position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--paper); border: 1px solid var(--border); padding: 16px 32px; border-radius: 30px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); z-index: 10001; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 0.95rem; font-weight: 600; opacity: 0; width: 90%; max-width: 400px; justify-content: center;}
        
        /* Auth Screen */
        #auth-overlay { pointer-events: auto; position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; overflow: hidden; }
        .auth-hero { flex: 1.2; position: relative; z-index: 2; pointer-events: none; display: flex; flex-direction: column; justify-content: center; padding: 8%; }
        .auth-hero h1 { font-size: 3.5rem; color: #2c3e50; line-height: 1.3; margin-bottom: 24px; letter-spacing: 2px; font-weight: 600; }
        .auth-sidebar { width: 480px; position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; padding: 60px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(25px); border-left: 1px solid rgba(255,255,255,0.8); }
        .auth-panel-content { display: flex; flex-direction: column; gap: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-box { width: 100%; background: #ffffff; border: 1px solid #cbd5e1; padding: 16px; font-family: var(--font-sans); font-size: 1rem; border-radius: 8px; outline: none; }
        .btn { background: #1e293b; color: #fff; border: none; padding: 16px 24px; font-size: 1.05rem; border-radius: 8px; cursor: pointer; }
        .btn-google { background: #ffffff; color: #334155; border: 1px solid #e2e8f0; width: 100%;}
        
        /* Header Info Overlay */
        header { pointer-events: auto; position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 30px; display: flex; align-items: center; gap: 15px; z-index: 100;}
        .user-info { font-size: 0.9rem; font-weight: 500; }
        .user-info a { color: var(--color-inbox); cursor: pointer; margin-left: 10px; text-decoration: underline; }

        /* Modal Sections (Replaced Tabs) */
        .ui-modal { pointer-events: auto; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; display: none; padding-top: 80px; }
        .ui-modal-header { position: fixed; top: 0; left: 0; right: 0; background: rgba(250,247,242,0.9); backdrop-filter: blur(10px); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 2010;}
        .back-to-room { background: none; border: 1px solid var(--text); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600;}
        
        main { max-width: 950px; margin: 0 auto 100px; padding: 0 20px; }
        
        /* Shared Styles */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .task-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px 16px; text-align: center; cursor: pointer; }
        .task-card.completed { border-color: var(--color-tasks); background: #f4f9f5; }
        .task-card.locked { opacity: 0.6; cursor: not-allowed; border-style: dashed; }
        .editor { background: #fff; padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        .field-group { margin-bottom: 28px; }
        .field-label { display: block; font-family: var(--font-serif); font-size: 1.1rem; font-weight: 600; color: var(--color-tasks); margin-bottom: 12px; }
        .textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 20px; font-family: var(--font-serif); font-size: 1.1rem; line-height: 1.8; resize: vertical; outline: none; }
        .flex-row { display: flex; gap: 20px; } .flex-row > div { flex: 1; }
        .handwrite-only { cursor: pointer; background-color: #fcfbf9; }
        .upload-container { background: #fafaf9; padding: 24px; border-radius: 12px; border: 1px dashed #cbd5e1; display: flex; flex-direction: column; gap: 12px; }
        .list-container { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .list-item { display: flex; align-items: center; padding: 22px 28px; border-bottom: 1px solid var(--border); cursor: pointer; position: relative; }
        .badge { font-size: 0.75rem; padding: 6px 12px; border-radius: 20px; margin-right: 18px; font-weight: 600; white-space: nowrap; }
        .badge.unread { background: #fee2e2; color: #ef4444; } .badge.replied { background: #f1f5f9; color: #64748b; } .badge.wait { background: #fef3c7; color: #f59e0b; }
        .item-title { flex-grow: 1; font-size: 1.05rem; font-family: var(--font-serif); }
        
        /* Modal & Letters */
        #modal { pointer-events:auto; position: fixed; inset: 0; background: rgba(20, 18, 16, 0.88); z-index: 3000; display: none; justify-content: center; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(8px); }
        .letter-desk { width: 100%; max-width: 720px; margin: auto; display: flex; flex-direction: column; gap: 40px; }
        .modal-close-btn { position: fixed; top: 30px; right: 40px; background: transparent; border: none; font-size: 2.5rem; color: #e6dfd1; cursor: pointer; z-index: 3100; }
        .letter-sheet { background-color: var(--letter-paper); padding: 60px 8%; animation: unfold 0.6s cubic-bezier(0.2, 0, 0.2, 1) forwards; border-radius: 4px; }
        @keyframes unfold { from { opacity:0; transform:translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .letter-text { font-family: var(--font-serif); font-size: 1.12rem; color: var(--letter-ink); line-height: 40px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, var(--letter-line) 39px, var(--letter-line) 40px); white-space: pre-wrap; word-break: break-word; }
        
        /* Handwriting Canvas */
        #hw-overlay { pointer-events:auto; position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: none; flex-direction: column; }
        #hw-overlay.active { display: flex; }
        .hw-letter-area { flex: 1; position: relative; background-color: var(--letter-paper); }
        #hw-preview { position: absolute; inset: 0; width: 100%; height: 100%; border: none; outline: none; resize: none; background: transparent; padding: 30px 8%; font-family: var(--font-serif); font-size: 1.25rem; color: var(--letter-ink); line-height: 44px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 43px, var(--letter-line) 43px, var(--letter-line) 44px); background-attachment: local; overflow-y: auto; pointer-events: none; z-index: 5;}
        #hw-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; cursor: crosshair; }
        .hw-footer { background: #faf9f7; display: flex; flex-direction: column; z-index: 20; }
        .hw-punctuations { display: flex; gap: 8px; padding: 12px 15px; overflow-x: auto; white-space: nowrap; align-items: center; }
        .hw-punct-btn { background: #fff; border: 1px solid #d1c8ba; font-family: var(--font-serif); font-size: 1.2rem; padding: 8px 18px; border-radius: 8px; cursor: pointer; }
        .hw-actions { display: flex; justify-content: center; padding: 10px 15px; gap: 20px; }
        .svg-btn { background: #fff; border: 1px solid #dcd5c9; cursor: pointer; width: 50px; height: 50px; border-radius: 12px; }
        .svg-btn.done { background: var(--color-tasks); color: white; width: 65px;}
        
        /* Mail Anim */
        #anim-overlay { pointer-events:auto; position: fixed; inset: 0; background: rgba(250, 247, 242, 0.95); z-index: 100005; align-items: center; justify-content: center; display: none;}
        .env-wrapper { position: relative; width: 340px; height: 230px; }
        .env-back { position: absolute; inset: 0; background: #e3d3bd; }
        
        /* Plant Selection Modal */
        #plant-selector { pointer-events:auto; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .ps-box { background: var(--bg); padding: 40px; border-radius: 16px; width: 90%; max-width: 600px; text-align: center; }
        .ps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        @media(max-width:600px){ .ps-grid{grid-template-columns: 1fr 1fr;} }
        .ps-card { padding: 20px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: 0.2s;}
        .ps-card:hover { border-color: var(--color-tasks); background: #fff;}
        .ps-card h4 { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 5px; color: var(--color-tasks);}
        
        /* Test Panel (For Developer) */
        #test-panel { pointer-events:auto; position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); color: lime; padding: 10px; z-index: 99999; border-radius: 8px; font-family: monospace; display: flex; flex-direction: column; gap: 5px;}
        #test-panel button { background: #333; color: white; border: 1px solid #555; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 3D Background Room -->
    <div id="room-canvas-container"></div>

    <div id="ui-layer">
        <header id="main-header" style="display:none;">
            <div class="user-info"><span id="user-name">載入中...</span><a onclick="signOut()">登出</a></div>
        </header>
        <div id="notification-banner"><span id="notification-text">您有新訊息。</span></div>
    </div>

    <!-- UI Modals (Replaces Tabs) -->
    <div id="modal-replies" class="ui-modal">
        <div class="ui-modal-header"><h2>📬 對我的回覆</h2><button class="back-to-room" onclick="closeUIModal('replies')">返回書房</button></div>
        <main><div class="list-container" id="replies-list"></div><div id="replies-pagination"></div></main>
    </div>

    <div id="modal-inbox" class="ui-modal">
        <div class="ui-modal-header"><h2>📥 寄來的心得</h2><button class="back-to-room" onclick="closeUIModal('inbox')">返回書房</button></div>
        <main><div class="list-container" id="inbox-list"></div><div id="inbox-pagination"></div></main>
    </div>

    <div id="modal-tasks" class="ui-modal">
        <div class="ui-modal-header"><h2>✉️ 我的任務信箋</h2><button class="back-to-room" onclick="closeUIModal('tasks')">返回書房</button></div>
        <main>
            <div class="grid" id="task-grid"></div>
            <div class="editor" id="write-editor" style="display: none;">
                <h3 id="task-title" class="serif-text" style="margin-bottom: 30px; font-size: 1.5rem;">撰寫任務</h3>
                <div class="field-group flex-row">
                    <div><label class="field-label">書籍名稱</label><input type="text" id="book-title" class="input-box" placeholder="請輸入書名"></div>
                    <div><label class="field-label">目前閱讀頁數</label><input type="number" id="book-page" class="input-box" placeholder="例如：120"></div>
                </div>
                <div class="field-group">
                    <label class="field-label">思考問題</label>
                    <textarea id="log-question" class="textarea handwrite-only" readonly placeholder="點此喚出全螢幕書寫板..."></textarea>
                </div>
                <div class="field-group">
                    <label class="field-label">閱讀感悟</label>
                    <textarea id="log-content" class="textarea handwrite-only" readonly placeholder="點此喚出全螢幕書寫板...（最少 150 字）"></textarea>
                </div>
                <div class="field-group upload-container">
                    <label class="field-label">書頁留影／感悟配圖</label>
                    <input type="file" id="book-image" accept="image/*" onchange="handleFileSelect(event)">
                    <span id="file-name-display">尚未選擇圖片</span>
                </div>
                <button id="btn-submit-task" class="btn" onclick="submitLog()">封裝寄出心得</button>
            </div>
        </main>
    </div>

    <div id="modal-log" class="ui-modal">
        <div class="ui-modal-header"><h2>📖 我的閱讀紀錄</h2><button class="back-to-room" onclick="closeUIModal('log')">返回書房</button></div>
        <main>
            <div class="editor" id="mylog-editor" style="margin-bottom: 30px;">
                <div class="field-group"><label class="field-label">書籍名稱</label><input type="text" id="mylog-title" class="input-box"></div>
                <div class="field-group"><label class="field-label">私密筆記</label><textarea id="mylog-notes" class="textarea"></textarea></div>
                <button class="btn" onclick="submitReadingLog()">保存紀錄</button>
            </div>
            <div id="mylog-list"></div>
        </main>
    </div>

    <!-- Plant Selection -->
    <div id="plant-selector">
        <div class="ps-box">
            <h2 class="serif-text">盆栽已枯萎，請選擇新的種子</h2>
            <p style="margin-top:10px; color:#666;">每日澆水，100天後將見證它的完整生長。</p>
            <div class="ps-grid">
                <div class="ps-card" onclick="selectPlant(1)"><h4>🌱 小嫩芽</h4><p>簡單純粹的生命</p></div>
                <div class="ps-card" onclick="selectPlant(2)"><h4>🌵 堅韌多肉</h4><p>耐旱的厚實葉片</p></div>
                <div class="ps-card" onclick="selectPlant(3)"><h4>🌿 攀岩藤蔓</h4><p>生生不息的纏繞</p></div>
                <div class="ps-card" onclick="selectPlant(4)"><h4>🌸 綻放花卉</h4><p>期待花開的瞬間</p></div>
                <div class="ps-card" onclick="selectPlant(5)"><h4>🌳 迷你盆景</h4><p>歲月靜好的古樹</p></div>
            </div>
        </div>
    </div>

    <!-- Auth / Mail Anim / Handwrite / Modals from original -->
    <div id="auth-overlay">
        <div class="auth-hero"><h1>紙短情長<br>見字如面</h1></div>
        <div class="auth-sidebar">
            <div id="login-container" class="auth-panel-content">
                <h2>登入書房</h2><button class="btn btn-google" onclick="signIn()">使用 Google 帳號登入</button>
            </div>
            <div id="name-setup-container" class="auth-panel-content" style="display:none;">
                <h2>設定筆名</h2><input type="text" id="setup-name" class="input-box"><button class="btn" onclick="saveName()">確認進入</button>
            </div>
        </div>
    </div>

    <div id="anim-overlay"><div class="env-wrapper"><div class="env-back"></div></div></div>

    <div id="hw-overlay">
        <div class="hw-letter-area">
            <textarea id="hw-preview" readonly></textarea>
            <canvas id="hw-canvas"></canvas>
        </div>
        <div class="hw-footer">
            <div class="hw-punctuations"><button class="hw-punct-btn" onclick="insertChar('，')">，</button><button class="hw-punct-btn" onclick="insertChar('。')">。</button></div>
            <div class="hw-actions"><button class="svg-btn" onclick="hwBackspace()">刪</button><button class="svg-btn done" onclick="closeHwKeyboard()">完成</button></div>
        </div>
    </div>

    <div id="modal">
        <button class="modal-close-btn" onclick="closeChatModal()">×</button>
        <div class="letter-desk" id="chat-flow"></div>
    </div>

    <!-- TEST PANEL (DELETE AFTER TESTING) -->
    <div id="test-panel">
        <strong>開發者測試工具</strong>
        <button onclick="testTime()">切換時辰 (日夜變化)</button>
        <button onclick="testGrow()">+10天 生長</button>
        <button onclick="testWilt()">+1天 忘記澆水</button>
        <button onclick="testWater()">澆水 (恢復)</button>
        <button onclick="testKill()">直接枯萎 (重選植物)</button>
    </div>

    <script>
        /* ==========================================
           FIREBASE & APP LOGIC
           ========================================== */
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzcangpOrf05ZRhxzoMUN-C9T57CS3_G80to1lLWv4opXuHbYMMMuKXzap7kkcou3BPsQ/exec"; 
        const firebaseConfig = { apiKey: "AIzaSyCkGPRej1rMWVfm7Et6zJlrj3Bnm5-IVms", authDomain: "letter-a74d1.firebaseapp.com", databaseURL: "https://letter-a74d1-default-rtdb.firebaseio.com", projectId: "letter-a74d1" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        let currentUser = null, config = null, selectedTaskIndex = null;
        let selectedFileBase64 = null, selectedFileName = null;
        
        // Plant Logic State
        let myPlant = { type: 1, growth: 0, wilt: 0, lastWatered: 0 };
        let active3DPlantGroup = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                db.ref(`users/${user.uid}`).once('value').then(snap => {
                    if (snap.val() && snap.val().name) { 
                        document.getElementById('user-name').innerText = snap.val().name; 
                        enterRoom(); 
                        initApp(); 
                    } else { 
                        document.getElementById('login-container').style.display = 'none'; 
                        document.getElementById('name-setup-container').style.display = 'flex'; 
                    }
                });
            } else { 
                document.getElementById('auth-overlay').style.display = 'flex'; 
            }
        });

        function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function signOut() { auth.signOut().then(() => window.location.reload()); }
        function saveName() { 
            const name = document.getElementById('setup-name').value.trim(); 
            if (!name) return alert("請輸入姓名"); 
            db.ref(`users/${currentUser.uid}`).update({ name, email: currentUser.email, receivedCount: 0 }).then(() => { 
                document.getElementById('user-name').innerText = name; enterRoom(); initApp(); 
            }); 
        }

        function enterRoom() {
            gsap.to("#auth-overlay", { opacity: 0, duration: 1, onComplete: () => { 
                document.getElementById('auth-overlay').style.display = 'none'; 
                document.getElementById('main-header').style.display = 'flex';
                initThreeJSRoom(); 
            }});
        }

        function initApp() { 
            db.ref('settings/taskConfig').on('value', snap => { config = snap.val(); renderTasks(); }); 
            loadMailbox(); loadReadingLogs(); initHandwriting(); loadPlantData(); 
        }

        /* PLANT LOGIC */
        function loadPlantData() {
            db.ref(`users/${currentUser.uid}/plant`).once('value', snap => {
                let data = snap.val();
                let now = Date.now();
                if (!data) {
                    document.getElementById('plant-selector').style.display = 'flex';
                } else {
                    let daysSinceWater = Math.floor((now - data.lastWatered) / 86400000);
                    if(daysSinceWater > 0) {
                        data.wilt = Math.min(7, data.wilt + daysSinceWater);
                    }
                    myPlant = data;
                    if (myPlant.wilt >= 7) document.getElementById('plant-selector').style.display = 'flex';
                    else rebuildPlant3D();
                }
            });
        }
        function selectPlant(type) {
            myPlant = { type: type, growth: 0, wilt: 0, lastWatered: Date.now() };
            db.ref(`users/${currentUser.uid}/plant`).set(myPlant);
            document.getElementById('plant-selector').style.display = 'none';
            rebuildPlant3D();
        }
        function waterPlant() {
            if(myPlant.wilt >= 7) return alert("植物已完全枯萎。");
            let now = Date.now();
            let daysSinceWater = Math.floor((now - myPlant.lastWatered) / 86400000);
            
            // 澆水邏輯：每天第一次澆水增加生長，並恢復1級枯萎
            if(daysSinceWater > 0 || myPlant.growth === 0) {
                myPlant.growth = Math.min(100, myPlant.growth + 1);
            }
            myPlant.wilt = Math.max(0, myPlant.wilt - 1);
            myPlant.lastWatered = now;
            
            db.ref(`users/${currentUser.uid}/plant`).set(myPlant);
            rebuildPlant3D();
        }

        // --- Dummy functions for remaining original logic to prevent errors ---
        function loadMailbox() {} function renderTasks() {} function loadReadingLogs() {} function submitReadingLog(){} function submitLog(){} function closeUIModal(id) { document.getElementById('modal-'+id).style.display = 'none'; } function closeChatModal() { document.getElementById('modal').style.display = 'none'; } function handleFileSelect(){} function initHandwriting(){} function hwBackspace(){} function closeHwKeyboard(){} function insertChar(){} function openChat(id){}

        /* ==========================================
           THREE.JS IMMERSIVE ROOM
           ========================================== */
        let scene, camera, renderer, raycaster, mouse;
        let interactables = [];
        let curTimePhase = 0; // 0-5
        
        // 3D Objects
        let leftDrawer, rightDrawer, bookMesh, taskMesh, wateringCan, windowCurtainL, windowCurtainR, plantPot;
        let isCurtainOpen = true;
        let dirLight, ambLight, roomLight;

        function initThreeJSRoom() {
            const container = document.getElementById('room-canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 30);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            buildRoom();
            updateTimeLighting();

            window.addEventListener('resize', onWindowResize);
            container.addEventListener('pointerdown', onPointerDown);

            animate3D();
        }

        function buildRoom() {
            // Materials
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.8 });
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xf0ecd8, roughness: 1 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.9 });
            
            // Room
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);
            const wall = new THREE.Mesh(new THREE.PlaneGeometry(100, 50), wallMat);
            wall.position.set(0, 25, -20); wall.receiveShadow = true; scene.add(wall);

            // Window & Curtains
            const winHole = new THREE.Mesh(new THREE.PlaneGeometry(24, 16), new THREE.MeshBasicMaterial({color: 0x000000}));
            winHole.position.set(0, 18, -19.9); scene.add(winHole);
            const curtainMat = new THREE.MeshStandardMaterial({color: 0xdddddd, side: THREE.DoubleSide});
            windowCurtainL = new THREE.Mesh(new THREE.PlaneGeometry(12, 18), curtainMat);
            windowCurtainL.position.set(-10, 18, -19.5); scene.add(windowCurtainL);
            windowCurtainR = new THREE.Mesh(new THREE.PlaneGeometry(12, 18), curtainMat);
            windowCurtainR.position.set(10, 18, -19.5); scene.add(windowCurtainR);
            
            // Invisible hitbox for curtains
            const curtainHitbox = new THREE.Mesh(new THREE.PlaneGeometry(30, 20), new THREE.MeshBasicMaterial({visible:false}));
            curtainHitbox.position.set(0, 18, -19.4); curtainHitbox.userData = { action: 'toggleCurtain' }; scene.add(curtainHitbox); interactables.push(curtainHitbox);

            // Desk
            const deskTop = new THREE.Mesh(new THREE.BoxGeometry(36, 1, 16), woodMat);
            deskTop.position.set(0, 8, 0); deskTop.castShadow = true; deskTop.receiveShadow = true; scene.add(deskTop);
            const leg1 = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 1), woodMat); leg1.position.set(-17, 4, -7); scene.add(leg1);
            const leg2 = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 1), woodMat); leg2.position.set(17, 4, -7); scene.add(leg2);
            const leg3 = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 1), woodMat); leg3.position.set(-17, 4, 7); scene.add(leg3);
            const leg4 = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 1), woodMat); leg4.position.set(17, 4, 7); scene.add(leg4);

            // Drawers
            const drawerMat = new THREE.MeshStandardMaterial({ color: 0x7a4b24 });
            leftDrawer = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 14), drawerMat);
            leftDrawer.position.set(-10, 6.5, 0); leftDrawer.userData = { action: 'openReplies', isOpen: false }; scene.add(leftDrawer); interactables.push(leftDrawer);
            
            rightDrawer = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 14), drawerMat);
            rightDrawer.position.set(10, 6.5, 0); rightDrawer.userData = { action: 'openInbox', isOpen: false }; scene.add(rightDrawer); interactables.push(rightDrawer);

            // Drawer Handles
            const handleMat = new THREE.MeshStandardMaterial({color:0xdddddd, metalness:0.8});
            const lh = new THREE.Mesh(new THREE.BoxGeometry(3,0.5,0.5), handleMat); lh.position.set(0,0,7.25); leftDrawer.add(lh);
            const rh = new THREE.Mesh(new THREE.BoxGeometry(3,0.5,0.5), handleMat); rh.position.set(0,0,7.25); rightDrawer.add(rh);

            // Items on Desk
            // 1. Book (Reading Logs)
            bookMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 6), new THREE.MeshStandardMaterial({color: 0x542c16}));
            bookMesh.position.set(-12, 8.75, 2); bookMesh.rotation.y = 0.2; bookMesh.castShadow = true;
            bookMesh.userData = { action: 'openLog' }; scene.add(bookMesh); interactables.push(bookMesh);

            // 2. Task Notepad (Tasks)
            taskMesh = new THREE.Mesh(new THREE.BoxGeometry(5, 0.3, 7), new THREE.MeshStandardMaterial({color: 0xf5f0e6}));
            taskMesh.position.set(12, 8.65, 3); taskMesh.rotation.y = -0.15; taskMesh.castShadow = true;
            taskMesh.userData = { action: 'openTasks' }; scene.add(taskMesh); interactables.push(taskMesh);

            // 3. Plant Pot
            plantPot = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 1.8, 4, 16), new THREE.MeshStandardMaterial({color: 0xdc9269}));
            plantPot.position.set(0, 10.5, -4); plantPot.castShadow = true; scene.add(plantPot);
            const soil = new THREE.Mesh(new THREE.CylinderGeometry(2.4, 2.4, 0.2, 16), new THREE.MeshStandardMaterial({color: 0x3b2f2f}));
            soil.position.y = 1.9; plantPot.add(soil);

            // 4. Watering Can
            wateringCan = new THREE.Group();
            const canBody = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 3, 16), new THREE.MeshStandardMaterial({color: 0x7c9fa6}));
            const spout = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x7c9fa6}));
            spout.position.set(1.5, 1, 0); spout.rotation.z = -Math.PI/4;
            wateringCan.add(canBody); wateringCan.add(spout);
            wateringCan.position.set(6, 10, -5); wateringCan.castShadow = true;
            
            // Watering Can Hitbox
            const waterHitbox = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshBasicMaterial({visible:false}));
            waterHitbox.userData = { action: 'waterPlant' }; wateringCan.add(waterHitbox); interactables.push(waterHitbox);
            scene.add(wateringCan);

            // Lights
            ambLight = new THREE.AmbientLight(0xffffff, 0.4); scene.add(ambLight);
            dirLight = new THREE.DirectionalLight(0xfff5b6, 1);
            dirLight.position.set(0, 20, -30); dirLight.castShadow = true; scene.add(dirLight);
            roomLight = new THREE.PointLight(0xffaa55, 0); // Turned on when dark
            roomLight.position.set(0, 20, 10); scene.add(roomLight);
        }

        // ==========================================
        // PROCEDURAL PLANT GENERATOR (100 Stages)
        // ==========================================
        function rebuildPlant3D() {
            if(active3DPlantGroup) plantPot.remove(active3DPlantGroup);
            active3DPlantGroup = new THREE.Group();
            active3DPlantGroup.position.y = 2; // Above soil
            
            let stage = myPlant.growth; // 0 to 100
            let wilt = myPlant.wilt; // 0 to 7
            let type = myPlant.type;

            // Base calculations
            let scaleFactor = 0.2 + (stage / 100) * 0.8; // Grow up to 1.0 size
            let detailLevel = Math.max(1, Math.floor(stage / 5)); // Add parts over time
            
            // Color calculations based on wilt (0=healthy green, 7=dead brown)
            let healthyColor = new THREE.Color(type === 2 ? 0x5a8a5a : (type===4 ? 0x4a7a4a : 0x228B22));
            let wiltColor = new THREE.Color(0x8b5a2b);
            let currentColor = healthyColor.clone().lerp(wiltColor, wilt / 7);
            
            let mat = new THREE.MeshStandardMaterial({color: currentColor, roughness: 0.6, side: THREE.DoubleSide});
            let stemMat = new THREE.MeshStandardMaterial({color: currentColor.clone().lerp(new THREE.Color(0x442200), type===5?0.8:0.2)});

            // Procedural Logic based on Type
            if (type === 1) { // Sprout
                let stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 3 * scaleFactor), stemMat);
                stem.position.y = (3 * scaleFactor)/2; active3DPlantGroup.add(stem);
                for(let i=0; i<detailLevel; i++) {
                    let leaf = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1.2), mat);
                    leaf.position.set(0, (i/detailLevel)*3*scaleFactor, 0);
                    leaf.rotation.set((Math.PI/4) + wilt*0.2, i*Math.PI*0.8, 0);
                    leaf.translateX(0.4); active3DPlantGroup.add(leaf);
                }
            } else if (type === 2) { // Succulent
                for(let i=0; i<detailLevel; i++) {
                    let leaf = new THREE.Mesh(new THREE.SphereGeometry(0.4 * scaleFactor, 8, 8), mat);
                    leaf.scale.set(1, 0.3, 2);
                    let angle = i * 2.4;
                    let radius = (i/detailLevel) * 1.5 * scaleFactor;
                    leaf.position.set(Math.cos(angle)*radius, (i*0.1)*scaleFactor, Math.sin(angle)*radius);
                    leaf.lookAt(0, -1, 0); leaf.rotation.x += wilt*0.1;
                    active3DPlantGroup.add(leaf);
                }
            } else if (type === 3) { // Vine
                for(let i=0; i<detailLevel; i++) {
                    let h = i * 0.15 * scaleFactor;
                    let angle = i * 0.5;
                    let seg = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.2), stemMat);
                    seg.position.set(Math.cos(angle)*0.5, h, Math.sin(angle)*0.5);
                    seg.rotation.x = Math.PI/2; seg.rotation.y = angle;
                    active3DPlantGroup.add(seg);
                    if(i%2===0){
                        let leaf = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), mat);
                        leaf.position.copy(seg.position); leaf.rotation.set(wilt*0.3, angle, 0); leaf.translateX(0.3);
                        active3DPlantGroup.add(leaf);
                    }
                }
            } else if (type === 4) { // Flower
                let stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4 * scaleFactor), stemMat);
                stem.position.y = (4 * scaleFactor)/2; active3DPlantGroup.add(stem);
                if(stage > 80) {
                    let flowerColor = new THREE.Color(0xff69b4).lerp(wiltColor, wilt/7);
                    let fMat = new THREE.MeshStandardMaterial({color: flowerColor, side: THREE.DoubleSide});
                    for(let i=0; i<5; i++){
                        let petal = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.5), fMat);
                        petal.position.set(0, 4*scaleFactor, 0);
                        petal.rotation.set(Math.PI/4 + wilt*0.2, i*(Math.PI*2/5), 0);
                        petal.translateZ(0.5);
                        active3DPlantGroup.add(petal);
                    }
                }
            } else if (type === 5) { // Bonsai
                let trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4*scaleFactor, 0.6*scaleFactor, 3), stemMat);
                trunk.position.y = 1.5; active3DPlantGroup.add(trunk);
                for(let i=0; i<Math.min(detailLevel, 10); i++){
                    let canopy = new THREE.Mesh(new THREE.SphereGeometry(1.2*scaleFactor, 7, 7), mat);
                    canopy.position.set((Math.random()-0.5)*3, 2.5 + Math.random()*2, (Math.random()-0.5)*3);
                    canopy.scale.y = 0.6; canopy.position.y -= wilt*0.2;
                    active3DPlantGroup.add(canopy);
                }
            }

            plantPot.add(active3DPlantGroup);
        }

        // ==========================================
        // TIME & LIGHTING SYSTEM
        // ==========================================
        function updateTimeLighting() {
            let hkTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Hong_Kong"}));
            let hour = hkTime.getHours();
            setPhaseByHour(hour);
        }

        function setPhaseByHour(hour) {
            // 0: Night, 1: Dawn, 2: Morning, 3: Noon, 4: Afternoon, 5: Dusk
            if(hour>=5 && hour<7) curTimePhase=1;
            else if(hour>=7 && hour<11) curTimePhase=2;
            else if(hour>=11 && hour<15) curTimePhase=3;
            else if(hour>=15 && hour<18) curTimePhase=4;
            else if(hour>=18 && hour<20) curTimePhase=5;
            else curTimePhase=0;
            applyLightingPhase();
        }

        function applyLightingPhase() {
            const phases = [
                {sky:0x050510, light:0x222255, int:0.1, roomLight: 0.8}, // Night
                {sky:0xffa07a, light:0xffa07a, int:0.5, roomLight: 0.3}, // Dawn
                {sky:0x87CEEB, light:0xffffff, int:1.0, roomLight: 0.0}, // Morning
                {sky:0x4682B4, light:0xffffff, int:1.2, roomLight: 0.0}, // Noon
                {sky:0x87CEEB, light:0xffeeb0, int:0.9, roomLight: 0.0}, // Afternoon
                {sky:0xcd853f, light:0xff8c00, int:0.4, roomLight: 0.5}  // Dusk
            ];
            let p = phases[curTimePhase];
            scene.background.setHex(p.sky);
            scene.fog.color.setHex(p.sky);
            dirLight.color.setHex(p.light);
            dirLight.intensity = isCurtainOpen ? p.int : p.int * 0.1;
            roomLight.intensity = p.roomLight + (isCurtainOpen ? 0 : 0.5); // Turn on desk lamp if curtain closed or night
        }

        // ==========================================
        // INTERACTION (RAYCASTING & GSAP)
        // ==========================================
        function onPointerDown(event) {
            if(document.querySelector('.ui-modal[style*="display: block"]')) return; // Block clicks if UI open
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            let intersects = raycaster.intersectObjects(interactables, false);
            if(intersects.length > 0) {
                let obj = intersects[0].object;
                let action = obj.userData.action;
                
                if(action === 'openReplies') {
                    if(!obj.userData.isOpen) {
                        gsap.to(obj.position, {z: 6, duration: 0.5, ease: "power2.out", onComplete: () => {
                            document.getElementById('modal-replies').style.display = 'block';
                            obj.userData.isOpen = true;
                        }});
                    } else { document.getElementById('modal-replies').style.display = 'block'; }
                }
                else if(action === 'openInbox') {
                    if(!obj.userData.isOpen) {
                        gsap.to(obj.position, {z: 6, duration: 0.5, ease: "power2.out", onComplete: () => {
                            document.getElementById('modal-inbox').style.display = 'block';
                            obj.userData.isOpen = true;
                        }});
                    } else { document.getElementById('modal-inbox').style.display = 'block'; }
                }
                else if(action === 'openLog') {
                    gsap.to(obj.rotation, {x: -0.2, duration:0.3, yoyo:true, repeat:1});
                    setTimeout(() => document.getElementById('modal-log').style.display = 'block', 400);
                }
                else if(action === 'openTasks') {
                    gsap.to(obj.position, {y: 9.5, duration:0.2, yoyo:true, repeat:1});
                    setTimeout(() => document.getElementById('modal-tasks').style.display = 'block', 400);
                }
                else if(action === 'waterPlant') {
                    let parent = obj.parent;
                    gsap.to(parent.position, {y: 13, z:-3, x:2, duration:0.5});
                    gsap.to(parent.rotation, {z: Math.PI/4, duration:0.5, onComplete:()=>{
                        waterPlant();
                        gsap.to(parent.position, {y: 10, z:-5, x:6, duration:0.5, delay:0.5});
                        gsap.to(parent.rotation, {z: 0, duration:0.5, delay:0.5});
                    }});
                }
                else if(action === 'toggleCurtain') {
                    isCurtainOpen = !isCurtainOpen;
                    gsap.to(windowCurtainL.position, {x: isCurtainOpen ? -10 : -3, duration:1.5});
                    gsap.to(windowCurtainR.position, {x: isCurtainOpen ? 10 : 3, duration:1.5});
                    applyLightingPhase();
                }
            }
        }

        // 當 UI Modal 關閉時，把抽屜關起來
        window.closeUIModal = function(id) {
            document.getElementById('modal-'+id).style.display = 'none';
            if(id === 'replies' && leftDrawer.userData.isOpen) {
                gsap.to(leftDrawer.position, {z: 0, duration: 0.5}); leftDrawer.userData.isOpen = false;
            }
            if(id === 'inbox' && rightDrawer.userData.isOpen) {
                gsap.to(rightDrawer.position, {z: 0, duration: 0.5}); rightDrawer.userData.isOpen = false;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            renderer.render(scene, camera);
        }

        // ==========================================
        // DEVELOPER TEST PANEL FUNCTIONS
        // ==========================================
        function testTime() { curTimePhase = (curTimePhase + 1) % 6; applyLightingPhase(); }
        function testGrow() { myPlant.growth = Math.min(100, myPlant.growth + 10); rebuildPlant3D(); db.ref(`users/${currentUser.uid}/plant`).set(myPlant);}
        function testWilt() { myPlant.wilt = Math.min(7, myPlant.wilt + 1); rebuildPlant3D(); db.ref(`users/${currentUser.uid}/plant`).set(myPlant); if(myPlant.wilt>=7) document.getElementById('plant-selector').style.display='flex';}
        function testWater() { waterPlant(); }
        function testKill() { myPlant.wilt = 7; rebuildPlant3D(); db.ref(`users/${currentUser.uid}/plant`).set(myPlant); document.getElementById('plant-selector').style.display='flex'; }

    </script>
