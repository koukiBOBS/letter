<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>導師中心 - 任務與交流管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #f4f6f8; --paper: #ffffff; --text-main: #2c3e50; --text-muted: #7f8c8d; --border: #e0e6ed; --accent: #34495e; --blue: #3498db; --green: #27ae60; --red: #e74c3c; --font-main: 'Noto Sans TC', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-main); display: flex; height: 100vh; overflow: hidden;}
        
        /* Sidebar */
        nav { width: 250px; background: var(--accent); color: white; display: flex; flex-direction: column; padding: 20px 0; }
        nav h1 { font-size: 1.4rem; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;}
        .nav-item { padding: 15px 20px; cursor: pointer; transition: 0.2s; font-size: 1.05rem; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--blue); }
        .user-info { margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; color: #bdc3c7;}

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        
        h2 { font-size: 1.5rem; margin-bottom: 25px; color: var(--text-main); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .panel { background: var(--paper); border: 1px solid var(--border); border-radius: 8px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        
        button { background: var(--blue); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        button:hover { background: #2980b9; }
        button.danger { background: var(--red); } button.danger:hover { background: #c0392b; }
        input, select { border: 1px solid var(--border); padding: 10px; border-radius: 6px; outline: none; font-size: 0.95rem; }
        
        /* Grid & Lists */
        .flex-row { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 15px; }
        .list-group { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); background: #fff;}
        .list-item:last-child { border-bottom: none; }
        
        /* Communications Tree */
        .thread-box { border: 1px solid var(--border); border-left: 4px solid var(--blue); border-radius: 6px; margin-bottom: 15px; background: #fff; }
        .thread-main { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; background: #f8fafc; }
        .thread-replies { padding: 15px; border-top: 1px dashed var(--border); display: none; background: #fff; padding-left: 40px;}
        .reply-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
        .reply-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        
        /* Tags */
        .tag { font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; background: #eee; color: #555; }
        .tag.blue { background: #e3f2fd; color: #1565c0; } .tag.green { background: #e8f5e9; color: #2e7d32; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #fff; padding: 30px; border-radius: 8px; width: 90%; max-width: 500px; text-align: center; }
    </style>
</head>
<body>

    <!-- 登入 -->
    <div class="overlay" id="auth-screen">
        <div class="modal">
            <h2 style="border:none;">導師中心登入</h2>
            <button onclick="signIn()" style="width: 100%;">Google 帳號登入</button>
        </div>
    </div>

    <!-- 側邊導覽 -->
    <nav>
        <h1>導師中心</h1>
        <div class="nav-item active" onclick="switchSection('sec-classes', this)">班級與學生管理</div>
        <div class="nav-item" onclick="switchSection('sec-tasks', this)">閱讀任務排程</div>
        <div class="nav-item" onclick="switchSection('sec-random', this)">隨機任務派發</div>
        <div class="nav-item" onclick="switchSection('sec-comms', this)">大廳交流監控</div>
        <div class="user-info">目前登入：<br><span id="user-email">載入中...</span><br><br><a onclick="signOut()" style="color:#3498db; cursor:pointer;">登出</a></div>
    </nav>

    <!-- 主內容 -->
    <main>
        <!-- 班級管理 -->
        <div id="sec-classes" class="section active">
            <h2>班級與學生管理</h2>
            <div class="panel">
                <div class="flex-row">
                    <div><label>新增班級名稱</label><br><input type="text" id="new-class-name" placeholder="例如：1A班"></div>
                    <button onclick="createClass()">建立班級</button>
                </div>
            </div>
            <div id="classes-container"></div>
        </div>

        <!-- 閱讀任務排程 (具備防呆重疊檢查) -->
        <div id="sec-tasks" class="section">
            <h2>常規閱讀任務排程</h2>
            <div class="panel" style="background: #fdfefe; border-left: 4px solid var(--blue);">
                <h3 style="margin-bottom:15px; font-size:1.1rem;">新增排程</h3>
                <div class="flex-row">
                    <div><label>開始日期</label><br><input type="date" id="task-start"></div>
                    <div><label>結束日期</label><br><input type="date" id="task-end"></div>
                    <div><label>發布週期(天/回)</label><br><input type="number" id="task-int" value="7" style="width:100px;"></div>
                    <button onclick="addReadingConfig()">設定儲存</button>
                </div>
                <p style="font-size: 0.85rem; color: var(--red);" id="overlap-warning"></p>
            </div>
            
            <div class="list-group" id="reading-tasks-list"></div>
        </div>

        <!-- 隨機任務派發 -->
        <div id="sec-random" class="section">
            <h2>生活隨機任務派發</h2>
            <div class="panel">
                <p style="margin-bottom: 15px; color: var(--text-muted);">選擇一個截止日期，系統會向所有學生派發一次隨機抽籤任務。</p>
                <div class="flex-row">
                    <div><label>任務截止日期</label><br><input type="date" id="random-deadline"></div>
                    <button onclick="addRandomTask()" style="background: var(--green);">派發任務</button>
                </div>
            </div>
            <div class="list-group" id="random-tasks-list"></div>
        </div>

        <!-- 交流監控 -->
        <div id="sec-comms" class="section">
            <h2>大廳交流監控 (上帝視角)</h2>
            <div class="panel" style="padding: 15px; margin-bottom: 15px; display:flex; gap:15px; align-items:center;">
                篩選班級：<select id="filter-class" onchange="renderComms()"><option value="ALL">全部學生</option></select>
            </div>
            <div id="comms-container"></div>
        </div>
    </main>

    <script>
        // 授權登入清單
        const ALLOWED_EMAILS = ["kenchan20151@gmail.com"];

        const firebaseConfig = { apiKey: "AIzaSyCkGPRej1rMWVfm7Et6zJlrj3Bnm5-IVms", authDomain: "letter-a74d1.firebaseapp.com", databaseURL: "https://letter-a74d1-default-rtdb.firebaseio.com", projectId: "letter-a74d1" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();

        let usersDB = {}; let classesDB = {}; let readingConfig = null; let randomConfig = {}; 
        let lettersDB = {}; let convosDB = {};

        auth.onAuthStateChanged(user => {
            if (user) {
                if (ALLOWED_EMAILS.includes(user.email)) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('user-email').innerText = user.email;
                    fetchData();
                } else { auth.signOut(); alert("無權限：您的 Email 不在導師名單中。"); }
            } else { document.getElementById('auth-screen').style.display = 'flex'; }
        });

        function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function signOut() { auth.signOut().then(() => window.location.reload()); }

        function switchSection(secId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(secId).classList.add('active');
            btn.classList.add('active');
        }

        // =====================================
        // 資料讀取與渲染整合
        // =====================================
        function fetchData() {
            db.ref('users').on('value', s => { usersDB = s.val() || {}; renderClasses(); renderComms(); populateClassFilter(); });
            db.ref('classes').on('value', s => { classesDB = s.val() || {}; renderClasses(); populateClassFilter(); });
            db.ref('settings/taskConfig').on('value', s => { readingConfig = s.val() || null; renderReadingTasks(); });
            db.ref('settings/randomTasks').on('value', s => { randomConfig = s.val() || {}; renderRandomTasks(); });
            db.ref('letters').on('value', s => { lettersDB = s.val() || {}; renderComms(); });
            db.ref('conversations').on('value', s => { convosDB = s.val() || {}; renderComms(); });
        }

        // =====================================
        // 1. 班級管理
        // =====================================
        function createClass() {
            const name = document.getElementById('new-class-name').value.trim();
            if(!name) return;
            const ref = db.ref('classes').push();
            ref.set({ id: ref.key, name: name, students: {} }).then(() => document.getElementById('new-class-name').value = '');
        }

        function renderClasses() {
            const container = document.getElementById('classes-container'); container.innerHTML = '';
            
            // Unassigned Students
            let unassigned = Object.keys(usersDB).filter(uid => !usersDB[uid].classId);
            let unassignedHtml = unassigned.map(uid => `<div style="display:inline-block; background:#fff; padding:5px 10px; border:1px solid #ccc; border-radius:15px; margin:5px; font-size:0.9rem;">${usersDB[uid].name} <select style="border:none; background:transparent; outline:none;" onchange="assignStudent('${uid}', this.value)"><option value="">分配至...</option>${Object.values(classesDB).map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>`).join('');
            
            if(unassigned.length > 0) {
                container.innerHTML += `<div class="panel" style="background:#fff3e0; border-color:#ffe0b2;"><h3>未分班學生</h3><div style="margin-top:10px;">${unassignedHtml}</div></div>`;
            }

            // Classes
            Object.values(classesDB).forEach(cls => {
                let studentsHtml = (cls.students ? Object.keys(cls.students) : []).map(uid => `<span class="tag blue" style="margin:3px; display:inline-block;">${usersDB[uid]?.name || '未知'} <span style="cursor:pointer; color:red; margin-left:5px;" onclick="removeStudent('${uid}', '${cls.id}')">×</span></span>`).join('');
                container.innerHTML += `<div class="list-group" style="margin-bottom:15px;"><div class="list-item"><div><strong>${cls.name}</strong><div style="margin-top:8px;">${studentsHtml || '<span style="color:#aaa; font-size:0.8rem;">尚無學生</span>'}</div></div><button class="danger" onclick="deleteClass('${cls.id}')">刪除班級</button></div></div>`;
            });
        }

        function assignStudent(uid, classId) {
            if(!classId) return;
            db.ref(`users/${uid}/classId`).set(classId);
            db.ref(`classes/${classId}/students/${uid}`).set(true);
        }
        function removeStudent(uid, classId) {
            db.ref(`users/${uid}/classId`).remove();
            db.ref(`classes/${classId}/students/${uid}`).remove();
        }
        function deleteClass(classId) {
            if(confirm("確定刪除此班級？學生將退回未分班狀態。")) {
                let cls = classesDB[classId];
                if(cls.students) Object.keys(cls.students).forEach(uid => db.ref(`users/${uid}/classId`).remove());
                db.ref(`classes/${classId}`).remove();
            }
        }
        function populateClassFilter() {
            const select = document.getElementById('filter-class');
            select.innerHTML = '<option value="ALL">全部學生</option>' + Object.values(classesDB).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        // =====================================
        // 2. 閱讀任務防呆排程
        // =====================================
        function addReadingConfig() {
            const start = document.getElementById('task-start').value;
            const end = document.getElementById('task-end').value;
            const interval = document.getElementById('task-int').value;
            const warn = document.getElementById('overlap-warning');

            if(!start || !end || !interval) { warn.innerText = "請填寫完整日期與週期"; return; }
            const sTime = new Date(start).getTime(); const eTime = new Date(end).getTime();
            if(sTime >= eTime) { warn.innerText = "結束日期必須晚於開始日期"; return; }

            // Check Overlap
            let overlap = false;
            if(readingConfig) {
                const curS = new Date(readingConfig.startDate).getTime();
                const curE = new Date(readingConfig.endDate).getTime();
                if(sTime <= curE && eTime >= curS) overlap = true;
            }

            if(overlap) { warn.innerText = "新增失敗：與現有排程日期重疊！請先刪除舊排程。"; return; }
            warn.innerText = "";
            db.ref('settings/taskConfig').set({ startDate: start, endDate: end, intervalDays: parseInt(interval) });
        }

        function renderReadingTasks() {
            const list = document.getElementById('reading-tasks-list');
            if(!readingConfig) { list.innerHTML = '<div class="list-item" style="color:#888;">目前無閱讀任務排程</div>'; return; }
            list.innerHTML = `<div class="list-item"><div><strong>現行排程期間</strong><br><span style="font-size:0.9rem; color:#666;">${readingConfig.startDate} 至 ${readingConfig.endDate} (每 ${readingConfig.intervalDays} 天一回)</span></div><button class="danger" onclick="deleteReadingConfig()">刪除排程</button></div>`;
        }
        function deleteReadingConfig() { if(confirm('確定刪除此排程？')) db.ref('settings/taskConfig').remove(); }

        // =====================================
        // 3. 隨機任務派發
        // =====================================
        function addRandomTask() {
            const deadline = document.getElementById('random-deadline').value;
            if(!deadline) return alert("請選擇截止日期");
            const ref = db.ref('settings/randomTasks').push();
            ref.set({ id: ref.key, deadline: deadline }).then(() => document.getElementById('random-deadline').value='');
        }
        function renderRandomTasks() {
            const list = document.getElementById('random-tasks-list'); list.innerHTML = '';
            if(Object.keys(randomConfig).length === 0) { list.innerHTML = '<div class="list-item" style="color:#888;">目前無派發隨機任務</div>'; return; }
            Object.values(randomConfig).sort((a,b)=>new Date(b.deadline)-new Date(a.deadline)).forEach((task, idx) => {
                list.innerHTML += `<div class="list-item"><div><strong>隨機生活任務 #${Object.keys(randomConfig).length - idx}</strong><br><span style="font-size:0.9rem; color:#666;">截止日期：${task.deadline}</span></div><button class="danger" onclick="deleteRandomTask('${task.id}')">刪除</button></div>`;
            });
        }
        function deleteRandomTask(id) { if(confirm('確定刪除？')) db.ref(`settings/randomTasks/${id}`).remove(); }

        // =====================================
        // 4. 交流監控 (上帝視角)
        // =====================================
        function renderComms() {
            const container = document.getElementById('comms-container'); container.innerHTML = '';
            const filterClass = document.getElementById('filter-class').value;
            
            let sortedLetters = Object.values(lettersDB).sort((a,b) => b.timestamp - a.timestamp);
            
            sortedLetters.forEach(letter => {
                let sender = usersDB[letter.senderUid];
                let recipient = usersDB[letter.recipientUid];
                
                // Filter logic
                if(filterClass !== "ALL") {
                    if((!sender || sender.classId !== filterClass) && (!recipient || recipient.classId !== filterClass)) return;
                }

                let sName = sender ? sender.name : '未知學生';
                let rName = recipient ? recipient.name : '等待配對中...';
                let typeBadge = letter.taskType === 'random' ? `<span class="tag" style="background:#9b59b6; color:#fff;">隨機任務</span>` : `<span class="tag green">閱讀任務</span>`;
                
                let html = `<div class="thread-box">
                    <div class="thread-main" onclick="toggleReplies('${letter.id}')">
                        <div style="flex:1;">
                            <div style="margin-bottom:8px;">${typeBadge} <strong style="font-size:1.1rem; color:#2c3e50;">${sName}</strong> 寄給 <strong>${rName}</strong></div>
                            <div style="font-size:0.9rem; color:#555; background:#f1f2f6; padding:10px; border-radius:6px;">
                                <strong>任務內容/書名：</strong>${letter.taskType === 'random' ? letter.randomTaskDesc : letter.bookTitle}<br>
                                <strong>首次感悟：</strong>${letter.reflections}
                                ${letter.imageUrl ? `<br><a href="${letter.imageUrl}" target="_blank" style="color:#3498db; text-decoration:none; font-size:0.85rem;">📸 查看附圖</a>` : ''}
                            </div>
                        </div>
                        <div style="color:#3498db; font-size:0.9rem; margin-left:15px;">展開對話 ▾</div>
                    </div>
                    <div class="thread-replies" id="replies-${letter.id}">`;
                
                let threadMsgs = convosDB[letter.id] ? Object.values(convosDB[letter.id]).sort((a,b)=>a.timestamp-b.timestamp) : [];
                if(threadMsgs.length === 0) {
                    html += `<div style="color:#999; font-size:0.9rem;">尚無後續回覆。</div>`;
                } else {
                    threadMsgs.forEach(msg => {
                        let mName = usersDB[msg.senderUid] ? usersDB[msg.senderUid].name : '未知';
                        let dateStr = new Date(msg.timestamp).toLocaleString();
                        html += `<div class="reply-item">
                            <div style="font-size:0.85rem; color:#7f8c8d; margin-bottom:5px;"><strong>${mName}</strong> 於 ${dateStr} 回覆：</div>
                            <div style="font-size:0.95rem; color:#2c3e50;">${msg.text}</div>
                        </div>`;
                    });
                }
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
        function toggleReplies(id) {
            let el = document.getElementById(`replies-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

    </script>
</body>
</html>
