<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紙短情長 - 導師中心</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            /* Dashboard Colors */
            --bg: #f4f6f8; --paper: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
            --primary: #475569; --primary-hover: #334155; --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
            --font-sans: 'Inter', sans-serif; --font-serif: 'Noto Serif TC', serif;
            
            /* Letter Styles (Imported from Student App) */
            --color-replies: #548ca8; --color-inbox: #d98a6c;
            --letter-paper: #fbf9f4; --letter-ink: #4a4238; --letter-line: rgba(160, 140, 120, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; display: flex; min-height: 100vh;}

        /* --- Sidebar --- */
        .sidebar { width: 260px; background: var(--paper); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;}
        .brand { padding: 30px 25px; font-family: var(--font-serif); font-size: 1.5rem; font-weight: 600; color: var(--text-main); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;}
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 15px 25px; font-size: 1.05rem; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-weight: 500;}
        .nav-item:hover { background: #f8fafc; color: var(--primary); }
        .nav-item.active { background: #f1f5f9; color: var(--primary); border-right: 4px solid var(--primary); }
        .user-info { padding: 20px 25px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); }
        .logout-btn { display: inline-block; margin-top: 10px; color: var(--red); cursor: pointer; text-decoration: none; font-weight: 500;}

        /* --- Main Content --- */
        .main-content { flex: 1; margin-left: 260px; padding: 40px; overflow-y: auto; }
        .page-header { margin-bottom: 30px; }
        .page-title { font-size: 1.8rem; font-weight: 600; font-family: var(--font-serif); }
        
        .section-container { display: none; }
        .section-container.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Panels & Cards --- */
        .panel { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .panel-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: var(--text-main); display: flex; justify-content: space-between; align-items: center;}
        
        /* Form Elements */
        .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 200px; }
        label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        input, select { border: 1px solid #cbd5e1; padding: 12px 15px; font-size: 1rem; border-radius: 8px; outline: none; background: #fff; transition: 0.2s;}
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(71, 85, 105, 0.1); }
        
        .btn { background: var(--primary); color: #fff; border: none; padding: 12px 24px; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;}
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: #fee2e2; color: var(--red); border: 1px solid #fecaca; }
        .btn-danger:hover { background: #fca5a5; color: #fff; }

        /* Tables & Lists */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { color: var(--text-muted); font-weight: 500; font-size: 0.9rem; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .task-card { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative;}
        .task-date { font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
        .task-index { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; }
        
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .s-ok { background: #dcfce7; color: var(--green); }
        .s-late { background: #fef3c7; color: var(--yellow); }
        .s-miss { background: #fee2e2; color: var(--red); }

        /* --- Letter Reading Modal (Identical to Student View) --- */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #modal-reader { position: fixed; inset: 0; background: rgba(20, 18, 16, 0.88); z-index: 5000; display: none; justify-content: center; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(8px); }
        .modal-close-btn { position: fixed; top: 20px; right: 30px; background: transparent; border: none; font-size: 2.5rem; color: #e6dfd1; cursor: pointer; z-index: 5100; transition: 0.3s; }
        .modal-close-btn:hover { transform: scale(1.1); color: #fff; }
        
        .letter-desk { width: 100%; max-width: 720px; margin: auto; display: flex; flex-direction: column; gap: 40px; position: relative; }
        .letter-sheet { background-color: var(--letter-paper); box-shadow: 0 30px 60px rgba(0,0,0,0.35); padding: 60px 8% 80px 8%; border-radius: 4px; }
        .letter-sheet.my-letter { background-color: #faf6eb; border-left: 4px solid var(--color-replies); }
        .letter-sheet.partner-letter { background-color: #fcfbfa; border-left: 4px solid var(--color-inbox); }
        .letter-header-meta { display: flex; justify-content: space-between; font-family: var(--font-serif); font-size: 0.95rem; color: #a48c76; margin-bottom: 40px; border-bottom: 1px dashed rgba(160, 140, 120, 0.3); padding-bottom: 15px; font-weight: 600;}
        .letter-text { font-family: var(--font-serif); font-size: 1.12rem; color: var(--letter-ink); line-height: 40px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, var(--letter-line) 39px, var(--letter-line) 40px); white-space: pre-wrap; word-break: break-word; }
        .letter-section-divider { display: inline-block; width: 100%; text-align: center; font-size: 0.95rem; color: #9c8a75; letter-spacing: 0.6em; margin: 0; line-height: 40px; position: relative; font-weight: 400; font-family: var(--font-serif); vertical-align: top; }
        .letter-img-wrap { display: block; width: fit-content; margin: 40px auto; text-align: center; transform: rotate(-2deg); }
        .letter-img { max-width: 90%; max-height: 380px; object-fit: cover; background-color: #fff; padding: 12px 12px 40px 12px; border: 1px solid #e6e1d6; box-shadow: 0 8px 25px rgba(140, 120, 100, 0.15); display: block; border-radius: 4px; }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; align-items: center; justify-content: space-between; padding: 0 15px;}
            .brand { border-bottom: none; padding: 15px 0;}
            .nav-menu { display: flex; padding: 0; overflow-x: auto;}
            .nav-item { padding: 15px; border-right: none !important; border-bottom: 2px solid transparent; }
            .nav-item.active { border-bottom: 2px solid var(--primary); }
            .user-info { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
            .letter-sheet { padding: 40px 6% 50px 6%; }
        }
    </style>
</head>
<body>

    <!-- 登入畫面 -->
    <div class="overlay" id="auth-screen">
        <div class="panel" style="text-align: center; max-width: 400px; width: 90%;">
            <h2 style="font-family: var(--font-serif); margin-bottom: 10px;">紙短情長</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">導師管理中心</p>
            <button class="btn" style="width: 100%; justify-content: center;" onclick="signIn()">
                <svg style="width:20px;height:20px;" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C8.36,19.27 5,16.25 5,12C5,7.9 8.2,4.73 12.2,4.73C15.29,4.73 17.1,6.7 17.1,6.7L19,4.72C19,4.72 16.56,2 12.1,2C6.42,2 2.03,6.8 2.03,12C2.03,17.05 6.36,22 12.2,22C17.6,22 21.5,18.33 21.5,12.91C21.5,11.76 21.35,11.1 21.35,11.1V11.1Z" /></svg>
                使用 Google 帳號登入
            </button>
        </div>
    </div>

    <!-- 側邊欄 -->
    <nav class="sidebar">
        <div class="brand">✍️ 導師中心</div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchPage('page-classes')">班級管理</div>
            <div class="nav-item" onclick="switchPage('page-tasks')">任務派發</div>
            <div class="nav-item" onclick="switchPage('page-records')">作業批閱</div>
        </div>
        <div class="user-info">
            <div id="user-email">載入中...</div>
            <a class="logout-btn" onclick="signOut()">登出系統</a>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="main-content">
        
        <!-- 班級管理頁面 -->
        <section id="page-classes" class="section-container active">
            <div class="page-header"><h1 class="page-title">班級管理</h1></div>
            
            <div class="panel">
                <div class="panel-title">建立新班級</div>
                <div class="form-row" style="align-items: flex-end;">
                    <div class="form-group">
                        <label>班級名稱</label>
                        <input type="text" id="new-class-name" placeholder="例如：中一A班">
                    </div>
                    <button class="btn" onclick="createClass()">新增班級</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">學生名單與分班</div>
                <table class="data-table" id="students-table">
                    <thead><tr><th>學生姓名</th><th>Email</th><th>目前班級</th><th>操作</th></tr></thead>
                    <tbody><!-- 動態載入 --></tbody>
                </table>
            </div>
        </section>

        <!-- 任務派發頁面 -->
        <section id="page-tasks" class="section-container">
            <div class="page-header"><h1 class="page-title">任務派發</h1></div>
            
            <div class="panel">
                <div class="panel-title">選擇班級</div>
                <select id="task-class-select" style="width: 100%; max-width: 400px;" onchange="renderTasksList()"></select>
            </div>

            <div class="form-row">
                <!-- 週期派發 -->
                <div class="panel" style="flex: 2; margin-bottom: 0;">
                    <div class="panel-title">按時段週期派發</div>
                    <div class="form-row">
                        <div class="form-group"><label>開始日期</label><input type="date" id="periodic-start"></div>
                        <div class="form-group"><label>結束日期</label><input type="date" id="periodic-end"></div>
                        <div class="form-group"><label>間隔天數</label><input type="number" id="periodic-interval" min="1" placeholder="例：7"></div>
                    </div>
                    <button class="btn" onclick="assignPeriodicTasks()">批次派發</button>
                </div>

                <!-- 單次派發 -->
                <div class="panel" style="flex: 1; margin-bottom: 0;">
                    <div class="panel-title">單次指定派發</div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>指定日期</label>
                        <input type="date" id="single-date">
                    </div>
                    <button class="btn btn-outline" style="width: 100%; justify-content: center;" onclick="assignSingleTask()">加派單次任務</button>
                </div>
            </div>

            <div class="panel" style="margin-top: 30px;">
                <div class="panel-title">已派發任務列表</div>
                <div class="grid-container" id="tasks-grid">
                    <!-- 動態載入 -->
                </div>
            </div>
        </section>

        <!-- 作業批閱頁面 -->
        <section id="page-records" class="section-container">
            <div class="page-header"><h1 class="page-title">作業批閱</h1></div>
            
            <div class="panel">
                <div class="panel-title">篩選</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>選擇班級</label>
                        <select id="record-class-select" onchange="renderRecords()"></select>
                    </div>
                    <div class="form-group">
                        <label>選擇學生</label>
                        <select id="record-student-select" onchange="renderRecords()"></select>
                    </div>
                </div>
            </div>

            <div id="records-container">
                <!-- 動態載入學生卡片與任務進度 -->
            </div>
        </section>

    </main>

    <!-- 信件閱讀器 Modal -->
    <div id="modal-reader">
        <button class="modal-close-btn" onclick="closeReaderModal()">×</button>
        <div class="letter-desk" id="chat-flow">
            <!-- 動態載入真實信件樣式 -->
        </div>
    </div>

    <script>
        const ALLOWED_EMAILS = ["kenchan20151@gmail.com"];

        const firebaseConfig = { apiKey: "AIzaSyCkGPRej1rMWVfm7Et6zJlrj3Bnm5-IVms", authDomain: "letter-a74d1.firebaseapp.com", databaseURL: "https://letter-a74d1-default-rtdb.firebaseio.com", projectId: "letter-a74d1" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();

        let dbClasses = {};
        let dbUsers = {};
        let dbLetters = {};
        
        // 確保預設班級存在
        function ensureDefaultClass() {
            if (!dbClasses['default']) {
                db.ref('classes/default').set({ name: "預設班", tasks: [] });
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                if (ALLOWED_EMAILS.includes(user.email)) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('user-email').innerText = user.email;
                    initDataListeners();
                } else {
                    auth.signOut(); alert("無權限：您的 Email 不在導師名單中。");
                }
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => console.error(err)); }
        function signOut() { auth.signOut().then(() => window.location.reload()); }

        // ==========================================
        // 資料監聽與初始化
        // ==========================================
        function initDataListeners() {
            db.ref('classes').on('value', snap => {
                dbClasses = snap.val() || {};
                ensureDefaultClass();
                updateClassSelects();
                if(document.getElementById('page-classes').classList.contains('active')) renderStudentsTable();
                if(document.getElementById('page-tasks').classList.contains('active')) renderTasksList();
            });

            db.ref('users').on('value', snap => {
                dbUsers = snap.val() || {};
                if(document.getElementById('page-classes').classList.contains('active')) renderStudentsTable();
                updateStudentSelect();
                if(document.getElementById('page-records').classList.contains('active')) renderRecords();
            });

            db.ref('letters').on('value', snap => {
                dbLetters = snap.val() || {};
                if(document.getElementById('page-records').classList.contains('active')) renderRecords();
            });
        }

        function switchPage(pageId) {
            document.querySelectorAll('.section-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');

            if(pageId === 'page-classes') renderStudentsTable();
            if(pageId === 'page-tasks') renderTasksList();
            if(pageId === 'page-records') renderRecords();
        }

        // ==========================================
        // 班級管理邏輯
        // ==========================================
        function createClass() {
            const name = document.getElementById('new-class-name').value.trim();
            if(!name) return alert("請輸入班級名稱");
            const newRef = db.ref('classes').push();
            newRef.set({ name: name, tasks: [] }).then(() => {
                document.getElementById('new-class-name').value = '';
                alert("班級建立成功！");
            });
        }

        function updateClassSelects() {
            let options = '';
            for(let cid in dbClasses) {
                options += `<option value="${cid}">${escapeHtml(dbClasses[cid].name)}</option>`;
            }
            const taskSelect = document.getElementById('task-class-select');
            const recordSelect = document.getElementById('record-class-select');
            const currentTaskVal = taskSelect.value; const currentRecVal = recordSelect.value;
            
            taskSelect.innerHTML = options; recordSelect.innerHTML = '<option value="all">所有班級</option>' + options;
            
            if(currentTaskVal && dbClasses[currentTaskVal]) taskSelect.value = currentTaskVal;
            if(currentRecVal && (dbClasses[currentRecVal] || currentRecVal==='all')) recordSelect.value = currentRecVal;
        }

        function renderStudentsTable() {
            const tbody = document.querySelector('#students-table tbody');
            tbody.innerHTML = '';
            let classOptions = '';
            for(let cid in dbClasses) classOptions += `<option value="${cid}">${escapeHtml(dbClasses[cid].name)}</option>`;

            for(let uid in dbUsers) {
                const u = dbUsers[uid];
                const userClassId = u.classId || 'default';
                const selectHtml = `
                    <select onchange="changeStudentClass('${uid}', this.value)" style="padding: 6px; font-size: 0.9rem;">
                        ${classOptions.replace(`value="${userClassId}"`, `value="${userClassId}" selected`)}
                    </select>
                `;
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: 500;">${escapeHtml(u.name)}</td>
                        <td style="color: var(--text-muted);">${escapeHtml(u.email)}</td>
                        <td>${dbClasses[userClassId] ? escapeHtml(dbClasses[userClassId].name) : '未知'}</td>
                        <td>${selectHtml}</td>
                    </tr>
                `;
            }
        }

        function changeStudentClass(uid, newClassId) {
            db.ref(`users/${uid}/classId`).set(newClassId).then(() => alert("已更新學生班級"));
        }

        // ==========================================
        // 任務派發邏輯
        // ==========================================
        function renderTasksList() {
            const cid = document.getElementById('task-class-select').value;
            const grid = document.getElementById('tasks-grid');
            if(!cid || !dbClasses[cid]) return;

            const tasks = dbClasses[cid].tasks || [];
            grid.innerHTML = '';
            if(tasks.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1;">此班級尚未派發任何任務。</p>';
                return;
            }

            tasks.forEach((dateStr, index) => {
                grid.innerHTML += `
                    <div class="task-card">
                        <div class="task-index">第 ${index + 1} 回任務</div>
                        <div class="task-date">${dateStr}</div>
                        <button class="btn btn-danger" style="position:absolute; top:20px; right:20px; padding: 6px 12px; font-size:0.85rem;" onclick="deleteTask('${cid}', ${index})">刪除</button>
                    </div>
                `;
            });
        }

        function assignPeriodicTasks() {
            const cid = document.getElementById('task-class-select').value;
            const start = document.getElementById('periodic-start').value;
            const end = document.getElementById('periodic-end').value;
            const interval = parseInt(document.getElementById('periodic-interval').value);

            if(!cid || !start || !end || !interval) return alert("請填寫完整參數。");

            let startDate = new Date(start); const endDate = new Date(end);
            let newDates = [];
            while(startDate <= endDate) {
                newDates.push(startDate.toISOString().split('T')[0]);
                startDate.setDate(startDate.getDate() + interval);
            }

            let existingTasks = dbClasses[cid].tasks || [];
            
            // 衝突檢查：如果新生成的日期落在已有任務的最早與最晚日期之間，提示重疊
            if (existingTasks.length > 0) {
                const earliest = new Date(existingTasks[0]);
                const latest = new Date(existingTasks[existingTasks.length - 1]);
                const newFirst = new Date(newDates[0]);
                const newLast = new Date(newDates[newDates.length - 1]);

                if ((newFirst <= latest && newFirst >= earliest) || (newLast <= latest && newLast >= earliest) || (newFirst <= earliest && newLast >= latest)) {
                    return alert("衝突錯誤：您選擇的區間與該班級現有的任務區間重疊！\n請更換區間，或使用「單次指定派發」在空檔日加派任務。");
                }
            }

            // 合併並排序
            let combined = [...new Set([...existingTasks, ...newDates])].sort();
            db.ref(`classes/${cid}/tasks`).set(combined).then(() => {
                alert("批次派發成功！");
                document.getElementById('periodic-start').value = '';
                document.getElementById('periodic-end').value = '';
                document.getElementById('periodic-interval').value = '';
            });
        }

        function assignSingleTask() {
            const cid = document.getElementById('task-class-select').value;
            const dateStr = document.getElementById('single-date').value;
            if(!cid || !dateStr) return alert("請選擇日期");

            let existingTasks = dbClasses[cid].tasks || [];
            if(existingTasks.includes(dateStr)) return alert("該日期已經有任務了！");

            existingTasks.push(dateStr);
            existingTasks.sort();
            db.ref(`classes/${cid}/tasks`).set(existingTasks).then(() => {
                alert("加派單次任務成功！");
                document.getElementById('single-date').value = '';
            });
        }

        function deleteTask(cid, index) {
            if(!confirm(`確定要刪除第 ${index+1} 回任務嗎？\n注意：這可能會影響已依據此回數繳交的學生紀錄對應。`)) return;
            let tasks = dbClasses[cid].tasks || [];
            tasks.splice(index, 1);
            db.ref(`classes/${cid}/tasks`).set(tasks);
        }

        // ==========================================
        // 作業批閱邏輯
        // ==========================================
        function updateStudentSelect() {
            const cid = document.getElementById('record-class-select').value;
            const stuSelect = document.getElementById('record-student-select');
            let options = '<option value="all">所有學生</option>';
            for(let uid in dbUsers) {
                if(cid === 'all' || (dbUsers[uid].classId || 'default') === cid) {
                    options += `<option value="${uid}">${escapeHtml(dbUsers[uid].name)}</option>`;
                }
            }
            stuSelect.innerHTML = options;
        }

        function renderRecords() {
            const cidFilter = document.getElementById('record-class-select').value;
            const uidFilter = document.getElementById('record-student-select').value;
            const container = document.getElementById('records-container');
            container.innerHTML = '';

            const lettersArray = Object.values(dbLetters);

            for(let uid in dbUsers) {
                const u = dbUsers[uid];
                const uClassId = u.classId || 'default';
                if(cidFilter !== 'all' && uClassId !== cidFilter) continue;
                if(uidFilter !== 'all' && uid !== uidFilter) continue;

                const classData = dbClasses[uClassId];
                if(!classData || !classData.tasks || classData.tasks.length === 0) continue;

                let tasksHtml = '';
                classData.tasks.forEach((deadlineStr, index) => {
                    const deadline = new Date(deadlineStr);
                    // 根據 senderUid 和 taskIndex 找信件
                    const letter = lettersArray.find(l => l.senderUid === uid && l.taskIndex === index);
                    
                    let statusClass = "s-miss"; let statusText = "未交"; let btnHtml = '';
                    if(letter) {
                        const submitTime = new Date(letter.timestamp);
                        if(submitTime.setHours(0,0,0,0) <= deadline.setHours(0,0,0,0)) { statusClass = "s-ok"; statusText = "準時"; } 
                        else { statusClass = "s-late"; statusText = "遲交"; }
                        btnHtml = `<button class="btn btn-outline" style="width:100%; padding: 8px; margin-top:10px; font-size:0.9rem;" onclick="openReaderModal('${letter.id}')">批閱交流</button>`;
                    }

                    tasksHtml += `
                        <div style="border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: center;">
                            <div style="font-size:0.9rem; font-weight:600; margin-bottom:5px;">第 ${index+1} 回</div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <div style="font-size:0.8rem; color:var(--text-muted); margin-top:10px;">期限: ${deadlineStr}</div>
                            ${btnHtml}
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div class="panel" style="padding: 20px;">
                        <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px; display:flex; align-items:center; gap:10px;">
                            <span>🧑‍🎓 ${escapeHtml(u.name)}</span>
                            <span style="font-size:0.85rem; color:var(--text-muted); font-weight:400;">(${escapeHtml(dbClasses[uClassId].name)})</span>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px;">
                            ${tasksHtml}
                        </div>
                    </div>
                `;
            }
        }

        // ==========================================
        // 閱讀器與信件渲染 (原汁原味)
        // ==========================================
        function escapeHtml(str) { return str?str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):str; }

        function openReaderModal(letterId) {
            const letter = dbLetters[letterId];
            if(!letter) return;
            
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '<div style="text-align:center; color:#fff;">載入中...</div>';
            document.getElementById('modal-reader').style.display = 'flex';
            document.body.style.overflow = 'hidden';

            db.ref(`conversations/${letterId}`).once('value').then(snap => {
                const messages = snap.val() || {};
                let contentHTML = '';

                Object.values(messages).forEach(m => {
                    const senderName = dbUsers[m.senderUid] ? dbUsers[m.senderUid].name : '未知學生';
                    const isOriginalSender = m.senderUid === letter.senderUid; // 判斷是樓主還是回覆者
                    
                    const d = new Date(m.timestamp);
                    const tStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    
                    let formattedText = escapeHtml(m.text)
                        .replace(/【目前進度】/g, '<span class="letter-section-divider">目前閱讀頁數</span>')
                        .replace(/【思考問題】/g, '<span class="letter-section-divider">思考問題</span>')
                        .replace(/【閱讀心得】/g, '<span class="letter-section-divider">閱讀感悟</span>');
                    
                    let imgTag = m.imageUrl ? `<a href="${m.imageUrl}" target="_blank" class="letter-img-wrap"><img src="${m.imageUrl}" class="letter-img" loading="lazy"></a>` : '';
                    
                    // 根據身分給予不同的顏色 (與學生端邏輯一致)
                    const sheetClass = isOriginalSender ? 'my-letter' : 'partner-letter';
                    const icon = isOriginalSender ? '✍️' : '📬';

                    contentHTML += `
                        <div class="letter-sheet ${sheetClass}">
                            <div class="letter-header-meta">
                                <span>${icon} [${escapeHtml(senderName)}] 的${isOriginalSender?'手札':'回音'}</span>
                                <span>${tStr}</span>
                            </div>
                            <div class="letter-text">${formattedText}</div>
                            ${imgTag}
                        </div>`;
                });

                flow.innerHTML = contentHTML;
            });
        }

        function closeReaderModal() {
            document.getElementById('modal-reader').style.display = 'none';
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
