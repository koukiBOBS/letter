<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>導師中心</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #f9f9f9;
            --paper: #ffffff;
            --text-main: #333333;
            --text-muted: #888888;
            --border: #e0e0e0;
            --accent: #555555;
            --green: #2e7d32;
            --red: #c62828;
            --yellow: #f57f17;
            --font-main: 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-main); }

        header {
            max-width: 1000px; margin: 30px auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 15px;
        }
        h1 { font-size: 1.5rem; font-weight: 500; }

        main { max-width: 1000px; margin: 0 auto 100px; padding: 0 20px; }

        /* 面板設計 */
        .panel { background: var(--paper); border: 1px solid var(--border); border-radius: 6px; padding: 25px; margin-bottom: 30px; }
        .panel-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* 表單 */
        .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
        label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        input { border: 1px solid var(--border); padding: 10px; font-size: 0.95rem; border-radius: 4px; outline: none; }
        button { background: var(--text-main); color: #fff; border: none; padding: 10px 20px; font-size: 0.95rem; border-radius: 4px; cursor: pointer; }
        button:hover { background: var(--accent); }

        /* 頁籤切換 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); }
        .tab-btn.active { background: var(--text-main); color: #fff; }

        /* 列表樣式 (手風琴) */
        .list-item { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; background: var(--paper); }
        .list-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .list-header:hover { background: #f0f0f0; }
        .list-title { font-weight: 500; font-size: 1rem; }
        .list-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-left: 10px; }
        .list-body { display: none; padding: 20px; border-top: 1px solid var(--border); }

        /* 網格 (任務節點/學生節點) */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .grid-card { border: 1px solid var(--border); border-radius: 4px; padding: 15px; background: #fff; text-align: center; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; margin: 10px 0; font-weight: 500; }
        .s-ok { background: #e8f5e9; color: var(--green); }
        .s-late { background: #fff3e0; color: var(--yellow); }
        .s-miss { background: #ffebee; color: var(--red); }
        .read-btn { background: none; border: 1px solid var(--border); color: var(--text-main); font-size: 0.8rem; padding: 5px 15px; margin-top: 5px; }
        .read-btn:hover { background: #f0f0f0; }

        /* 登入與彈窗 */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--paper); padding: 30px; width: 100%; max-width: 600px; border-radius: 6px; position: relative; max-height: 80vh; overflow-y: auto;}
    </style>
</head>
<body>

    <!-- 登入畫面 -->
    <div class="overlay" id="auth-screen">
        <h2 style="margin-bottom: 20px; font-weight: 500;">導師中心登入</h2>
        <button onclick="signIn()">Google 登入</button>
    </div>

    <header>
        <h1>導師中心</h1>
        <div>
            <span id="user-email" style="font-size:0.85rem; color:var(--text-muted); margin-right:15px;">載入中...</span>
            <a onclick="signOut()" style="cursor:pointer; font-size:0.85rem; text-decoration:underline;">登出</a>
        </div>
    </header>

    <main>
        <!-- 任務設定 -->
        <div class="panel">
            <div class="panel-title">任務設定</div>
            <div class="form-row">
                <div class="form-group">
                    <label>開始日期</label>
                    <input type="date" id="start-date">
                </div>
                <div class="form-group">
                    <label>結束日期</label>
                    <input type="date" id="end-date">
                </div>
                <div class="form-group">
                    <label>週期 (天/回)</label>
                    <input type="number" id="interval" min="1" placeholder="例：7">
                </div>
            </div>
            <button onclick="saveConfig()">儲存設定</button>
        </div>

        <!-- 繳交紀錄 -->
        <div class="panel">
            <div class="panel-title" style="display:flex; justify-content:space-between; border:none; margin-bottom:10px;">
                <span>繳交紀錄</span>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" id="tab-student" onclick="switchTab('student')">依學生</button>
                <button class="tab-btn" id="tab-task" onclick="switchTab('task')">依任務</button>
            </div>

            <!-- 視角內容容器 -->
            <div id="data-container"></div>
        </div>
    </main>

    <!-- 預覽彈窗 -->
    <div class="modal" id="preview-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title" style="margin-bottom:15px;">標題</h3>
            <p id="modal-text" style="white-space: pre-wrap; line-height:1.6; font-size:0.95rem;"></p>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 設定允許登入的 Email 列表 (請填寫真實的導師Email)
        // ==========================================
        const ALLOWED_EMAILS = [
            "teacher@example.com", 
            "admin@school.edu.hk",
            "your.email@gmail.com" // 換成你的
        ];

        // 2. Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyCkGPRej1rMWVfm7Et6zJlrj3Bnm5-IVms",
            authDomain: "letter-a74d1.firebaseapp.com",
            databaseURL: "https://letter-a74d1-default-rtdb.firebaseio.com",
            projectId: "letter-a74d1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 3. 全域資料變數
        let configData = null;
        let usersData = {};
        let lettersData = [];
        let currentView = 'student'; // 'student' 或 'task'

        // ==========================================
        // 登入驗證邏輯
        // ==========================================
        auth.onAuthStateChanged(user => {
            if (user) {
                if (ALLOWED_EMAILS.includes(user.email)) {
                    // 允許登入
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('user-email').innerText = user.email;
                    fetchData();
                } else {
                    // 不在名單內，強制登出
                    auth.signOut();
                    alert("無權限：您的 Email 不在導師名單中。");
                }
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => console.error(err));
        }

        function signOut() {
            auth.signOut().then(() => window.location.reload());
        }

        // ==========================================
        // 資料讀取與寫入
        // ==========================================
        function fetchData() {
            // 讀取設定
            db.ref('settings/taskConfig').on('value', snap => {
                configData = snap.val();
                if (configData) {
                    document.getElementById('start-date').value = configData.startDate;
                    document.getElementById('end-date').value = configData.endDate;
                    document.getElementById('interval').value = configData.intervalDays;
                }
                renderView();
            });

            // 讀取學生
            db.ref('users').on('value', snap => {
                usersData = snap.val() || {};
                renderView();
            });

            // 讀取信件(作業)
            db.ref('letters').on('value', snap => {
                const data = snap.val() || {};
                lettersData = Object.values(data);
                renderView();
            });
        }

        function saveConfig() {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            const interval = parseInt(document.getElementById('interval').value);

            if (!start || !end || !interval) return alert("請填寫完整設定。");

            db.ref('settings/taskConfig').set({
                startDate: start, endDate: end, intervalDays: interval
            }).then(() => alert("設定已儲存！"));
        }

        // ==========================================
        // 介面渲染 (切換視角)
        // ==========================================
        function switchTab(tab) {
            currentView = tab;
            document.getElementById('tab-student').className = tab === 'student' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-task').className = tab === 'task' ? 'tab-btn active' : 'tab-btn';
            renderView();
        }

        function renderView() {
            const container = document.getElementById('data-container');
            if (!configData) {
                container.innerHTML = '<p style="color:var(--text-muted)">請先完成並儲存上方的任務設定。</p>';
                return;
            }
            
            container.innerHTML = '';
            if (currentView === 'student') {
                renderByStudent(container);
            } else {
                renderByTask(container);
            }
        }

        // 展開/收合控制
        function toggleList(id) {
            const el = document.getElementById(`list-body-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        // --- 視角 1：依學生 ---
        function renderByStudent(container) {
            const totalTasks = calculateTotalTasks();
            
            Object.keys(usersData).forEach(uid => {
                const student = usersData[uid];
                let html = `
                    <div class="list-item">
                        <div class="list-header" onclick="toggleList('${uid}')">
                            <div><span class="list-title">${escapeHtml(student.name)}</span> <span class="list-subtitle">${escapeHtml(student.email)}</span></div>
                            <span style="font-size:0.8rem;">展開 ▾</span>
                        </div>
                        <div class="list-body" id="list-body-${uid}">
                            <div class="grid-container">
                `;

                for (let i = 0; i < totalTasks; i++) {
                    const deadline = getTaskDeadline(i);
                    // 尋找該學生的該回作業
                    const letter = lettersData.find(l => l.senderUid === uid && l.taskIndex === i);
                    html += buildCard(i + 1, deadline, letter);
                }

                html += `</div></div></div>`;
                container.innerHTML += html;
            });
        }

        // --- 視角 2：依任務 ---
        function renderByTask(container) {
            const totalTasks = calculateTotalTasks();

            for (let i = 0; i < totalTasks; i++) {
                const deadline = getTaskDeadline(i);
                const taskId = `task-${i}`;
                
                let html = `
                    <div class="list-item">
                        <div class="list-header" onclick="toggleList('${taskId}')">
                            <div><span class="list-title">第 ${i + 1} 回</span> <span class="list-subtitle">截止: ${formatDate(deadline)}</span></div>
                            <span style="font-size:0.8rem;">展開 ▾</span>
                        </div>
                        <div class="list-body" id="list-body-${taskId}">
                            <div class="grid-container">
                `;

                Object.keys(usersData).forEach(uid => {
                    const student = usersData[uid];
                    const letter = lettersData.find(l => l.senderUid === uid && l.taskIndex === i);
                    html += buildCard(student.name, deadline, letter);
                });

                html += `</div></div></div>`;
                container.innerHTML += html;
            }
        }

        // ==========================================
        // 輔助與共用元件
        // ==========================================
        function calculateTotalTasks() {
            const start = new Date(configData.startDate);
            const end = new Date(configData.endDate);
            const msDays = 1000 * 60 * 60 * 24;
            return Math.floor(((end - start) / msDays) / configData.intervalDays);
        }

        function getTaskDeadline(taskIndex) {
            const start = new Date(configData.startDate);
            return new Date(start.getTime() + (taskIndex + 1) * configData.intervalDays * 24 * 60 * 60 * 1000);
        }

        function buildCard(titleText, deadline, letter) {
            let statusClass = "s-miss";
            let statusText = "未交";
            let actionBtn = "";

            if (letter) {
                const subTime = new Date(letter.timestamp);
                if (subTime <= deadline) {
                    statusClass = "s-ok"; statusText = "準時";
                } else {
                    statusClass = "s-late"; statusText = "遲交";
                }
                const safeBook = escapeHtml(letter.bookTitle);
                const safeContent = escapeHtml(letter.reflections).replace(/\n/g, '\\n');
                actionBtn = `<button class="read-btn" onclick="openModal('${safeBook}', '${safeContent}')">閱讀</button>`;
            }

            return `
                <div class="grid-card">
                    <div style="font-size:0.9rem; font-weight:500;">${titleText}</div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:10px;">截止: ${formatDate(deadline)}</div>
                    ${actionBtn}
                </div>
            `;
        }

        function formatDate(dateObj) {
            return `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
        }

        function escapeHtml(str) {
            if(!str) return "";
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // 閱讀彈窗
        function openModal(book, content) {
            document.getElementById('modal-title').innerText = `《${book}》`;
            document.getElementById('modal-text').innerText = content.replace(/\\n/g, '\n');
            document.getElementById('preview-modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('preview-modal').style.display = 'none';
        }
    </script>
</body>
</html>
