    <script>



// =====================================================================
// 🏀 3D 街頭投籃遊戲模組
// =====================================================================
let hoopPhysicsWorld = null;
let hoopGameGroup = null;
let hoopBallBody = null;
let hoopBallMesh = null;
const hoopStartPos = new THREE.Vector3(0, 1.5, 5.8);

let hoopState = 'idle'; // idle, aiming, thrown, resetting
let hoopShotsLeft = 20;
let hoopScore = 0;
let hoopHasScored = false;
let hoopTimeSinceThrow = 0;
const hoopPrevBallPos = new THREE.Vector3();
let hoopDragStart = { x: 0, y: 0 };
let isHoopDragging = false;

// 儲存投籃專用的點光源（用於夜間路燈照明）
let hoopNightLight = null;

// 🏀 建立投籃物理世界與 3D 模型實體
function initHoopGameScene() {
    if (hoopGameGroup) return; 

    // 1. 建立物理世界
    hoopPhysicsWorld = new CANNON.World();
    hoopPhysicsWorld.gravity.set(0, -9.82, 0); // 👈 修改這裡：改用舊版 cannon.js 專用的重力設定方式
    
    const ballMat = new CANNON.Material('ball');
    const groundMat = new CANNON.Material('ground');
    const boardMat = new CANNON.Material('board');
    const rimMat = new CANNON.Material('rim');

    hoopPhysicsWorld.addContactMaterial(new CANNON.ContactMaterial(ballMat, groundMat, { friction: 0.5, restitution: 0.65 }));
    hoopPhysicsWorld.addContactMaterial(new CANNON.ContactMaterial(ballMat, boardMat, { friction: 0.6, restitution: 0.10 }));
    hoopPhysicsWorld.addContactMaterial(new CANNON.ContactMaterial(ballMat, rimMat, { friction: 0.5, restitution: 0.22 }));

    // 2. 建立投籃 Group
    hoopGameGroup = new THREE.Group();
    scene.add(hoopGameGroup);

    // 3. 建立寫實柏油底盤與學校橘藍配色半場標線
    const asphalt = createAsphaltBase();
    const floorBase = new THREE.Mesh(
        new THREE.PlaneGeometry(50, 50),
        new THREE.MeshStandardMaterial({ 
            map: asphalt.map, 
            bumpMap: asphalt.bumpMap,
            bumpScale: 0.015,
            roughness: 0.85,
            metalness: 0.1
        })
    );
    floorBase.rotation.x = -Math.PI / 2;
    floorBase.receiveShadow = true;
    hoopGameGroup.add(floorBase);

    const courtLinesMap = createSchoolHoopLines();
    const courtDecal = new THREE.Mesh(
        new THREE.PlaneGeometry(16, 16),
        new THREE.MeshStandardMaterial({ map: courtLinesMap, transparent: true, roughness: 0.9, metalness: 0.0 })
    );
    courtDecal.rotation.x = -Math.PI / 2;
    courtDecal.position.set(0, 0.01, 2.2); 
    courtDecal.receiveShadow = true;
    hoopGameGroup.add(courtDecal);

    // 物理地面 - 採用厚箱型體（Box）代替容易穿透的無限平面，確保穩定
    const floorBody = new CANNON.Body({
        type: CANNON.Body.STATIC,
        shape: new CANNON.Box(new CANNON.Vec3(25, 1, 25)),
        position: new CANNON.Vec3(0, -1, 0), // 頂面與 Y = 0 對齊
        material: groundMat
    });
    hoopPhysicsWorld.addBody(floorBody);

    // 4. 建立壓克力玻璃籃板 (套用獨立版參數)
    const glassMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xffffff, transmission: 0.85, thickness: 0.1, roughness: 0.1, transparent: true, opacity: 0.9
    });
    const boardGlass = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 0.1), glassMaterial);
    boardGlass.position.set(0, 6, -5);
    boardGlass.castShadow = true;
    hoopGameGroup.add(boardGlass);

    const boardCanvas = document.createElement('canvas');
    boardCanvas.width = 512; boardCanvas.height = 384;
    const bCtx = boardCanvas.getContext('2d');
    bCtx.clearRect(0,0,512,384);
    bCtx.strokeStyle = '#b81d18';
    bCtx.lineWidth = 14;
    bCtx.strokeRect(176, 160, 160, 120); 
    bCtx.lineWidth = 10;
    bCtx.strokeRect(6, 6, 500, 372);
    
    const boardLinesMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(4, 3),
        new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(boardCanvas), transparent: true, depthWrite: false })
    );
    boardLinesMesh.position.z = 0.051;
    boardGlass.add(boardLinesMesh);

    // 物理籃板
    const boardBody = new CANNON.Body({
        type: CANNON.Body.STATIC, shape: new CANNON.Box(new CANNON.Vec3(2, 1.5, 0.05)),
        position: new CANNON.Vec3(0, 6, -5), material: boardMat
    });
    hoopPhysicsWorld.addBody(boardBody);

    // 5. 籃框與網狀效果
    const rimRadius = 0.64; const rimZ = -4.2;
    const rimMesh = new THREE.Mesh(
        new THREE.TorusGeometry(rimRadius, 0.04, 16, 64),
        new THREE.MeshStandardMaterial({ color: 0xd32f2f, metalness: 0.5, roughness: 0.2 })
    );
    rimMesh.rotation.x = -Math.PI / 2;
    rimMesh.position.set(0, 5, rimZ);
    rimMesh.castShadow = true;
    hoopGameGroup.add(rimMesh);

    const connector = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.4), rimMesh.material);
    connector.position.set(0, 5, -4.7);
    hoopGameGroup.add(connector);

    // 籃框物理環型防穿
    const numColliders = 16;
    for (let i = 0; i < numColliders; i++) {
        const angle = (i / numColliders) * Math.PI * 2;
        const cx = Math.cos(angle) * rimRadius;
        const cz = rimZ + Math.sin(angle) * rimRadius;
        hoopPhysicsWorld.addBody(new CANNON.Body({
            type: CANNON.Body.STATIC, shape: new CANNON.Sphere(0.04),
            position: new CANNON.Vec3(cx, 5, cz), material: rimMat
        }));
    }

    // 籃網
    const netAlpha = createNetAlphaTexture();
    const netMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(rimRadius, 0.40, 0.85, 24, 1, true),
        new THREE.MeshStandardMaterial({ color: 0xeeeeee, alphaMap: netAlpha, transparent: true, side: THREE.DoubleSide, depthWrite: false, roughness: 0.9 })
    );
    netMesh.position.set(0, 4.58, rimZ);
    hoopGameGroup.add(netMesh);

    // 籃架柱子
    const poleMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 6, 16),
        new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.4 })
    );

    });

    );

// 重置籃球狀態（與獨立版一致）
function resetHoopBall() {
    hoopBallBody.position.set(hoopStartPos.x, hoopStartPos.y, hoopStartPos.z);
    hoopBallBody.velocity.set(0, 0, 0);
    hoopBallBody.angularVelocity.set(0, 0, 0);
    hoopPrevBallPos.set(hoopBallBody.position.x, hoopBallBody.position.y, hoopBallBody.position.z);
    hoopHasScored = false;
    hoopState = 'aiming';
    hoopTimeSinceThrow = 0;
}


// 更新：投球觸碰拖曳與快速重載事件（同步獨立版力學公式）
// 更新：投球觸碰拖曳與快速重載事件（加入手機觸控相容）
function hoopPointerDown(e) {
    if (hoopState === 'thrown' || hoopState === 'resetting') {
        resetHoopBall();
        return;
    }
    if (hoopState !== 'aiming') return;
    isHoopDragging = true;
    
    // 相容滑鼠與觸控座標
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    hoopDragStart = { x: clientX, y: clientY };
}

function hoopPointerUp(e) {
    if (!isHoopDragging) return;
    isHoopDragging = false;
    
    // 相容滑鼠與觸控座標 (touchend 的座標在 changedTouches)
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    
    const dx = clientX - hoopDragStart.x;
    const dy = clientY - hoopDragStart.y; 
    
    const dxNormal = dx / window.innerWidth;
    const dyNormal = dy / window.innerHeight; 

    if (dyNormal > -0.05) return; 

    // 智慧直行輔助
    let forceX = dxNormal * 15; 
    if (Math.abs(forceX) < 2.0) {
        forceX *= 0.25; 
    }

    // 中遠距離專用拋物線力學公式
    const forceY = Math.min(-dyNormal * 23 + 6.5, 17);
    const forceZ = Math.max(dyNormal * 37 - 4, -23);

    hoopBallBody.velocity.set(forceX, forceY, forceZ);
    hoopBallBody.angularVelocity.set(-13, 0, forceX * 0.4); 
    
    hoopState = 'thrown';
    hoopShotsLeft--;
    document.getElementById('hoop-shots-left').innerText = hoopShotsLeft;
    hoopTimeSinceThrow = 0;
}

// 每一影格物理模擬及穿環進球檢測（同步獨立版邏輯）
// 每一影格物理模擬及穿環進球檢測（同步獨立版邏輯）
function updateHoopPhysics() {
    if (hoopState === 'idle' || !hoopPhysicsWorld) return;

    // 步進物理世界（讓重力在瞄準時自然作用）
    hoopPhysicsWorld.step(1 / 60);

    const currY = hoopBallBody.position.y;
    const prevY = hoopPrevBallPos.y;

    // 嚴格跨 Y = 5.0 的進球檢測（Swish 空心球判定）
    if (hoopState === 'thrown' && !hoopHasScored) {
        if (prevY >= 5.0 && currY < 5.0) {
            const t = (5.0 - currY) / (prevY - currY);
            const interpX = hoopBallBody.position.x + t * (hoopPrevBallPos.x - hoopBallBody.position.x);
            const interpZ = hoopBallBody.position.z + t * (hoopPrevBallPos.z - hoopBallBody.position.z);
            
            const dist = Math.hypot(interpX - 0, interpZ - (-4.2)); // rimZ = -4.2
            if (dist < 0.48) { 
                hoopScore++;
                hoopHasScored = true;
                document.getElementById('hoop-score').innerText = String(hoopScore).padStart(2, '0');
            }
        }
    }

    hoopPrevBallPos.set(hoopBallBody.position.x, hoopBallBody.position.y, hoopBallBody.position.z);
    hoopBallMesh.position.copy(hoopBallBody.position);
    hoopBallMesh.quaternion.copy(hoopBallBody.quaternion);

    // 狀態轉移與重置判定
    if (hoopState === 'thrown') {
        hoopTimeSinceThrow += 1 / 60;

        const isResting = hoopBallBody.position.y < 0.8 && hoopBallBody.velocity.length() < 0.8;
        const isOut = hoopBallBody.position.y < -1 || hoopBallBody.position.z > 12 || hoopBallBody.position.z < -12;
        
        if ((isResting || isOut || hoopTimeSinceThrow > 5) && hoopState !== 'resetting') {
            hoopState = 'resetting';
            
            // 延遲 600ms 後重置，便於看清進球或落點
            setTimeout(() => {
                if (hoopShotsLeft > 0) {
                    resetHoopBall();
                } else {
                    finishHoopGame();
                }
            }, 600);
        }
    }
}

function createSkyTexture(topColorHex, bottomColorHex) {
    const canvas = document.createElement('canvas');
    canvas.width = 2; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, new THREE.Color(topColorHex).getStyle());
    grad.addColorStop(1, new THREE.Color(bottomColorHex).getStyle());
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 2, 512);
    return new THREE.CanvasTexture(canvas);
}

function syncSchoolEnvironmentTime() {
    if (timeForced) return; // 💡 如果開發者鎖定了時間，就不執行自動同步
    const h = (new Date().getUTCHours() + 8) % 24; 
    if (h >= 5 && h < 9) setSchoolPhase('dawn'); 
    else if (h >= 9 && h < 16) setSchoolPhase('noon'); 
    else if (h >= 16 && h < 19) setSchoolPhase('dusk'); 
    else setSchoolPhase('night');
}

function setSchoolPhase(phaseStr) {
const phases = {
    // 🌅 晨：去除原本偏灰的色調
    // skyTop 改為清澈的初晨淺藍 (0xaec6cf)
    // skyBot 與 fog 改為帶有朝氣的晨霧粉白 (0xffe4e1 / 0xeedfdc)
   dawn: { skyTop: 0xffe4e1, skyBot: 0xffb7c5, fog: 0xffb7c5, light: 0xffffff, int: 1.1, windowLight: false, shadow: true },
    
    // ☀️ 午：保持明亮的晴天
    noon: { skyTop: 0x40a0d0, skyBot: 0xbae0ff, fog: 0xbae0ff, light: 0xfff6ea, int: 1.1, windowLight: false, shadow: true },
    
    // 🌇 暮：強化夕陽的「黃昏感」
    // skyTop 帶一點日落時的深紫 (0x4a3b52)

// 🏀 投籃遊戲專用：生成網格半透明紋理
function createNetAlphaTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const c = canvas.getContext('2d');
    
    c.fillStyle = '#000000'; c.fillRect(0, 0, 256, 256); 
    c.strokeStyle = '#ffffff'; c.lineWidth = 6; 
    
    const step = 32;
    for (let i = -256; i < 256; i += step) {
        c.beginPath();
        c.moveTo(i, 0); c.lineTo(i + 256, 256);
        c.stroke();
        
        c.beginPath();
        c.moveTo(i + 256, 0); c.lineTo(i, 256);
        c.stroke();
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(6, 2); 
    return tex;
}

// 🏀 投籃遊戲專用：生成寫實籃球紋理
function createBallMaps() {
    const canvas = document.createElement('canvas');
    const bumpCanvas = document.createElement('canvas');
    canvas.width = bumpCanvas.width = 512; // 調整為 512 降低運算負擔
    canvas.height = bumpCanvas.height = 512;
    const c = canvas.getContext('2d');
    const bc = bumpCanvas.getContext('2d');

    c.fillStyle = '#a63a13'; c.fillRect(0, 0, 512, 512);
    bc.fillStyle = '#808080'; bc.fillRect(0, 0, 512, 512); 
    
    for(let i=0; i<40000; i++) {
        const x = Math.random()*512;
        const y = Math.random()*512;
        bc.fillStyle = Math.random() > 0.5 ? '#999999' : '#666666';
        bc.fillRect(x, y, 1.5, 1.5);
    }

    function drawLines(ctx, isBump) {
        ctx.strokeStyle = isBump ? '#444444' : '#151515'; 
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(256, 0); ctx.lineTo(256, 512); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 256); ctx.lineTo(512, 256); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 256, 175, -Math.PI/2, Math.PI/2); ctx.stroke();
        ctx.beginPath(); ctx.arc(512, 256, 175, Math.PI/2, -Math.PI/2); ctx.stroke();
    }
    drawLines(c, false);
    drawLines(bc, true);

    return { 
        map: new THREE.CanvasTexture(canvas), 
        bumpMap: new THREE.CanvasTexture(bumpCanvas) 
    };
}

        function generateNoiseTexture(baseColor, noiseOpacity, scale = 1) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 40000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? `rgba(255,255,255,${noiseOpacity})` : `rgba(0,0,0,${noiseOpacity})`;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(scale, scale);
            return texture;
        }

        function generateTileTexture(baseColor, lineHex, noiseOpacity, scale = 1) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 1024, 1024);
            
            ctx.strokeStyle = lineHex;
            ctx.lineWidth = 1.5;
            const tileSize = 64;
            for (let x = 0; x <= 1024; x += tileSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 1024); ctx.stroke();
            }
            for (let y = 0; y <= 1024; y += tileSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1024, y); ctx.stroke();
            }

            for (let i = 0; i < 80000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? `rgba(255,255,255,${noiseOpacity})` : `rgba(0,0,0,0.08)`;
                ctx.fillRect(Math.random() * 1024, Math.random() * 1024, 1, 1);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(scale, scale);
            return texture;
        }

        function createGlassMaterial() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            const grad = ctx.createLinearGradient(0, 0, 256, 256);
            grad.addColorStop(0, '#0d1a2d');    
            grad.addColorStop(0.35, '#19335c');  
            grad.addColorStop(0.7, '#4c73a5');   
            grad.addColorStop(0.9, '#8bb4e2');   
            grad.addColorStop(1, '#ffffff');     
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 256, 256);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 60); ctx.lineTo(256, 110);
            ctx.moveTo(0, 160); ctx.lineTo(256, 210);
            ctx.stroke();

            const tex = new THREE.CanvasTexture(canvas);
            return new THREE.MeshStandardMaterial({
                map: tex,
                roughness: 0.08,
                metalness: 0.7,
                roughnessMap: tex
            });
        }

function getHalfCourtMaterial(baseColorHex, keyColorHex) {
    const canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 1024;
    const c = canvas.getContext('2d');
    
    c.fillStyle = baseColorHex;
    c.fillRect(0, 0, 1024, 1024);
    
    // 增加瀝青顆粒感雜訊
    c.fillStyle = 'rgba(255,255,255,0.03)';
    for(let i=0; i<15000; i++) c.fillRect(Math.random()*1024, Math.random()*1024, 2, 2);
    c.fillStyle = 'rgba(0,0,0,0.08)';
    for(let i=0; i<15000; i++) c.fillRect(Math.random()*1024, Math.random()*1024, 2, 2);

    const m = 64; 
    const cx = 512; 
    const baselineY = 100; 
    const hoopY = baselineY + 1.275 * m; 
    
    // 禁區三秒區鋪面
    c.fillStyle = keyColorHex;
    c.fillRect(cx - 3.0 * m, baselineY, 6.0 * m, 5.8 * m);

    c.fillStyle = 'rgba(255, 255, 255, 0.15)'; 
    c.fillRect(cx - 2.45 * m, baselineY, 4.9 * m, 5.8 * m);
    
    c.strokeStyle = '#ffffff';
    c.lineWidth = 10;
    c.lineCap = 'round';
    
    // 底線
    c.beginPath(); c.moveTo(0, baselineY); c.lineTo(1024, baselineY); c.stroke(); 
    // 罰球區框線
    c.strokeRect(cx - 2.45 * m, baselineY, 4.9 * m, 5.8 * m); 
    
    // 罰球線半圓
    c.beginPath(); c.arc(cx, baselineY + 5.8 * m, 1.8 * m, 0, Math.PI); c.stroke();
    
    // 三分線兩側直線段
    c.beginPath();
    c.moveTo(cx - 6.6 * m, baselineY);
    c.lineTo(cx - 6.6 * m, baselineY + 3.0 * m);
    c.moveTo(cx + 6.6 * m, baselineY);
    c.lineTo(cx + 6.6 * m, baselineY + 3.0 * m);
    c.stroke();
    
    // 三分線弧線段
    c.beginPath();
    const angle = Math.asin(3.0 / 6.75);
    c.arc(cx, hoopY, 6.75 * m, angle, Math.PI - angle);
    c.stroke();

    const tex = new THREE.CanvasTexture(canvas);
    tex.anisotropy = 16;
    return new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85 });
}

function createLouverTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#D5DFE6';
    ctx.fillRect(0, 0, 128, 128);

    const numSlats = 8;
    const slatHeight = 128 / numSlats;
    for (let i = 0; i < numSlats; i++) {
        const y = i * slatHeight;
        ctx.fillStyle = '#546E7A';
        ctx.fillRect(0, y, 128, 3);

        const grad = ctx.createLinearGradient(0, y + 3, 0, y + slatHeight);
        grad.addColorStop(0, '#CFD8DC');
        grad.addColorStop(0.4, '#ECEFF1');
        grad.addColorStop(1, '#90A4AE');
        ctx.fillStyle = grad;
        ctx.fillRect(0, y + 3, 128, slatHeight - 3);

        ctx.fillStyle = '#37474F';
        ctx.fillRect(0, y + slatHeight - 1, 128, 1);
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

                positions.push(p0.x, p0.y, p0.z, p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
                uvs.push(u0, v0, u1, v0, u1, v1);
                positions.push(p0.x, p0.y, p0.z, p2.x, p2.y, p2.z, p3.x, p3.y, p3.z);
                uvs.push(u0, v0, u1, v1, u0, v1);

            const leftBack = (y) => new THREE.Vector3(0, y, -0.45);
            const rightBack = (y) => new THREE.Vector3(0, y, 0.45);
            
            const rightFront = (y) => {
                let x = (y <= 19.5) ? -1.3 : (y >= 22.5 ? -2.3 : -1.3 - (y - 19.5) / 3.0 * 1.0);
                return new THREE.Vector3(x, y, 0.45);

            const leftFront = (y) => {
                let x = (y <= 19.5) ? -1.3 : (y >= 22.5 ? -2.3 : -1.3 - (y - 19.5) / 3.0 * 1.0);
                return new THREE.Vector3(x, y, -0.45); 
            };

            for (let i = 0; i < heights.length - 1; i++) {
                const y0 = heights[i];
                const y1 = heights[i+1];
                const v0 = y0 / 28.0;
                const v1 = y1 / 28.0;

                addQuad(leftBack(y0), rightBack(y0), rightBack(y1), leftBack(y1), 0, v0, 1, v1);
                addQuad(rightBack(y0), rightFront(y0), rightFront(y1), rightBack(y1), 0, v0, 1.5, v1);
                addQuad(rightFront(y0), leftFront(y0), leftFront(y1), rightFront(y1), 0, v0, 1, v1);
                addQuad(leftFront(y0), leftBack(y0), leftBack(y1), leftFront(y1), 0, v0, 1.5, v1);
            }

            addQuad(leftBack(0), leftFront(0), rightFront(0), rightBack(0), 0, 0, 1, 1);
            addQuad(leftBack(28.0), rightBack(28.0), rightFront(28.0), leftFront(28.0), 0, 0, 1, 1);

// 🚶‍♂️ 虛擬搖桿與第一人稱行走系統 (雙擊切換、記憶狀態、物理防穿模)

// 1. 讀取上次的模式 (預設為 false = 鳥瞰模式)
window.isWalkMode = localStorage.getItem('schoolCamMode') === 'walk';
window.isKnobDragging = false;
window.walkVel = 0;
window.strafeVel = 0;
let startX = 0, startY = 0;
let lastTapTime = 0; // 用來紀錄雙擊的時間

// 2. 切換 鳥瞰 / 第一人稱 邏輯
window.toggleWalkMode = function() {
    window.isWalkMode = !window.isWalkMode;
    localStorage.setItem('schoolCamMode', window.isWalkMode ? 'walk' : 'bird'); // 記憶選擇
    applyCameraMode();
};

// 3. 套用相機模式設定
function applyCameraMode() {
    const knobCenter = document.querySelector('.knob-center');
    const indicator = document.querySelector('.knob-indicator');
    
    // 取得當前的目標點 (腳下/視線中心)
    const curX = controls.target.x;
    const curZ = controls.target.z;

    if (window.isWalkMode) {
        // === 進入第一人稱 (FPS) ===
        controls.minAzimuthAngle = -Infinity; controls.maxAzimuthAngle = Infinity;
        controls.minPolarAngle = Math.PI / 3; controls.maxPolarAngle = Math.PI / 1.5;
        controls.minDistance = 0.1; controls.maxDistance = 0.1; // 鎖定距離強制轉頭
        controls.enablePan = false;

        if (knobCenter) knobCenter.style.background = '#6b8e73'; 
        if (indicator) indicator.style.background = '#fff';

        // 智慧切換：保留當前的 X, Z，原地降落至地面高度
        // (如果是網頁剛載入的瞬間，才使用預設起點)
        if (curX === 5 && curZ === 0) {
            camera.position.set(-6, 3.5, 0); 
            controls.target.set(-5.9, 3.5, 0);
        } else {
            camera.position.set(curX - 0.1, 3.5, curZ);
            controls.target.set(curX, 3.5, curZ);
        }
        
    } else {
        // === 退回鳥瞰模式 ===
        controls.minAzimuthAngle = -Infinity; controls.maxAzimuthAngle = Infinity;
        controls.minPolarAngle = 0; controls.maxPolarAngle = Math.PI / 2 - 0.02;
        controls.minDistance = 10; controls.maxDistance = 200;
        controls.enablePan = true;

        if (knobCenter) knobCenter.style.background = '#fff';
        if (indicator) indicator.style.background = '#548ca8';

        // 智慧切換：以當前位置為中心，原地向後上方升空
        // (如果是從最初的出生點切換上來，才回到大範圍的全景鳥瞰視角)
        if (Math.abs(curX - (-5.9)) < 0.5 && curZ === 0) {
            camera.position.set(-55, 45, 105);
            controls.target.set(5, 10, 0);
        } else {
            // 從目前的站立點原地向後上方拉遠
            camera.position.set(curX - 50, 45, curZ + 60);
            controls.target.set(curX, 10, curZ);
        }
    }
    controls.update();
}

// 4. 搖桿事件綁定
const knob = document.getElementById('mobile-cam-knob');

function handleDown(e) {
    const now = Date.now();
    // 判斷雙擊 (350毫秒內連點兩次)
    if (now - lastTapTime < 350) {
        toggleWalkMode();
        lastTapTime = 0;
        return;
    }
    lastTapTime = now;

    if (!window.isWalkMode) return; // 鳥瞰模式下搖桿無效
    window.isKnobDragging = true;
    startX = e.touches ? e.touches[0].clientX : e.clientX; 
    startY = e.touches ? e.touches[0].clientY : e.clientY;
}

function handleMove(e) {
    if (!window.isKnobDragging || !window.isWalkMode) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    
    const rect = knob.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let dx = cx - centerX; let dy = cy - centerY;

    const maxRadius = rect.width / 2;
    const dist = Math.hypot(dx, dy);
    if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; }
    
    document.querySelector('.knob-center').style.transform = `translate(${dx}px, ${dy}px)`;
    
    // 根據搖桿位置設定前進與平移速度
    window.walkVel = -(dy / maxRadius) * 0.4; // 前後
    window.strafeVel = (dx / maxRadius) * 0.4; // 左右
}

function handleUp() {
    window.isKnobDragging = false;
    window.walkVel = 0; window.strafeVel = 0;
    if (window.isWalkMode) {
        document.querySelector('.knob-center').style.transform = `translate(0px, 0px)`;
    }
}

if (knob) {
    knob.addEventListener('mousedown', handleDown);
    knob.addEventListener('touchstart', handleDown, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => { if(window.isKnobDragging) { e.preventDefault(); handleMove(e); }}, {passive: false});
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchend', handleUp);
}

// 5. 負責實際移動相機的函數 (會被 animate 迴圈持續呼叫)
function updatePlayerMovement() {
    if (!window.isWalkMode) return;
    
    if (Math.abs(window.walkVel) > 0.01 || Math.abs(window.strafeVel) > 0.01) {
        let fwd = new THREE.Vector3();
        camera.getWorldDirection(fwd);
        fwd.y = 0; fwd.normalize(); // 保持在水平面移動
        
        let right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
        
        // 預測下一步的座標
        let moveVec = new THREE.Vector3()
            .add(fwd.multiplyScalar(window.walkVel))
            .add(right.multiplyScalar(window.strafeVel));

        let nextX = camera.position.x + moveVec.x;
        let nextZ = camera.position.z + moveVec.z;

        // 🛡️ 啟動物理檢測 (呼叫我們先前寫好的 isCollision)
        if (!isCollision(nextX, nextZ)) {
            // 安全，允許移動 (連同 target 一起移動才能保持第一人稱視角)
            camera.position.x = nextX;
            camera.position.z = nextZ;
            controls.target.x += moveVec.x;

function updatePlayerMovement() {
    if (!window.isWalkMode) return;
    
    if (Math.abs(window.walkVel) > 0.01 || Math.abs(window.strafeVel) > 0.01) {
        let fwd = new THREE.Vector3();
        camera.getWorldDirection(fwd);
        fwd.y = 0; fwd.normalize();
        
        let right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
        
        // 預測下一步的座// 🛡️ 物理邊界檢測：嚴格防穿模 (純數學計算，零效能負擔)
function isCollision(x, z) {
    const r = 1.2; // 玩家碰撞半徑 (稍微加大，防止相機穿過牆壁看到內部)
    
    // 1. 世界地圖極限邊界 (鐵絲網與大門防護)
    if (x < -50 || x > 39) return true; // 左右極限 (右側鐵絲網 x=41.5)
    if (z < -38 || z > 52) return true; // 前後極限 (前大門鐵絲網 z=54)

    // 2. 定義校園內所有不可進入的實體區塊 [minX, maxX, minZ, maxZ]
    const hitBoxes = [
        // A. 左側主教學樓與連廊 (包含樓梯底與牆壁)
        [-38.0, -1.0, -35.0, -8.0],
        
        // B. 中央白色走廊連接口與平台
        [-2.0, 18.5, -31.0, -16.0],

        // C. 右側特色大樓 (十字架樓)
        // ❗ 要求：連柱子底層的鏤空區域也不能進入，所以我們封鎖整個建築的投影面積
        [17.0, 36.0, -34.0, 15.0],

        // D. 停車場與藍色球場中間的紫牆
        [8.0, 36.0, 26.0, 28.0],

        // E. 綠色球場下方的白色小屋
        [-25.0, -8.0, 19.0, 33.0],

        // F. 正門右側的雙開車閘 (半開狀態，建立一個斜向或較寬的阻擋區)
        [35.0, 42.0, 17.0, 24.0]
    ];

    // 迴圈檢查是否踏入任何一個禁區
    for (let box of hitBoxes) {
        if (x + r > box[0] && x - r < box[1] && z + r > box[2] && z - r < box[3]) {
            return true; // 撞到了！
        }
    }

    return false; // 安全
}
        
        let moveVec = new THREE.Vector3()
            .add(fwd.multiplyScalar(window.walkVel))
            .add(right.multiplyScalar(window.strafeVel));

        let nextX = camera.position.x + moveVec.x;
        let nextZ = camera.position.z + moveVec.z;

        // 🛡️ 啟動物理檢測
        if (!isCollision(nextX, nextZ)) {
            // 安全，允許移動 (連同 target 一起移動才能保持第一人稱視角)
            camera.position.x = nextX;
            camera.position.z = nextZ;
            controls.target.x += moveVec.x;
            controls.target.z += moveVec.z;
        } else {
            // 撞牆了！我們嘗試「滑步 (Sliding)」
            // 檢查只移動 X 是否會撞牆
            if (!isCollision(nextX, camera.position.z)) {
                camera.position.x = nextX;
                controls.target.x += moveVec.x;
            } 
            // 否則檢查只移動 Z 是否會撞牆
            else if (!isCollision(camera.position.x, nextZ)) {
                camera.position.z = nextZ;
                controls.target.z += moveVec.z;
            }
        }
    }
}

let copyCurrentExcerpt = null;
let copyCurrentIndex = 0;
let hanziWriter = null; 
let hanziCache = {}; // 👉 用來存放 Promise 快取


let isCopyChecking = false; // 🛑 防連點鎖

// 檢查每日抄寫上限 (每日最多 3 篇)
function startCopyTaskCheck() {
    if (!currentUser) {
        alert("訪客模式不限制次數，但無法獲得積分。");
        startCopyTask();
        return;
    }

    if (isCopyChecking) return; // 擋住連點
    isCopyChecking = true;

    const todayStr = getLocalTodayDate(); // 🌟 改用本地時間

    db.ref(`users/${currentUser.uid}/mini_games/copying`).once('value').then(snap => {
        const dbData = snap.val() || { date: "", rounds: 0 };
        let currentRounds = (dbData.date === todayStr) ? dbData.rounds : 0;

        if (currentRounds >= 3) {
            alert("✍️ 今日靜心抄寫已達 3 次上限，您的心靈已得到充分沉澱，請明日再來！");
            isCopyChecking = false; // 解鎖
            return;
        }
        
        startCopyTask();
        setTimeout(() => { isCopyChecking = false; }, 1000); // 延遲解鎖
    }).catch(() => {
        isCopyChecking = false;
    });
}



        

// 👉 新增：專門負責抓取字庫資料的函式
function fetchHanziData(char) {
    // 優先抓取繁體字庫，若回傳 404 (瀏覽器會報錯但無妨)，就自動改抓通用字庫
    return fetch('https://cdn.jsdelivr.net/npm/hanzi-writer-data-zh-tw@0.1.1/' + char + '.json')
        .then(res => {
            if (!res.ok) return fetch('https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0.1/' + char + '.json');
            return res;
        })
        .then(res => {
            if (!res.ok) throw new Error('Char not found');
            return res.json();
        });
}

// 👉 預載函式：改為直接儲存 Promise 任務，避免重複發送請求
window.preloadNextHanzi = function(chars, startIndex) {
    let loadedCount = 0;
    let i = startIndex;
    while (loadedCount < 3 && i < chars.length) {
        const char = chars[i];
        if (!puncRegex.test(char) && !hanziCache[char]) {
            // 直接將「正在下載的任務」存入快取中
            hanziCache[char] = fetchHanziData(char); 
            loadedCount++;
        }
        i++;
    }
};

// 標點符號正則表達式 (遇到這些自動跳過不需抄寫)
const puncRegex = /[，。！？、：；「」『』（）《》〈〉]/;


// 2. 啟動抄寫任務 (展開目錄)
window.startCopyTask = function() {
    document.getElementById('copy-task-overlay').style.display = 'flex';
    document.getElementById('copy-selection-menu').style.display = 'flex';
    document.getElementById('copy-writing-area').style.display = 'none';

    const list = document.getElementById('article-selection-list');
    list.innerHTML = '';
    COPY_EXCERPTS.forEach((excerpt, index) => {
        const btn = document.createElement('button');
        btn.className = 'article-btn';
        const preview = excerpt.text.length > 25 ? excerpt.text.substring(0, 25) + '...' : excerpt.text;
        btn.innerHTML = `<span class="author">${excerpt.author}《${excerpt.source}》</span><span style="font-size:0.95rem; color:#888;">${preview}</span>`;
        btn.onclick = () => selectArticle(index);
        list.appendChild(btn);

        // 👉 偷跑：預載每篇文章的第一個中文字 (過濾掉開頭可能的標點)
        const firstChar = excerpt.text.replace(puncRegex, '').charAt(0);
        if (firstChar) preloadNextHanzi([firstChar], 0);
    });
};

// 選擇文章後進入書寫模式
window.selectArticle = function(index) {
    copyCurrentExcerpt = COPY_EXCERPTS[index];
    copyCurrentIndex = 0;

    document.getElementById('copy-selection-menu').style.display = 'none';
    document.getElementById('copy-writing-area').style.display = 'flex';
    
    // 重設 UI 狀態
    document.querySelector('.copy-canvas-container').style.display = 'flex';
    document.querySelector('.copy-tools').style.display = 'flex';

    renderCopyText();
};

// 返回文章目錄
window.backToArticleSelection = function() {
    document.getElementById('copy-hanzi-container').innerHTML = ''; // 清除正在運作的筆劃
    document.getElementById('copy-writing-area').style.display = 'none';
    document.getElementById('copy-selection-menu').style.display = 'flex';
};

window.closeCopyTask = function() {
    document.getElementById('copy-task-overlay').style.display = 'none';
    document.getElementById('copy-hanzi-container').innerHTML = '';
};

window.resetHanziQuiz = function() {
    if (hanziWriter) { hanziWriter.quiz(); }
};

// 3. 渲染文章狀態
function renderCopyText() {
    const display = document.getElementById('copy-text-display');
    let html = `<div style="text-align:right; font-size:1rem; margin-bottom:15px; color:#8b7355;">— ${copyCurrentExcerpt.author}《${copyCurrentExcerpt.source}》</div>`;
    
    const chars = copyCurrentExcerpt.text.split('');
    
    while(copyCurrentIndex < chars.length && puncRegex.test(chars[copyCurrentIndex])) {
        copyCurrentIndex++;
    }

    if (copyCurrentIndex >= chars.length) {
        completeCopyTask();
        return;
    }

    chars.forEach((char, index) => {
        if (index < copyCurrentIndex) {
            html += `<span class="char-done">${char}</span>`;
        } else if (index === copyCurrentIndex) {
            html += `<span class="char-active" id="current-char-span">${char}</span>`;
        } else {
            html += `<span class="char-pending">${char}</span>`;
        }
    });
    
    display.innerHTML = html;
    
   const activeSpan = document.getElementById('current-char-span');
    if(activeSpan) activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
    
    // 呼叫 HanziWriter 載入當前要寫的字
    loadHanziChar(chars[copyCurrentIndex]);

    // 👉 新增：在用家寫這個字的同時，背景發送請求把後面 3 個字抓下來
    preloadNextHanzi(chars, copyCurrentIndex + 1);
}

// 4. 動態適應尺寸並載入 HanziWriter
function loadHanziChar(char) {
    const container = document.getElementById('copy-hanzi-container');
    const hint = document.getElementById('copy-canvas-hint');
    
    // 動態獲取父容器安全尺寸
    const rect = document.getElementById('copy-canvas-container').getBoundingClientRect();
    const safeSize = Math.min(rect.width, rect.height) - 10 > 0 ? Math.min(rect.width, rect.height) - 10 : 230; 

    container.innerHTML = '';
    
    hanziWriter = HanziWriter.create('copy-hanzi-container', char, {
        width: safeSize,
        height: safeSize,
        padding: 10,
        showCharacter: false, 
        showOutline: true,    
        strokeColor: '#d4af37', 
        outlineColor: '#e6dfd1', 
        drawingColor: '#4a4238', 
        charDataLoader: function(char, onComplete) {
            // 👉 直接從快取拿取預載任務，如果還沒預載過就現場發起任務
            if (!hanziCache[char]) {
                hanziCache[char] = fetchHanziData(char);
            }
            
            // 任務完成後，將資料交給 Hanzi Writer
            hanziCache[char]
                .then(data => onComplete(data))
                .catch(() => onComplete(null)); // 真的抓不到(生僻字)，回傳 null
        },
        onLoadCharDataError: function(reason) {
            console.warn(`字庫無此字「${char}」，自動跳過。`);
            copyCurrentIndex++;
            renderCopyText();
        },
        onLoadCharDataSuccess: function() {
            hint.style.display = 'none'; 
            hanziWriter.quiz({
                onComplete: function() {
                    copyCurrentIndex++;
                    setTimeout(renderCopyText, 400);
                }
            });
        }
    });
}

        

// 完成任務與給予獎勵
function completeCopyTask() {
    const display = document.getElementById('copy-text-display');
    display.innerHTML = `<div style="text-align:center; padding: 40px 0;">
        <div style="font-size: 3rem; margin-bottom: 20px;">✨</div>
        <h2 style="color:#d4af37; margin-bottom: 10px;">功德圓滿</h2>
        <p style="color:#8b7355; font-size:1.1rem;">靜心抄寫完成，感悟文字的力量。</p>
    </div>`;
    
    document.querySelector('.copy-canvas-container').style.display = 'none';
    document.querySelector('.copy-tools').style.display = 'none';

    if (currentUser) {
        const todayStr = getLocalTodayDate(); // 🌟 改用本地時間
        
        db.ref(`users/${currentUser.uid}/mini_games/copying`).once('value').then(snap => {
            let dbData = snap.val() || { date: "", rounds: 0 };
            let currentRounds = (dbData.date === todayStr) ? dbData.rounds : 0;
            const dataSave = { date: todayStr, rounds: currentRounds + 1 };
            localStorage.setItem('copy_daily_' + currentUser.uid, JSON.stringify(dataSave));
            db.ref(`users/${currentUser.uid}/mini_games/copying`).set(dataSave);
        });

      db.ref(`users/${currentUser.uid}/points`).once('value').then(snap => {
            let pts = snap.val() || 0;
            db.ref(`users/${currentUser.uid}/points`).set(pts + 500);
            
            // 👇 新增：同步記錄歷史總得分
            db.ref(`users/${currentUser.uid}/lifetimePoints`).once('value').then(lSnap => {
                let lifetime = lSnap.val() || 0;
                db.ref(`users/${currentUser.uid}/lifetimePoints`).set(lifetime + 500);
            });

            alert("🎉 恭喜完成抄寫！獲得 500 積分！");
            setTimeout(() => {
                closeCopyTask();
                document.querySelector('.copy-canvas-container').style.display = 'flex';
                document.querySelector('.copy-tools').style.display = 'flex';
            }, 1500);
        });
    } else {
        alert("訪客模式，無法獲得積分。");
        setTimeout(closeCopyTask, 1500);
    }
}

        
    </script>
</body>
</html>
