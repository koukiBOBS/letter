        // ====== 學校版日夜流轉系統 ======
function createSkyTexture(topColorHex, bottomColorHex) {
    const canvas = document.createElement('canvas');
    canvas.width = 2; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, new THREE.Color(topColorHex).getStyle());
    grad.addColorStop(1, new THREE.Color(bottomColorHex).getStyle());
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 2, 512);
    return new THREE.CanvasTexture(canvas);
}

function syncSchoolEnvironmentTime() {
    if (timeForced) return; // 💡 如果開發者鎖定了時間，就不執行自動同步
    const h = (new Date().getUTCHours() + 8) % 24; 
    if (h >= 5 && h < 9) setSchoolPhase('dawn'); 
    else if (h >= 9 && h < 16) setSchoolPhase('noon'); 
    else if (h >= 16 && h < 19) setSchoolPhase('dusk'); 
    else setSchoolPhase('night');
}

function setSchoolPhase(phaseStr) {
    const phases = {
        // 🌅 晨：降低陽光強度(0.5)，讓天空與霧氣帶有溫暖的粉橘色
        dawn: { skyTop: 0x8a9ea8, skyBot: 0xe0c8b8, fog: 0xd0c0b8, light: 0xffdebb, int: 0.5, windowLight: false, shadow: true },
        // ☀️ 午：陽光強烈(1.1)，影子銳利
        noon: { skyTop: 0x40a0d0, skyBot: 0xbae0ff, fog: 0xbae0ff, light: 0xfff6ea, int: 1.1, windowLight: false, shadow: true },
        // 🌇 暮：橘紅色的夕陽
        dusk: { skyTop: 0x5c546b, skyBot: 0xdf9b82, fog: 0xd2907a, light: 0xffaa66, int: 0.85, windowLight: true, shadow: true },
        // 🌙 夜：月光微弱
        night:{ skyTop: 0x080b14, skyBot: 0x1a2235, fog: 0x151b29, light: 0x667799, int: 0.2, windowLight: true, shadow: false }
    };
    const p = phases[phaseStr];

    scene.background = createSkyTexture(p.skyTop, p.skyBot);
    scene.fog.color.setHex(p.fog);
    
    sunLight.color.setHex(p.light);
    sunLight.intensity = p.int;
    sunLight.castShadow = p.shadow; 

    // 💡 調整環境光與陰影柔和度
    if(phaseStr === 'night') {
        hemiLight.color.setHex(0x334466); hemiLight.groundColor.setHex(0x111111); hemiLight.intensity = 0.6;
        sunLight.shadow.radius = 1; 
    } else if (phaseStr === 'dusk') {
        hemiLight.color.setHex(0xffccaa); hemiLight.groundColor.setHex(0x442211); hemiLight.intensity = 0.7;
        sunLight.shadow.radius = 2; // 黃昏影子微柔
    } else if (phaseStr === 'dawn') {
        hemiLight.color.setHex(0xffeadd); hemiLight.groundColor.setHex(0x554444); hemiLight.intensity = 0.85; // 提高早晨漫射光
        sunLight.shadow.radius = 4; // 🌅 讓早晨的影子邊緣變得非常柔和！
    } else {
        hemiLight.color.setHex(0xffffff); hemiLight.groundColor.setHex(0x777777); hemiLight.intensity = 0.85;
        sunLight.shadow.radius = 1; // 中午影子銳利
    }

    if (typeof matWindow !== 'undefined') {
        matWindow.emissive.setHex(p.windowLight ? 0xffcc88 : 0x000000);
        matWindow.emissiveIntensity = p.windowLight ? 0.7 : 0.0;
        matWindow.needsUpdate = true;
    }
    if (typeof matCorridorWhite !== 'undefined') { 
        matCorridorWhite.emissive.setHex(p.windowLight ? 0x221a10 : 0x000000);
    }
}

// ❄️ 零效能生成：冷氣機出風口與風扇網格
function createAcGrilleTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    
    // 底色深灰
    ctx.fillStyle = '#222222'; ctx.fillRect(0, 0, 128, 128);
    
    // 橫向散熱百葉
    ctx.fillStyle = '#0a0a0a';
    for(let y=0; y<128; y+=8) ctx.fillRect(0, y, 128, 4);
    
    // 隱約可見的圓形風扇輪廓
    ctx.strokeStyle = '#050505'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(64, 64, 45, 0, Math.PI*2); ctx.stroke();
    
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

// 🚪 零效能生成：課室藍色木門 (帶有立體邊框與門把)
function createClassroomDoorTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#3182CE'; ctx.fillRect(0, 0, 128, 256); // 經典基元藍
    
    // 木紋雜訊
    for(let i=0; i<3000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
        ctx.fillRect(Math.random()*128, Math.random()*256, 1, 3);
    }

    // 門板凹槽
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 3;
    ctx.strokeRect(20, 20, 88, 90);
    ctx.strokeRect(20, 130, 88, 100);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
    ctx.strokeRect(21, 21, 86, 88);
    ctx.strokeRect(21, 131, 86, 98);

    // 金屬門把
    ctx.fillStyle = '#cccccc'; ctx.fillRect(100, 125, 6, 25);
    ctx.fillStyle = '#888888'; ctx.fillRect(100, 125, 2, 25);

    return new THREE.CanvasTexture(canvas);
}

        // 3. 程式化材質生成
        // ==========================================
        function generateNoiseTexture(baseColor, noiseOpacity, scale = 1) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 40000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? `rgba(255,255,255,${noiseOpacity})` : `rgba(0,0,0,${noiseOpacity})`;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(scale, scale);
            return texture;
        }

        function generateTileTexture(baseColor, lineHex, noiseOpacity, scale = 1) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 1024, 1024);
            
            ctx.strokeStyle = lineHex;
            ctx.lineWidth = 1.5;
            const tileSize = 64;
            for (let x = 0; x <= 1024; x += tileSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 1024); ctx.stroke();
            }
            for (let y = 0; y <= 1024; y += tileSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1024, y); ctx.stroke();
            }

            for (let i = 0; i < 80000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? `rgba(255,255,255,${noiseOpacity})` : `rgba(0,0,0,0.08)`;
                ctx.fillRect(Math.random() * 1024, Math.random() * 1024, 1, 1);
            }
            const texture = new THREE.CanvasTexture(canvas);

function createLouverTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#D5DFE6';
    ctx.fillRect(0, 0, 128, 128);

    const numSlats = 8;
    const slatHeight = 128 / numSlats;
    for (let i = 0; i < numSlats; i++) {
        const y = i * slatHeight;
        ctx.fillStyle = '#546E7A';
        ctx.fillRect(0, y, 128, 3);

        const grad = ctx.createLinearGradient(0, y + 3, 0, y + slatHeight);
        grad.addColorStop(0, '#CFD8DC');
        grad.addColorStop(0.4, '#ECEFF1');
        grad.addColorStop(1, '#90A4AE');
        ctx.fillStyle = grad;
        ctx.fillRect(0, y + 3, 128, slatHeight - 3);

        ctx.fillStyle = '#37474F';
        ctx.fillRect(0, y + slatHeight - 1, 128, 1);
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

                uvs.push(u0, v0, u1, v0, u1, v1);

                uvs.push(u0, v0, u1, v1, u0, v1);

                return new THREE.Vector3(x, y, 0.45);

                const v1 = y1 / 28.0;

                addQuad(leftFront(y0), leftBack(y0), leftBack(y1), leftFront(y1), 0, v0, 1.5, v1);
            }

            addQuad(leftBack(0), leftFront(0), rightFront(0), rightBack(0), 0, 0, 1, 1);
            addQuad(leftBack(28.0), rightBack(28.0), rightFront(28.0), leftFront(28.0), 0, 0, 1, 1);

// 🚶‍♂️ 虛擬搖桿與第一人稱行走系統 (雙擊切換、記憶狀態、物理防穿模)

// 1. 讀取上次的模式 (預設為 false = 鳥瞰模式)
window.isWalkMode = localStorage.getItem('schoolCamMode') === 'walk';
window.isKnobDragging = false;
window.walkVel = 0;
window.strafeVel = 0;
let startX = 0, startY = 0;
let lastTapTime = 0; // 用來紀錄雙擊的時間

// 2. 切換 鳥瞰 / 第一人稱 邏輯
window.toggleWalkMode = function() {
    window.isWalkMode = !window.isWalkMode;
    localStorage.setItem('schoolCamMode', window.isWalkMode ? 'walk' : 'bird'); // 記憶選擇
    applyCameraMode();
};

// 3. 套用相機模式設定
function applyCameraMode() {
    const knobCenter = document.querySelector('.knob-center');
    const indicator = document.querySelector('.knob-indicator');
    
    if (window.isWalkMode) {
        // 進入第一人稱 (FPS)
        controls.minAzimuthAngle = -Infinity; controls.maxAzimuthAngle = Infinity;
        controls.minPolarAngle = Math.PI / 3; controls.maxPolarAngle = Math.PI / 1.5;
        controls.minDistance = 0.1; controls.maxDistance = 0.1; // 鎖定距離強制轉頭
        controls.enablePan = false;

        if (knobCenter) knobCenter.style.background = '#6b8e73'; 
        if (indicator) indicator.style.background = '#fff';

        // 降至地面高度
        camera.position.set(-6, 3.5, 0); 
        controls.target.set(-5.9, 3.5, 0);
        camera.lookAt(-5.9, 3.5, 0);
        
    } else {
        // 退回鳥瞰模式
        controls.minAzimuthAngle = -Infinity; controls.maxAzimuthAngle = Infinity;
        controls.minPolarAngle = 0; controls.maxPolarAngle = Math.PI / 2 - 0.02;
        controls.minDistance = 10; controls.maxDistance = 200;
        controls.enablePan = true;

        if (knobCenter) knobCenter.style.background = '#fff';
        if (indicator) indicator.style.background = '#548ca8';

        // 升空一覽全貌
        camera.position.set(-55, 45, 105);
        controls.target.set(5, 10, 0);
    }
    controls.update();
}

// 4. 搖桿事件綁定
const knob = document.getElementById('mobile-cam-knob');

function handleDown(e) {
    const now = Date.now();
    // 判斷雙擊 (350毫秒內連點兩次)
    if (now - lastTapTime < 350) {
        toggleWalkMode();
        lastTapTime = 0;
        return;
    }
    lastTapTime = now;

    if (!window.isWalkMode) return; // 鳥瞰模式下搖桿無效
    window.isKnobDragging = true;
    startX = e.touches ? e.touches[0].clientX : e.clientX; 
    startY = e.touches ? e.touches[0].clientY : e.clientY;
}

function handleMove(e) {
    if (!window.isKnobDragging || !window.isWalkMode) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    
    const rect = knob.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let dx = cx - centerX; let dy = cy - centerY;

    const maxRadius = rect.width / 2;
    const dist = Math.hypot(dx, dy);
    if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; }
    
    document.querySelector('.knob-center').style.transform = `translate(${dx}px, ${dy}px)`;
    
    // 根據搖桿位置設定前進與平移速度
    window.walkVel = -(dy / maxRadius) * 0.4; // 前後
    window.strafeVel = (dx / maxRadius) * 0.4; // 左右
}

function handleUp() {
    window.isKnobDragging = false;
    window.walkVel = 0; window.strafeVel = 0;
    if (window.isWalkMode) {
        document.querySelector('.knob-center').style.transform = `translate(0px, 0px)`;
    }
}

if (knob) {
    knob.addEventListener('mousedown', handleDown);
    knob.addEventListener('touchstart', handleDown, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => { if(window.isKnobDragging) { e.preventDefault(); handleMove(e); }}, {passive: false});
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchend', handleUp);
}

// 5. 負責實際移動相機的函數 (會被 animate 迴圈持續呼叫)
function updatePlayerMovement() {
    if (!window.isWalkMode) return;
    
    if (Math.abs(window.walkVel) > 0.01 || Math.abs(window.strafeVel) > 0.01) {
        let fwd = new THREE.Vector3();
        camera.getWorldDirection(fwd);
        fwd.y = 0; fwd.normalize(); // 保持在水平面移動
        
        let right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
        
        // 預測下一步的座標
        let moveVec = new THREE.Vector3()
            .add(fwd.multiplyScalar(window.walkVel))
            .add(right.multiplyScalar(window.strafeVel));

        let nextX = camera.position.x + moveVec.x;
        let nextZ = camera.position.z + moveVec.z;

        // 🛡️ 啟動物理檢測 (呼叫我們先前寫好的 isCollision)
        if (!isCollision(nextX, nextZ)) {
            // 安全，允許移動 (連同 target 一起移動才能保持第一人稱視角)
            camera.position.x = nextX;
            camera.position.z = nextZ;
            controls.target.x += moveVec.x;
            controls.target.z += moveVec.z;
        } else {
            // 撞牆了！啟動「滑步 (Sliding)」機制，讓玩家貼著牆走而不是卡死
            if (!isCollision(nextX, camera.position.z)) {
                camera.position.x = nextX;
                controls.target.x += moveVec.x;
            } 
            else if (!isCollision(camera.position.x, nextZ)) {
                camera.position.z = nextZ;
                controls.target.z += moveVec.z;
            }
        }
    }
}

        // 預測下一步的座// 🛡️ 物理邊界檢測：嚴格防穿模 (純數學計算，零效能負擔)
function isCollision(x, z) {
    const r = 1.2; // 玩家碰撞半徑 (稍微加大，防止相機穿過牆壁看到內部)
    
    // 1. 世界地圖極限邊界 (鐵絲網與大門防護)
    if (x < -50 || x > 39) return true; // 左右極限 (右側鐵絲網 x=41.5)
    if (z < -38 || z > 52) return true; // 前後極限 (前大門鐵絲網 z=54)

    // 2. 定義校園內所有不可進入的實體區塊 [minX, maxX, minZ, maxZ]
    const hitBoxes = [
        // A. 左側主教學樓與連廊 (包含樓梯底與牆壁)
        [-38.0, -1.0, -35.0, -8.0],
        
        // B. 中央白色走廊連接口與平台
        [-2.0, 18.5, -31.0, -16.0],

        // C. 右側特色大樓 (十字架樓)
        // ❗ 要求：連柱子底層的鏤空區域也不能進入，所以我們封鎖整個建築的投影面積
        [17.0, 36.0, -34.0, 15.0],

        // D. 停車場與藍色球場中間的紫牆
        [8.0, 36.0, 26.0, 28.0],

        // E. 綠色球場下方的白色小屋
        [-25.0, -8.0, 19.0, 33.0],

        // F. 正門右側的雙開車閘 (半開狀態，建立一個斜向或較寬的阻擋區)
        [35.0, 42.0, 17.0, 24.0]
    ];

    // 迴圈檢查是否踏入任何一個禁區
    for (let box of hitBoxes) {
        if (x + r > box[0] && x - r < box[1] && z + r > box[2] && z - r < box[3]) {
            return true; // 撞到了！
        }
    }

    return false; // 安全
}
        
        let moveVec = new THREE.Vector3()
            .add(fwd.multiplyScalar(window.walkVel))
            .add(right.multiplyScalar(window.strafeVel));

        let nextX = camera.position.x + moveVec.x;
        let nextZ = camera.position.z + moveVec.z;

        // 🛡️ 啟動物理檢測
        if (!isCollision(nextX, nextZ)) {
            // 安全，允許移動 (連同 target 一起移動才能保持第一人稱視角)
            camera.position.x = nextX;
            camera.position.z = nextZ;
            controls.target.x += moveVec.x;
            controls.target.z += moveVec.z;
        } else {
            // 撞牆了！我們嘗試「滑步 (Sliding)」
            // 檢查只移動 X 是否會撞牆
            if (!isCollision(nextX, camera.position.z)) {
                camera.position.x = nextX;
                controls.target.x += moveVec.x;
            } 
            // 否則檢查只移動 Z 是否會撞牆
            else if (!isCollision(camera.position.x, nextZ)) {
                camera.position.z = nextZ;
                controls.target.z += moveVec.z;
            }
        }
    }
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('pointerup', (e) => {
    // 確保點擊的是畫布，且不是在拖曳視角
    if (e.target.tagName !== 'CANVAS') return;
    if (window.isKnobDragging || isWalkMode) return; // 如果在走路模式/搖桿模式中，盡量避免誤觸
    
    // 計算滑鼠/手指在螢幕上的位置 (-1 到 +1)
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // 檢查是否有點擊到我們設定的抄寫水晶
    // 注意：只檢查 campusGroup 裡的物件
    const intersects = raycaster.intersectObjects(campusGroup.children, true);
    
    if (intersects.length > 0) {
        // 尋找被點擊的物件是不是標籤
        let hitObj = intersects[0].object;
        if (hitObj.userData && hitObj.userData.type === 'copy_task_marker') {
            // 觸發任務 UI！
            startCopyTask();
        }
    }
});

let copyCurrentExcerpt = null;
let copyCurrentIndex = 0;
let writerInstance = null; // 用來存放 Hanzi Writer 實例

// 標點符號正則表達式 (遇到這些自動跳過不需抄寫)
const puncRegex = /[，。！？、：；「」『』（）《》〈〉\n\r\s]/;

window.startCopyTask = function() {

};

// 重新開始當前字的測驗
window.clearCopyCanvas = function() {

// 處理單字抄寫完成的邏輯
function handleCharComplete() {
    document.getElementById('copy-canvas-hint').style.display = 'block';
    document.getElementById('copy-canvas-hint').innerText = "太棒了！";
    document.getElementById('copy-canvas-hint').style.color = '#10b981'; // 綠色
    
    // 延遲一點點進入下一個字，讓學生看清楚寫完的字
    setTimeout(() => {
        document.getElementById('copy-canvas-hint').style.color = '#b4a08c';
        copyCurrentIndex++;
        renderCopyText();
    }, 800);
}

// 3. 渲染文章狀態與初始化 Hanzi Writer
function renderCopyText() {
    const display = document.getElementById('copy-text-display');
    let html = `<div style="text-align:right; font-size:1rem; margin-bottom:15px; color:#8b7355;">— ${copyCurrentExcerpt.author}《${copyCurrentExcerpt.source}》</div>`;
    
    const chars = copyCurrentExcerpt.text.split('');
    
    // 自動跳過標點符號與空白
    while(copyCurrentIndex < chars.length && puncRegex.test(chars[copyCurrentIndex])) {
        copyCurrentIndex++;
    }

    // 檢查是否完成整篇
    if (copyCurrentIndex >= chars.length) {
        completeCopyTask();
        return;
    }

    // 渲染文章 HTML
    chars.forEach((char, index) => {
        if (index < copyCurrentIndex) {
            html += `<span class="char-done">${char}</span>`;
        } else if (index === copyCurrentIndex) {
            html += `<span class="char-active" id="current-char-span">${char}</span>`;
        } else {
            html += `<span class="char-pending">${char}</span>`;
        }
    });
    
    display.innerHTML = html;
    
    // 讓滾動條自動跟隨目前抄寫進度
    const activeSpan = document.getElementById('current-char-span');
    if(activeSpan) activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
    
    // ===== 初始化 Hanzi Writer =====
    const targetChar = chars[copyCurrentIndex];
    document.getElementById('copy-canvas-hint').style.display = 'none';
    document.getElementById('hanzi-writer-container').innerHTML = ''; // 清空舊的容器

    // 獲取容器實際大小，讓 SVG 動態符合正方形
    const container = document.getElementById('hanzi-writer-wrapper');
    const size = container.clientWidth - 10; 

    writerInstance = HanziWriter.create('hanzi-writer-container', targetChar, {
        width: size,
        height: size,
        padding: 10,
        showOutline: true,        // 顯示底灰
        strokeAnimationSpeed: 1.5, // 示範動畫速度
        delayBetweenStrokes: 100,
        outlineColor: '#e2d5c3',  // 底線顏色
        strokeColor: '#3e2418',   // 寫出來的墨色
        drawingWidth: 15,         // 筆畫粗細
        
        // 💡 如果字庫沒有這個字（生僻字），觸發這個回調
        onLoadCharDataError: function(reason) {
            console.warn('字庫無此字:', targetChar, '自動跳過。');
            document.getElementById('copy-canvas-hint').style.display = 'block';
            document.getElementById('copy-canvas-hint').innerText = `已自動跳過生僻字「${targetChar}」`;
            
            setTimeout(() => {
                copyCurrentIndex++;
                renderCopyText();
            }, 800);
        }
    });

    // 啟動測驗模式（支援描摹）
    writerInstance.quiz({
        onComplete: handleCharComplete,
        onMistake: function(strokeData) {
            // 寫錯筆畫時可以給予微小的視覺提示（選擇性）
            document.getElementById('copy-canvas-hint').style.display = 'block';
            document.getElementById('copy-canvas-hint').innerText = "筆順或位置不對喔";
            setTimeout(() => {
                document.getElementById('copy-canvas-hint').style.display = 'none';
            }, 1000);
        }
    });
}
