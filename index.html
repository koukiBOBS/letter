<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閱讀交流與書房</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- GSAP & Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #faf7f2; 
            --paper: #ffffff; 
            --text: #2c3e50; 
            --text-muted: #8391a2; 
            --border: #e6e1d6;
            --font-serif: 'Noto Serif TC', serif; 
            --font-sans: 'Inter', sans-serif;
            --color-replies: #6c7a89; 
            --color-inbox: #b48e72; 
            --color-tasks: #6b8e73; 
            --color-log: #8b7355;
            --letter-paper: #fbf9f4;
            --letter-ink: #4a4238;
            --letter-line: rgba(160, 140, 120, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; line-height: 1.6; }
        h1, h2, h3, h4, .serif-text { font-family: var(--font-serif); font-weight: 500; }

        /* Notification Banner */
        #notification-banner { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--paper); border: 1px solid var(--border); padding: 16px 32px; border-radius: 30px; box-shadow: 0 12px 30px rgba(0,0,0,0.05); z-index: 10001; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 0.95rem; font-weight: 500; opacity: 0; letter-spacing: 1px;}
        #notification-banner svg { width: 22px; height: 22px; fill: currentColor; }

        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; overflow: hidden; }
        #canvas-container { position: absolute; inset: 0; z-index: 1; }
        .auth-hero { flex: 1.2; position: relative; z-index: 2; pointer-events: none; display: flex; flex-direction: column; justify-content: center; padding: 8%; }
        .auth-hero h1 { font-size: 3.5rem; color: #2c3e50; line-height: 1.3; margin-bottom: 24px; letter-spacing: 4px; font-weight: 500; font-family: var(--font-serif); }
        .auth-hero p { font-size: 1.15rem; color: #64748b; line-height: 1.8; max-width: 450px; font-family: var(--font-serif); letter-spacing: 1px;}
        .auth-sidebar { width: 480px; position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; padding: 60px; background: rgba(250, 247, 242, 0.7); backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.6); }
        .auth-panel-content { display: flex; flex-direction: column; gap: 30px; }
        .auth-sidebar h2 { font-size: 1.8rem; font-weight: 500; color: #1e293b; margin-bottom: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-box { width: 100%; background: #ffffff; border: 1px solid #cbd5e1; padding: 16px; font-family: var(--font-serif); font-size: 1rem; color: var(--text); border-radius: 4px; outline: none; transition: 0.3s; letter-spacing: 1px;}
        .input-box:focus { border-color: var(--color-tasks); }
        .btn { background: #3b3631; color: #fff; border: none; padding: 16px 24px; font-size: 1.05rem; font-family: var(--font-serif); font-weight: 400; border-radius: 4px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; letter-spacing: 2px;}
        .btn:hover { background: #1a1816; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-google { background: #ffffff; color: #3b3631; border: 1px solid #e2e8f0; width: 100%;}
        
        header { max-width: 950px; margin: 40px auto 20px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px;}
        header h2 { font-size: 1.8rem; font-weight: 500; letter-spacing: 2px;}
        .user-info { font-size: 0.95rem; color: var(--text-muted); font-family: var(--font-serif); letter-spacing: 1px;}
        .user-info a { color: var(--color-inbox); cursor: pointer; margin-left: 15px; padding: 4px 10px; border-bottom: 1px solid transparent; transition: 0.3s;}
        .user-info a:hover { border-bottom-color: var(--color-inbox); }

        /* TABS */
        .tabs { max-width: 950px; margin: 0 auto 30px; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 20px; }
        .tab-btn { background: none; border: none; font-family: var(--font-serif); font-weight: 400; font-size: 1.05rem; cursor: pointer; color: var(--text-muted); padding: 10px 0; position: relative; letter-spacing: 1px; transition: 0.3s;}
        .tab-btn.active { color: var(--text); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--text); }
        
        .has-unread::before {
            content: ''; position: absolute; top: 10px; right: -12px; width: 6px; height: 6px; background: #c25953; border-radius: 50%;
        }

        main { max-width: 950px; margin: 0 auto 100px; padding: 0 20px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Empty State */
        .empty-state { text-align: center; padding: 100px 20px; color: var(--text-muted); font-family: var(--font-serif); letter-spacing: 2px;}
        .empty-state p { font-size: 1.1rem; }

        /* Tasks & Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .task-card { background: var(--paper); border: 1px solid var(--border); padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.01); border-radius: 2px;}
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.04); }
        .task-card.completed { border-color: var(--color-tasks); background: #fdfdfc; }
        .task-card.locked { opacity: 0.5; cursor: not-allowed; border-style: dashed; }
        .task-num { font-size: 1.15rem; font-family: var(--font-serif); margin-bottom: 8px; display: block; color: #333; letter-spacing: 1px;}
        .task-date { font-size: 0.85rem; color: #999; letter-spacing: 1px;}

        /* Editor */
        .editor { background: #fbf9f4; padding: 50px; border: 1px solid #e8e3d7; box-shadow: 0 20px 50px rgba(0,0,0,0.03); position: relative; margin-top: 20px;}
        .editor::before { content: ''; position: absolute; top: 10px; bottom: 10px; left: 10px; right: 10px; border: 1px solid rgba(160, 140, 120, 0.1); pointer-events: none;}
        .field-group { margin-bottom: 35px; position: relative; z-index: 2;}
        .field-label { display: block; font-family: var(--font-serif); font-size: 1rem; color: #8b7355; margin-bottom: 12px; letter-spacing: 2px;}
        .textarea { width: 100%; background: transparent; border: 1px solid #e6e1d6; border-radius: 2px; padding: 20px; font-family: var(--font-serif); font-size: 1.1rem; line-height: 2; resize: vertical; outline: none; letter-spacing: 1px; color: var(--letter-ink);}
        .textarea:focus { border-color: #c5b4a0; background: rgba(255,255,255,0.3); }
        .flex-row { display: flex; gap: 30px; } .flex-row > div { flex: 1; }

        /* Upload */
        .upload-container { background: rgba(255,255,255,0.4); padding: 30px; border: 1px dashed #dcd6c8; display: flex; flex-direction: column; gap: 15px; align-items: flex-start;}
        .upload-btn { background: transparent; border: 1px solid #c5b4a0; padding: 12px 24px; cursor: pointer; font-size: 0.95rem; font-family: var(--font-serif); color: #5a5045; letter-spacing: 1px; transition: 0.3s; }
        .upload-btn:hover { background: #c5b4a0; color: white; }
        .privacy-warning { font-size: 0.85rem; color: #a48c76; line-height: 1.6; letter-spacing: 1px;}
        .file-name-display { font-size: 0.9rem; color: #8b7355; font-style: italic; }
        .img-preview { display: none; max-width: 100%; height: auto; max-height: 300px; margin-top: 15px; border: 5px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); object-fit: contain; }

        /* Lists */
        .list-container { display: flex; flex-direction: column; gap: 15px; }
        .list-item { display: flex; align-items: center; padding: 25px 30px; background: #fff; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; border-radius: 2px; }
        .list-item:hover { transform: translateX(5px); border-color: #dcd6c8; box-shadow: 0 5px 15px rgba(0,0,0,0.02);}
        .badge { font-size: 0.8rem; font-family: var(--font-serif); padding: 4px 10px; border: 1px solid currentColor; margin-right: 25px; letter-spacing: 1px; white-space: nowrap; }
        .badge.unread { color: #c25953; } .badge.replied { color: #9ca3af; border-color: #e5e7eb;} .badge.wait { color: #b48e72; }
        .item-title { flex-grow: 1; font-size: 1.1rem; font-family: var(--font-serif); letter-spacing: 1px; color: #333;}
        .item-time { font-size: 0.85rem; color: #999; font-family: var(--font-sans); letter-spacing: 1px;}
        
        .pagination { display: flex; justify-content: center; gap: 15px; margin-top: 40px; }
        .page-btn { background: transparent; border: none; color: #999; cursor: pointer; font-family: var(--font-serif); font-size: 1rem; transition: 0.3s; }
        .page-btn:hover, .page-btn.active { color: #333; text-decoration: underline; text-underline-offset: 4px;}
        .delete-btn { background: none; border: none; cursor: pointer; padding: 8px; color: #ccc; margin-left: 20px; transition: 0.3s;}
        .delete-btn:hover { color: #c25953; } .delete-btn.locked-btn { opacity: 0.3; cursor: not-allowed; }

        /* Reading Log */
        .log-header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .toggle-add-btn { background: transparent; border: 1px solid var(--color-log); color: var(--color-log); padding: 8px 20px; font-family: var(--font-serif); letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .toggle-add-btn:hover { background: var(--color-log); color: white; }
        .log-card { background: #fff; border: 1px solid var(--border); padding: 35px; margin-bottom: 20px; position: relative; }
        .log-card h4 { font-family: var(--font-serif); font-size: 1.3rem; color: #333; margin-bottom: 15px; letter-spacing: 2px;}
        .log-card p { color: #555; font-size: 1.05rem; line-height: 2; white-space: pre-wrap; font-family: var(--font-serif); letter-spacing: 1px;}
        .log-card .date { font-size: 0.85rem; color: #aaa; margin-top: 20px; letter-spacing: 1px; } 
        .log-card .delete-btn { position: absolute; top: 25px; right: 25px; }

        /* ====================================================
           MODAL UI & 高級信箋排版 (THE LETTER AESTHETIC)
           ==================================================== */
        #modal { position: fixed; inset: 0; background: rgba(20, 18, 16, 0.85); z-index: 2000; display: none; justify-content: center; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(5px); }
        
        .letter-desk { width: 100%; max-width: 700px; margin: auto; display: flex; flex-direction: column; gap: 40px; position: relative;}
        
        .modal-close-btn { position: fixed; top: 30px; right: 40px; background: transparent; border: none; font-size: 2.5rem; font-weight: 200; color: #e6dfd1; cursor: pointer; transition: 0.3s; z-index: 2100;}
        .modal-close-btn:hover { transform: scale(1.1); color: #fff; }

        /* 優雅的高級信箋本體 */
        .letter-sheet {
            background-color: var(--letter-paper);
            background-image: linear-gradient(to right, transparent 49.8%, rgba(0,0,0,0.02) 50%, transparent 50.2%);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 50px rgba(180, 160, 130, 0.05);
            padding: 80px 10%;
            position: relative;
            transform-origin: top center;
            animation: unfold 0.8s cubic-bezier(0.2, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes unfold { to { opacity: 1; transform: translateY(0); } }

        /* 優雅的橫紋線條 */
        .letter-sheet::after {
            content: '';
            position: absolute;
            top: 12%; bottom: 8%; left: 8%; right: 8%;
            border-top: 1px solid rgba(160, 140, 120, 0.3);
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 44px, var(--letter-line) 44px, var(--letter-line) 45px);
            pointer-events: none;
            z-index: 1;
        }

        .letter-header-meta {
            text-align: right; font-family: var(--font-serif); font-size: 0.9rem; color: #a48c76; letter-spacing: 2px; margin-bottom: 50px; position: relative; z-index: 2; border-bottom: 1px solid rgba(160, 140, 120, 0.2); padding-bottom: 15px;
        }

        .letter-text {
            position: relative; z-index: 2; font-family: var(--font-serif); font-size: 1.15rem; color: var(--letter-ink); line-height: 45px; /* 與背景橫紋高度完美呼應 */ letter-spacing: 2px; white-space: pre-wrap; text-align: justify;
        }

        /* 充滿文學感的置中隔斷線 (取代原本的標籤) */
        .letter-section-divider {
            display: block; text-align: center; font-size: 0.95rem; color: #9c8a75; letter-spacing: 0.8em; margin: 2em 0 1em 0; position: relative; font-weight: 300;
        }
        .letter-section-divider::before, .letter-section-divider::after {
            content: ''; position: absolute; top: 50%; width: 25%; height: 1px; background: rgba(160, 140, 120, 0.3);
        }
        .letter-section-divider::before { left: 5%; }
        .letter-section-divider::after { right: 5%; }

        .letter-img-wrap { display: block; margin: 40px auto; text-align: center; position: relative; z-index: 2; }
        .letter-img { max-width: 90%; max-height: 400px; border: 8px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.08); object-fit: contain; filter: sepia(10%) contrast(95%); transition: 0.4s;}
        .letter-img:hover { transform: scale(1.02); filter: none; }

        /* 回信區塊也是一張紙 */
        .reply-sheet { padding: 50px 10%; margin-top: 20px;}
        #reply-text { min-height: 200px; border: none; background: transparent; padding: 0; line-height: 45px; margin-bottom: 30px; font-size: 1.15rem; }
        #reply-text:focus { box-shadow: none; background: transparent; }

        /* Envelope Anim */
        #anim-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 15, 17, 0.95); z-index: 9999; align-items: center; justify-content: center; perspective: 1500px; }
        .env-wrapper { position: relative; width: 340px; height: 220px; animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .env-back { position: absolute; inset: 0; background: #8e6c51; z-index: 1; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
        .paper-anim { position: absolute; bottom: 15px; left: 20px; right: 20px; height: 380px; background: #fbf9f4; z-index: 5; background-image: repeating-linear-gradient(to bottom, transparent, transparent 15px, rgba(160, 140, 120, 0.15) 15px, rgba(160, 140, 120, 0.15) 16px); }
        .env-front-left { position: absolute; top: 0; left: 0; border-top: 110px solid transparent; border-bottom: 110px solid transparent; border-left: 170px solid #b68e68; z-index: 11; }
        .env-front-right { position: absolute; top: 0; right: 0; border-top: 110px solid transparent; border-bottom: 110px solid transparent; border-right: 170px solid #a9835d; z-index: 12; }
        .env-front-bottom { position: absolute; bottom: 0; left: 0; border-left: 170px solid transparent; border-right: 170px solid transparent; border-bottom: 125px solid #c59c75; z-index: 13; }
        .env-flap { position: absolute; top: 0; left: 0; border-left: 170px solid transparent; border-right: 170px solid transparent; border-top: 130px solid #ceaa83; transform-origin: top center; z-index: 15; }
        .env-seal { position: absolute; top: 110px; left: 50%; transform: translate(-50%, -50%) scale(0); width: 45px; height: 45px; background: #8e2b26; border-radius: 50%; z-index: 20; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="notification-banner"><span id="notification-text">信差送來了新的回音。</span></div>

    <!-- Auth -->
    <div id="auth-overlay">
        <div id="canvas-container"></div>
        <div class="auth-hero">
            <h1>紙短情長<br>見字如面</h1>
            <p>在喧囂的世界裡，留一方靜謐的角落。<br>寫下你的閱讀感悟，等待另一顆靈魂的真誠共鳴。</p>
        </div>
        <div class="auth-sidebar">
            <div id="login-container" class="auth-panel-content">
                <div><h2>登入書房</h2><p>開啟您的文字旅程</p></div>
                <button class="btn btn-google" onclick="signIn()">使用 Google 帳號登入</button>
            </div>
            <div id="name-setup-container" class="auth-panel-content" style="display:none;">
                <div><h2>落款筆名</h2><p>請輸入姓名或學號（對筆友將保持匿名）。</p></div>
                <div class="input-group"><input type="text" id="setup-name" class="input-box" placeholder="例如：林小明 / 50211"></div>
                <button class="btn" onclick="saveName()">提筆進入</button>
            </div>
        </div>
    </div>

    <!-- Mail Anim -->
    <div id="anim-overlay">
        <div class="env-wrapper">
            <div class="env-back"></div>
            <div class="paper-anim" id="anim-paper"></div>
            <div class="env-front-left"></div><div class="env-front-right"></div><div class="env-front-bottom"></div>
            <div class="env-flap" id="anim-flap"></div><div class="env-seal" id="anim-seal"></div>
        </div>
    </div>

    <header>
        <h2>閱讀書房</h2>
        <div class="user-info"><span id="user-name">載入中...</span><a onclick="signOut()">擱筆暫歇</a></div>
    </header>

    <nav class="tabs">
        <button class="tab-btn tab-replies active" onclick="switchTab('tab-replies', this)">回音與共鳴</button>
        <button class="tab-btn tab-inbox" onclick="switchTab('tab-inbox', this)">遠方的來信</button>
        <button class="tab-btn tab-tasks" onclick="switchTab('tab-tasks', this)">閱讀與撰寫</button>
        <button class="tab-btn tab-log" onclick="switchTab('tab-log', this)">私密書單</button>
    </nav>

    <main>
        <section id="tab-replies" class="section active"><div class="list-container" id="replies-list"></div><div class="pagination" id="replies-pagination"></div></section>
        <section id="tab-inbox" class="section"><div class="list-container" id="inbox-list"></div><div class="pagination" id="inbox-pagination"></div></section>
        
        <section id="tab-tasks" class="section">
            <div class="grid" id="task-grid"></div>

            <div class="editor" id="write-editor" style="display: none;">
                <h3 id="task-title" class="serif-text" style="margin-bottom: 40px; font-size: 1.6rem; color: #3b3631; letter-spacing: 2px; text-align: center;">撰寫信件</h3>
                
                <div class="field-group flex-row">
                    <div><label class="field-label">書籍名稱</label><input type="text" id="book-title" class="input-box" placeholder="請輸入書名"></div>
                    <div><label class="field-label">目前閱讀頁數</label><input type="number" id="book-page" class="input-box" placeholder="例如：120" min="1"></div>
                </div>

                <div class="field-group"><label class="field-label">思考問題</label><textarea id="log-question" class="textarea" style="min-height:120px;" placeholder="寫下因閱讀而生的疑惑或哲思..."></textarea></div>
                <div class="field-group"><label class="field-label">閱讀心得</label><textarea id="log-content" class="textarea" style="min-height:280px;" placeholder="細訴文字帶給你的觸動...（最少 150 字）"></textarea></div>

                <div class="field-group upload-container">
                    <label class="field-label" style="margin-bottom: 0;">捕捉書籍畫面 (必填)</label>
                    <div class="privacy-warning">請注意：此照片將隨信附上，請勿拍攝含有個人隱私資訊的畫面。</div>
                    <label class="upload-btn">挑選照片 <input type="file" id="book-image" accept="image/*" style="display:none;" onchange="handleFileSelect(event)"></label>
                    <span id="file-name-display" class="file-name-display">紙張邊緣尚未夾帶相片</span>
                    <img id="image-preview" class="img-preview" src="" alt="相片預覽">
                </div>
                
                <div style="text-align: center; margin-top: 50px;"><button id="btn-submit-task" class="btn" style="width: auto; padding: 16px 40px; margin: 0 auto;" onclick="submitLog()">封上火漆印，寄出</button></div>
            </div>
        </section>

        <section id="tab-log" class="section">
            <div class="log-header-container">
                <h3 class="serif-text" style="font-size: 1.5rem; letter-spacing: 2px;">案頭上的書單</h3>
                <button class="toggle-add-btn" onclick="toggleReadingLog()" title="新增閱讀紀錄">添置新書</button>
            </div>
            
            <div class="editor" id="mylog-editor" style="display: none; margin-bottom: 40px; padding: 40px;">
                <div class="field-group"><label class="field-label">書籍名稱</label><input type="text" id="mylog-title" class="input-box" placeholder="輸入書名"></div>
                <div class="field-group"><label class="field-label">私密隨筆</label><textarea id="mylog-notes" class="textarea" style="min-height:150px;" placeholder="寫下專屬於你的私密閱讀感悟..."></textarea></div>
                <button class="btn" style="width: auto; margin: 0 auto;" onclick="submitReadingLog()">收入書單</button>
            </div>
            <div id="mylog-list"></div>
        </section>
    </main>

    <!-- Modal (信紙展示區) -->
    <div id="modal">
        <button class="modal-close-btn" onclick="closeModal()">×</button>
        <div class="letter-desk" id="chat-flow">
            <!-- 這裡將動態生成 .letter-sheet 信紙 -->
        </div>
    </div>

    <!-- Three.js Background -->
    <script>
        let scene, camera, renderer, particles; let run3D = true;
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0xfaf7f2, 0.0025);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.z = 40;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.setClearColor(0xfaf7f2, 1);
            container.appendChild(renderer.domElement); scene.add(new THREE.AmbientLight(0xffffff, 0.7)); const dl = new THREE.DirectionalLight(0xfffaeb, 0.6); dl.position.set(20, 40, 20); scene.add(dl);
            const geo = new THREE.PlaneGeometry(1.5, 2.2); const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.9, transparent: true, opacity: 0.85 });
            particles = new THREE.Group(); scene.add(particles);
            for(let i=0; i<120; i++) {
                const m = new THREE.Mesh(geo, mat); m.position.set((Math.random()-0.5)*120, (Math.random()-0.5)*100, (Math.random()-0.5)*60);
                m.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                m.userData = { rotSpeedX:(Math.random()-0.5)*0.015, rotSpeedY:(Math.random()-0.5)*0.015, floatSpeed:Math.random()*0.03+0.01 }; particles.add(m);
            }
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }); animateThreeJS();
        }
        function animateThreeJS() { if(!run3D) return; requestAnimationFrame(animateThreeJS); particles.children.forEach(m => { m.rotation.x+=m.userData.rotSpeedX; m.rotation.y+=m.userData.rotSpeedY; m.position.y+=m.userData.floatSpeed; m.position.x+=Math.sin(m.position.y*0.05)*0.02; if(m.position.y>60) m.position.y=-60; }); renderer.render(scene, camera); }
        initThreeJS();
    </script>

    <script>
        // ==========================================
        // ⚠️ 請替換為你最新部署的 Apps Script 網址
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzcangpOrf05ZRhxzoMUN-C9T57CS3_G80to1lLWv4opXuHbYMMMuKXzap7kkcou3BPsQ/exec"; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyCkGPRej1rMWVfm7Et6zJlrj3Bnm5-IVms",
            authDomain: "letter-a74d1.firebaseapp.com",
            databaseURL: "https://letter-a74d1-default-rtdb.firebaseio.com",
            projectId: "letter-a74d1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();

        let currentUser = null; let config = null; let selectedTaskIndex = null; let hasUnrepliedLetters = false; let currentChatRef = null; let isInitialLoad = true;
        let selectedFileBase64 = null; let selectedFileName = null;
        const ITEMS_PER_PAGE = 10; let repliesData = []; let inboxData = []; let currentPageReplies = 1; let currentPageInbox = 1;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                db.ref(`users/${user.uid}`).once('value', snap => {
                    if (snap.val() && snap.val().name) { document.getElementById('user-name').innerText = snap.val().name; hideAuthOverlay(); initApp(); } 
                    else { document.getElementById('login-container').style.display = 'none'; document.getElementById('name-setup-container').style.display = 'flex'; }
                });
            } else { document.getElementById('auth-overlay').style.display = 'flex'; document.getElementById('login-container').style.display = 'flex'; document.getElementById('name-setup-container').style.display = 'none'; run3D = true; animateThreeJS(); }
        });

        function hideAuthOverlay() { gsap.to("#auth-overlay", { opacity: 0, duration: 0.6, onComplete: () => { document.getElementById('auth-overlay').style.display = 'none'; run3D = false; }}); }
        function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function signOut() { auth.signOut().then(() => window.location.reload()); }
        function saveName() { const name = document.getElementById('setup-name').value.trim(); if (!name) return alert("請留下稱呼"); db.ref(`users/${currentUser.uid}`).set({ name, email: currentUser.email }).then(() => { document.getElementById('user-name').innerText = name; hideAuthOverlay(); initApp(); }); }

        function initApp() { healPool(); db.ref('settings/taskConfig').on('value', snap => { config = snap.val(); renderTasks(); }); setupNotifications(); loadMailbox(); loadReadingLogs(); }

        function setupNotifications() {
            const threadRef = db.ref(`user_threads/${currentUser.uid}`);
            threadRef.once('value').then(() => { isInitialLoad = false; });
            
            threadRef.on('child_changed', snap => { 
                if (!isInitialLoad && snap.val().hasUnread) { triggerNotification("信差帶來了新的回音。", snap.val().letterId); }
            });
            threadRef.on('child_added', snap => { 
                if (!isInitialLoad && !snap.val().isSender) { triggerNotification("遠方寄來了一封新信件。", snap.val().letterId); }
            });
        }

        function triggerNotification(msg, id) {
            const b = document.getElementById('notification-banner'); 
            document.getElementById('notification-text').innerText = msg; 
            gsap.killTweensOf(b); 
            gsap.fromTo(b, {y:0, opacity:0}, {y:120, opacity:1, duration:0.6, ease:"back.out(1.5)"});
            b.onclick = () => { openChat(id); gsap.to(b, {y:0, opacity:0, duration:0.4}); };
            setTimeout(() => gsap.to(b, {y:0, opacity:0, duration:0.4}), 8000);
        }

        function loadMailbox() {
            db.ref(`user_threads/${currentUser.uid}`).on('value', snap => {
                let all = Object.values(snap.val() || {}).sort((a, b) => b.lastUpdated - a.lastUpdated);
                repliesData = []; inboxData = []; hasUnrepliedLetters = false;
                let unreadInReplies = false; let unreadInInbox = false;

                all.forEach(t => {
                    if (t.isSender) { 
                        if (t.hasBeenRepliedTo) { 
                            repliesData.push(t); 
                            if(!t.hasReplied) hasUnrepliedLetters = true; 
                            if(t.hasUnread) unreadInReplies = true;
                        } 
                    } else { 
                        inboxData.push(t); 
                        if(!t.hasReplied) hasUnrepliedLetters = true; 
                        if(t.hasUnread) unreadInInbox = true;
                    }
                });

                document.querySelector('.tab-replies').classList.toggle('has-unread', unreadInReplies);
                document.querySelector('.tab-inbox').classList.toggle('has-unread', unreadInInbox);

                if (currentPageReplies > Math.ceil(repliesData.length / ITEMS_PER_PAGE) || 1) currentPageReplies = Math.ceil(repliesData.length / ITEMS_PER_PAGE) || 1;
                if (currentPageInbox > Math.ceil(inboxData.length / ITEMS_PER_PAGE) || 1) currentPageInbox = Math.ceil(inboxData.length / ITEMS_PER_PAGE) || 1;

                renderPaginatedList('replies', repliesData, currentPageReplies);
                renderPaginatedList('inbox', inboxData, currentPageInbox);
            });
        }

        function healPool() {
            db.ref('unassigned_letters').once('value', snap => {
                const pool = snap.val() || {}; const ids = Object.keys(pool).filter(id => pool[id].senderUid !== currentUser.uid);
                if (ids.length > 0) {
                    const rId = ids[Math.floor(Math.random() * ids.length)];
                    db.ref(`letters/${rId}`).once('value', lSnap => {
                        const lData = lSnap.val(); if(lData) {
                            db.ref(`letters/${rId}/recipientUid`).set(currentUser.uid); db.ref(`unassigned_letters/${rId}`).remove();
                            const now = firebase.database.ServerValue.TIMESTAMP;
                            db.ref(`user_threads/${currentUser.uid}/${rId}`).set({ letterId: rId, bookTitle: lData.bookTitle, isSender: false, hasUnread: true, hasReplied: false, lastUpdated: now });
                            db.ref(`user_threads/${lData.senderUid}/${rId}`).set({ letterId: rId, bookTitle: lData.bookTitle, isSender: true, hasUnread: false, hasBeenRepliedTo: false, hasReplied: false, lastUpdated: now });
                        }
                    });
                }
            });
        }

        function renderPaginatedList(type, data, currentPage) {
            const listEl = document.getElementById(`${type}-list`);
            const pageEl = document.getElementById(`${type}-pagination`);
            listEl.innerHTML = ''; pageEl.innerHTML = '';

            const emptyUI = `<div class="empty-state"><p>信箱空空如也，靜候佳音。</p></div>`;
            if (data.length === 0) { listEl.innerHTML = emptyUI; return; }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageData = data.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            pageData.forEach(t => {
                const d = new Date(t.lastUpdated);
                const timeStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
                const el = document.createElement('div'); el.className = 'list-item';
                const deleteHTML = t.hasReplied ? `<button class="delete-btn" onclick="deleteThread('${t.letterId}', event)">焚毀</button>` : `<button class="delete-btn locked-btn" onclick="event.stopPropagation(); alert('請先回覆後才能焚毀信件。');">焚毀</button>`;
                let badge = !t.hasReplied ? `<span class="badge wait">等待提筆</span>` : (t.hasUnread ? `<span class="badge unread">新信件</span>` : `<span class="badge replied">已讀</span>`);
                el.onclick = () => openChat(t.letterId);
                el.innerHTML = `${badge}<div class="item-title">${type==='replies'?'關於':'遠方寄來'}《${escapeHtml(t.bookTitle)}》的${type==='replies'?'回音':'信箋'}</div><div class="item-time">${timeStr}</div>${deleteHTML}`;
                listEl.appendChild(el);
            });

            const totalPages = Math.ceil(data.length / ITEMS_PER_PAGE);
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.className = `page-btn ${i === currentPage ? 'active' : ''}`; btn.innerText = i;
                    btn.onclick = () => { if (type === 'replies') currentPageReplies = i; else currentPageInbox = i; renderPaginatedList(type, type === 'replies' ? repliesData : inboxData, i); };
                    pageEl.appendChild(btn);
                }
            }
        }

        window.deleteThread = function(id, e) { e.stopPropagation(); if(confirm("確認將此信件焚毀？此操作無法還原。")) db.ref(`user_threads/${currentUser.uid}/${id}`).remove(); };

        function handleFileSelect(event) {
            const file = event.target.files[0]; if (!file) return;
            selectedFileName = file.name; document.getElementById('file-name-display').innerText = selectedFileName;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    selectedFileBase64 = dataUrl.split(',')[1];
                    const preview = document.getElementById('image-preview'); preview.src = dataUrl; preview.style.display = 'block';
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function submitLog() {
            const title = document.getElementById('book-title').value.trim(); const page = document.getElementById('book-page').value.trim();
            const question = document.getElementById('log-question').value.trim(); const text = document.getElementById('log-content').value.trim();
            
            if (!title || !page || !question || !text) return alert("信件尚未寫滿，請完成所有空缺。");
            if (!selectedFileBase64) return alert("請夾帶一張書籍畫面的相片。");
            if (text.length < 150) return alert("文字過於簡短，請寫滿至少 150 字。");
            
            const btn = document.getElementById('btn-submit-task'); btn.innerText = "正在封裝火漆印..."; btn.disabled = true;

            try {
                const response = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ fileName: selectedFileName, mimeType: 'image/jpeg', base64: selectedFileBase64 }) 
                });
                
                const responseText = await response.text();
                let result; try { result = JSON.parse(responseText); } catch (e) { throw new Error("郵差迷路了。"); }
                if (!result.success) throw new Error(result.error || "信件寄送失敗");

                const combinedText = `【目前進度】\n停泊在第 ${page} 頁\n\n【思考問題】\n${question}\n\n【閱讀心得】\n${text}`;
                playAnim('log', null, null, {title: title, text: combinedText, imageUrl: result.url});
            } catch (error) {
                alert("相片夾帶失敗。\n詳細原因：" + error.message);
                btn.innerText = "封裝寄出"; btn.disabled = false;
            }
        }

        function renderTasks() {
            const grid = document.getElementById('task-grid'); grid.innerHTML = ''; if (!config) return;
            const start = new Date(config.startDate); const total = Math.floor(((new Date(config.endDate) - start) / 86400000) / config.intervalDays);
            
            db.ref('letters').orderByChild('senderUid').equalTo(currentUser.uid).once('value', snap => {
                const submitted = Object.values(snap.val()||{}).map(l=>l.taskIndex); const map = {}; Object.values(snap.val()||{}).forEach(l=>map[l.taskIndex]=l.id);
                for (let i=0; i<total; i++) {
                    const d = new Date(start.getTime() + i*config.intervalDays*86400000); 
                    
                    // 【修正時間判定】歸零到當天 00:00，確保只要日期到了就解鎖
                    const today = new Date(); today.setHours(0, 0, 0, 0);
                    const unlockDate = new Date(d); unlockDate.setHours(0, 0, 0, 0);
                    const unlocked = today >= unlockDate; 
                    
                    const done = submitted.includes(i);
                    const el = document.createElement('div'); el.className = `task-card ${done?'completed':''} ${!unlocked&&!done?'locked':''}`;
                    el.innerHTML = `<span class="task-num">第 ${i+1} 封信件</span><span class="task-date">${d.getMonth()+1}/${d.getDate()} 啟封</span>`;
                    el.onclick = () => {
                        if (done) openChat(map[i]);
                        else if (unlocked) {
                            if (hasUnrepliedLetters) return alert("案頭尚有未回覆的信件，請先執筆回信。");
                            selectedTaskIndex = i; document.getElementById('task-title').innerText = `撰寫第 ${i+1} 封信件`;
                            document.getElementById('write-editor').style.display = 'block'; document.getElementById('write-editor').scrollIntoView({behavior:'smooth'});
                            document.getElementById('btn-submit-task').innerText = "封上火漆印，寄出"; document.getElementById('btn-submit-task').disabled = false;
                            document.getElementById('file-name-display').innerText = "紙張邊緣尚未夾帶相片"; document.getElementById('image-preview').style.display = 'none';
                            selectedFileBase64 = null; document.getElementById('book-image').value = '';
                        } else alert("時辰未到，信封尚未解鎖。");
                    }; grid.appendChild(el);
                }
            });
        }

        function openChat(id) {
            db.ref(`user_threads/${currentUser.uid}/${id}`).update({hasUnread: false});
            db.ref(`letters/${id}`).once('value', lSnap => {
                const l = lSnap.val(); if (!l) return;
                const flow = document.getElementById('chat-flow'); const partnerUid = currentUser.uid === l.senderUid ? l.recipientUid : l.senderUid;
                
                if (currentChatRef) currentChatRef.off(); currentChatRef = db.ref(`conversations/${id}`);
                currentChatRef.on('value', cSnap => {
                    flow.innerHTML = '';
                    Object.values(cSnap.val()||{}).forEach((m, index) => {
                        const isMe = m.senderUid === currentUser.uid; 
                        const d = new Date(m.timestamp);
                        const tStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
                        
                        // 將文字轉為高級排版
                        let formattedText = escapeHtml(m.text);
                        formattedText = formattedText.replace(/【目前進度】/g, '<span class="letter-section-divider">目前閱讀段落</span>');
                        formattedText = formattedText.replace(/【思考問題】/g, '<span class="letter-section-divider">文字衍生的提問</span>');
                        formattedText = formattedText.replace(/【閱讀心得】/g, '<span class="letter-section-divider">閱讀感悟</span>');

                        let imgTag = '';
                        if (m.imageUrl) {
                            imgTag = `
                            <a href="${m.imageUrl}" target="_blank" class="letter-img-wrap">
                                <img src="${m.imageUrl}" class="letter-img" alt="隨信相片" referrerpolicy="no-referrer" loading="lazy">
                            </a>`;
                        }

                        // 每一封信都是一張獨立的紙
                        const animationDelay = index * 0.2;
                        flow.innerHTML += `
                        <div class="letter-sheet" style="animation-delay: ${animationDelay}s;">
                            <div class="letter-header-meta">${isMe ? '我的筆跡' : '遠方的來信'} ── ${tStr}</div>
                            <div class="letter-text">${formattedText}</div>
                            ${imgTag}
                        </div>`;
                    });

                    // 附加回覆紙張
                    flow.innerHTML += `
                    <div class="letter-sheet reply-sheet" style="animation-delay: ${Object.values(cSnap.val()||{}).length * 0.2}s;">
                        <textarea id="reply-text" class="textarea" placeholder="在此處提筆，寫下你的回音...（最少 100 字）"></textarea>
                        <div style="text-align: center;"><button class="btn" style="margin: 0 auto; padding: 12px 40px;" id="btn-send-reply">寄出回信</button></div>
                    </div>`;

                    document.getElementById('btn-send-reply').onclick = () => {
                        const txt = document.getElementById('reply-text').value.trim();
                        if (!txt || txt.length < 100) return alert("文字過於簡短，請寫滿至少 100 字。");
                        playAnim('reply', id, partnerUid, txt);
                    };

                });
                document.getElementById('modal').style.display = 'flex'; document.body.style.overflow = 'hidden';
            });
        }
        
        function closeModal() { 
            if (currentChatRef) currentChatRef.off(); 
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function playAnim(type, letterId, partnerUid, ObjectData) {
            const overlay = document.getElementById('anim-overlay'); overlay.style.display = 'flex';
            gsap.set(".env-wrapper", {y: 0, scale: 1, opacity: 1}); gsap.set("#anim-paper", {y: 0, zIndex: 5}); gsap.set("#anim-flap", {rotateX: 180, zIndex: 4}); gsap.set("#anim-seal", {scale: 0});
            
            // 將信紙插入信封並封口
            gsap.timeline()
                .to("#anim-paper", {y: 200, duration: 0.8, ease: "power2.in"})
                .set("#anim-flap", {zIndex: 15})
                .to("#anim-flap", {rotateX: 0, duration: 0.6})
                .to("#anim-seal", {scale: 1, duration: 0.4, ease: "back.out(1.5)"})
                .to(".env-wrapper", {y: -500, scale: 0.8, opacity: 0, duration: 0.8, delay: 0.5, ease: "power2.in", onComplete: () => {
                  overlay.style.display = 'none';
                  if (type === 'log') processLog(ObjectData); else processReply(letterId, partnerUid, ObjectData);
            }});
        }

        function processLog(data) {
            const ts = firebase.database.ServerValue.TIMESTAMP; const ref = db.ref('letters').push();
            db.ref('users').once('value', snap => {
                const uids = Object.keys(snap.val() || {}).filter(u => u !== currentUser.uid); const rec = uids.length ? uids[Math.floor(Math.random() * uids.length)] : "";
                ref.set({ id: ref.key, senderUid: currentUser.uid, bookTitle: data.title, timestamp: ts, taskIndex: selectedTaskIndex, recipientUid: rec }).then(() => {
                    db.ref(`user_threads/${currentUser.uid}/${ref.key}`).set({ letterId: ref.key, bookTitle: data.title, isSender: true, hasUnread: false, hasBeenRepliedTo: false, hasReplied: false, lastUpdated: ts });
                    if (rec) db.ref(`user_threads/${rec}/${ref.key}`).set({ letterId: ref.key, bookTitle: data.title, isSender: false, hasUnread: true, hasReplied: false, lastUpdated: ts });
                    else db.ref(`unassigned_letters/${ref.key}`).set({ senderUid: currentUser.uid });
                    db.ref(`conversations/${ref.key}`).push({ senderUid: currentUser.uid, text: data.text, imageUrl: data.imageUrl, timestamp: ts });
                    
                    document.getElementById('book-title').value = ''; document.getElementById('book-page').value = ''; document.getElementById('log-question').value = ''; document.getElementById('log-content').value = ''; 
                    document.getElementById('book-image').value=''; selectedFileBase64=null; document.getElementById('file-name-display').innerText="紙張邊緣尚未夾帶相片"; document.getElementById('image-preview').style.display = 'none';
                    document.getElementById('write-editor').style.display = 'none'; document.getElementById('btn-submit-task').disabled=false; document.getElementById('btn-submit-task').innerText="封上火漆印，寄出";
                    renderTasks(); alert('信件已隨風寄出！'); switchTab('tab-tasks', document.querySelector('.tab-tasks'));
                });
            });
        }
        
        function processReply(id, pUid, text) {
            const ts = firebase.database.ServerValue.TIMESTAMP;
            db.ref(`conversations/${id}`).push({ senderUid: currentUser.uid, text, timestamp: ts }).then(() => {
                if (pUid) db.ref(`user_threads/${pUid}/${id}`).update({ hasUnread: true, lastUpdated: ts, hasBeenRepliedTo: true });
                db.ref(`user_threads/${currentUser.uid}/${id}`).update({ hasUnread: false, hasReplied: true, lastUpdated: ts });
                closeModal();
            });
        }

        function toggleReadingLog() {
            const editor = document.getElementById('mylog-editor');
            if (editor.style.display === 'none') {
                editor.style.display = 'block';
                gsap.fromTo(editor, {height: 0, opacity: 0}, {height: 'auto', opacity: 1, duration: 0.4});
            } else {
                gsap.to(editor, {opacity: 0, duration: 0.3, onComplete: () => editor.style.display = 'none'});
            }
        }

        function submitReadingLog() {
            const title = document.getElementById('mylog-title').value.trim(); const notes = document.getElementById('mylog-notes').value.trim();
            if(!title) return alert("書籍名稱不得留白。");
            db.ref(`reading_logs/${currentUser.uid}`).push({ bookTitle: title, notes: notes, timestamp: firebase.database.ServerValue.TIMESTAMP }).then(() => {
                document.getElementById('mylog-title').value = ''; document.getElementById('mylog-notes').value = ''; alert("已收錄至案頭書單。");
                toggleReadingLog(); 
            });
        }

        function loadReadingLogs() {
            db.ref(`reading_logs/${currentUser.uid}`).on('value', snap => {
                const list = document.getElementById('mylog-list'); list.innerHTML = '';
                const logsArray = Object.keys(snap.val() || {}).map(k => ({id: k, ...snap.val()[k]})).sort((a,b) => b.timestamp - a.timestamp);
                if(logsArray.length === 0) { list.innerHTML = `<div class="empty-state"><p>案頭書單仍是一片空白，添置第一本書吧。</p></div>`; return; }
                logsArray.forEach(log => {
                    const d = new Date(log.timestamp); const el = document.createElement('div'); el.className = 'log-card';
                    el.innerHTML = `<h4>《${escapeHtml(log.bookTitle)}》</h4>${log.notes ? `<p>${escapeHtml(log.notes)}</p>` : ''}<div class="date">收錄於 ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}</div><button class="delete-btn" onclick="deleteReadingLog('${log.id}')" title="移除書單">抹除</button>`;
                    list.appendChild(el);
                });
            });
        }

        window.deleteReadingLog = function(id) { if(confirm("確定要將這本書從案頭抹除嗎？")) db.ref(`reading_logs/${currentUser.uid}/${id}`).remove(); };
        function switchTab(id, btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); btn.classList.add('active'); document.getElementById(id).classList.add('active'); }
        function escapeHtml(s) { return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):s; }
    </script>
</body>
</html>
