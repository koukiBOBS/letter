<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閱讀交流與書房 - 全螢幕手寫信箋</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- GSAP & Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* CSS 變數區塊 */
        :root {
            --bg: #faf7f2; 
            --paper: #ffffff; 
            --text: #2c3e50; 
            --text-muted: #8391a2; 
            --border: #e6e1d6;
            --font-serif: 'Noto Serif TC', serif; 
            --font-sans: 'Inter', sans-serif;
            --color-replies: #548ca8; 
            --color-inbox: #d98a6c; 
            --color-tasks: #6b8e73; 
            --color-log: #8b7355;
            
            /* Letter Aesthetic Variables */
            --letter-paper: #fbf9f4;
            --letter-ink: #4a4238;
            --letter-line: rgba(160, 140, 120, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; line-height: 1.6; }
        h1, h2, h3, h4, .serif-text { font-family: var(--font-serif); }

        /* Notification Banner */
        #notification-banner { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--paper); border: 1px solid var(--border); padding: 16px 32px; border-radius: 30px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); z-index: 10001; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 0.95rem; font-weight: 600; opacity: 0; width: 90%; max-width: 400px; justify-content: center;}
        
        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; overflow: hidden; }
        #canvas-container { position: absolute; inset: 0; z-index: 1; }
        .auth-hero { flex: 1.2; position: relative; z-index: 2; pointer-events: none; display: flex; flex-direction: column; justify-content: center; padding: 8%; }
        .auth-hero h1 { font-size: 3.5rem; color: #2c3e50; line-height: 1.3; margin-bottom: 24px; letter-spacing: 2px; font-weight: 600; }
        .auth-hero p { font-size: 1.15rem; color: #64748b; line-height: 1.8; max-width: 450px; }
        .auth-sidebar { width: 480px; position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; padding: 60px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(25px); border-left: 1px solid rgba(255,255,255,0.8); }
        .auth-panel-content { display: flex; flex-direction: column; gap: 30px; }
        .auth-sidebar h2 { font-size: 1.8rem; font-weight: 600; color: #1e293b; margin-bottom: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-box { width: 100%; background: #ffffff; border: 1px solid #cbd5e1; padding: 16px; font-family: var(--font-sans); font-size: 1rem; color: var(--text); border-radius: 8px; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--color-tasks); box-shadow: 0 0 0 3px rgba(107, 142, 115, 0.1); }
        .btn { background: #1e293b; color: #fff; border: none; padding: 16px 24px; font-size: 1.05rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { background: #334155; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-google { background: #ffffff; color: #334155; border: 1px solid #e2e8f0; width: 100%;}
        
        header { max-width: 950px; margin: 40px auto 20px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        header h2 { font-size: 1.6rem; font-weight: 600; }
        .user-info { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .user-info a { color: var(--color-inbox); cursor: pointer; margin-left: 15px; padding: 6px 12px; border-radius: 20px; background: rgba(217, 138, 108, 0.1); }

        /* TABS */
        .tabs { max-width: 950px; margin: 0 auto 30px; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 10px; border-bottom: 2px solid var(--border); }
        .tab-btn { background: none; border: none; font-family: var(--font-sans); font-weight: 500; font-size: 1rem; cursor: pointer; color: var(--text-muted); padding: 14px 20px; position: relative; display: flex; align-items: center; gap: 8px; border-radius: 8px 8px 0 0; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; }
        
        .tab-btn.tab-replies.active { color: var(--color-replies); } .tab-btn.tab-replies.active::after { background: var(--color-replies); }
        .tab-btn.tab-inbox.active { color: var(--color-inbox); } .tab-btn.tab-inbox.active::after { background: var(--color-inbox); }
        .tab-btn.tab-tasks.active { color: var(--color-tasks); } .tab-btn.tab-tasks.active::after { background: var(--color-tasks); }
        .tab-btn.tab-log.active { color: var(--color-log); } .tab-btn.tab-log.active::after { background: var(--color-log); }

        .has-unread::before {
            content: ''; position: absolute; top: 8px; right: 8px; width: 10px; height: 10px; background: #ef4444; border-radius: 50%;
            animation: pulse 1.5s infinite; z-index: 10;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        main { max-width: 950px; margin: 0 auto 100px; padding: 0 20px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Empty State & Tasks */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state p { font-size: 1.05rem; margin-top: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .task-card { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); }
        .task-card.completed { border-color: var(--color-tasks); background: #f4f9f5; }
        .task-card.locked { opacity: 0.6; cursor: not-allowed; border-style: dashed; }
        .task-num { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; display: block; color: #1e293b; }
        .task-date { font-size: 0.8rem; color: var(--text-muted); }

        /* Editor */
        .editor { background: var(--paper); padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        .field-group { margin-bottom: 28px; }
        .field-label { display: block; font-family: var(--font-serif); font-size: 1.1rem; font-weight: 600; color: var(--color-tasks); margin-bottom: 12px; }
        .textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 20px; font-family: var(--font-serif); font-size: 1.1rem; line-height: 1.8; resize: vertical; outline: none; }
        .textarea:focus { border-color: var(--color-tasks); box-shadow: 0 0 0 3px rgba(107, 142, 115, 0.1); }
        .flex-row { display: flex; gap: 20px; } .flex-row > div { flex: 1; }
        
        /* 針對只能手寫的輸入框特別樣式 */
        .handwrite-only { cursor: pointer; background-color: #fcfbf9; transition: background 0.3s;}
        .handwrite-only:hover { background-color: #f5f3ec; border-color: #b4a08c;}
        .handwrite-only:focus { border-color: #b4a08c; box-shadow: 0 0 0 3px rgba(180, 160, 140, 0.2); }
        .handwrite-placeholder { font-size: 0.9rem; color: #9c8a75; display: block; margin-top: 8px; }

        /* Upload */
        .upload-container { background: #fafaf9; padding: 24px; border-radius: 12px; border: 1px dashed #cbd5e1; display: flex; flex-direction: column; gap: 12px; }
        .upload-btn { background: white; border: 1px solid #cbd5e1; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; color: #475569; display: inline-flex; align-items: center; gap: 8px; width: max-content; transition: 0.2s; }
        .upload-btn:hover { background: #f1f5f9; border-color: var(--color-tasks); }
        .privacy-warning { font-size: 0.85rem; color: #ef4444; display: flex; align-items: flex-start; gap: 6px; line-height: 1.4; margin-top: 5px; }
        .file-name-display { font-size: 0.95rem; color: var(--color-tasks); font-weight: 500; }
        .img-preview { display: none; max-width: 100%; height: auto; max-height: 250px; border-radius: 8px; margin-top: 10px; border: 1px solid #e2e8f0; object-fit: contain; object-position: left; }

        /* Lists */
        .list-container { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .list-item { display: flex; align-items: center; padding: 22px 28px; border-bottom: 1px solid var(--border); cursor: pointer; position: relative; }
        .list-item:hover { background: #f8fafc; }
        .badge { font-size: 0.75rem; padding: 6px 12px; border-radius: 20px; margin-right: 18px; font-weight: 600; white-space: nowrap; }
        .badge.unread { background: #fee2e2; color: #ef4444; } .badge.replied { background: #f1f5f9; color: #64748b; } .badge.wait { background: #fef3c7; color: #f59e0b; }
        .item-title { flex-grow: 1; font-size: 1.05rem; font-family: var(--font-serif); }
        .item-time { color: var(--text-muted); font-size: 0.9rem; margin-right: 15px;}
        
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .page-btn { background: var(--paper); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: var(--font-sans); font-size: 0.95rem; font-weight: 500; transition: all 0.2s; }
        .page-btn:hover { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; } .page-btn.active { background: #1e293b; color: #fff; border-color: #1e293b; }
        .delete-btn { background: none; border: none; cursor: pointer; padding: 8px; color: #cbd5e1; border-radius: 50%; transition: all 0.2s; margin-left: 5px; font-size: 0.9rem;}
        .delete-btn:hover { color: #ef4444; transform: scale(1.1); } .delete-btn.locked-btn { opacity: 0.5; cursor: not-allowed; }

        /* Reading Log */
        .log-header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .toggle-add-btn { background: var(--paper); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--color-log); transition: all 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .toggle-add-btn:hover { background: var(--color-log); color: white; transform: rotate(90deg); }
        
        .log-card { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; position: relative; }
        .log-card h4 { font-family: var(--font-serif); font-size: 1.2rem; color: #1e293b; margin-bottom: 8px; padding-right: 40px;}
        .log-card p { color: #475569; font-size: 1rem; line-height: 1.6; white-space: pre-wrap; }
        .log-card .date { font-size: 0.8rem; color: #94a3b8; margin-top: 12px; } .log-card .delete-btn { position: absolute; top: 16px; right: 16px; }

        /* MODAL UI & THE LETTER AESTHETIC */
        #modal { 
            position: fixed; inset: 0; background: rgba(20, 18, 16, 0.88); z-index: 2000; 
            display: none; justify-content: center; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(8px); 
        }
        
        .letter-desk { width: 100%; max-width: 720px; margin: auto; display: flex; flex-direction: column; gap: 40px; position: relative; }
        
        .modal-close-btn { 
            position: fixed; top: 30px; right: 40px; background: transparent; border: none; 
            font-size: 2.5rem; font-weight: 200; color: #e6dfd1; cursor: pointer; transition: 0.3s; z-index: 2100;
        }
        .modal-close-btn:hover { transform: scale(1.1); color: #fff; }

        .letter-sheet {
            background-color: var(--letter-paper);
            background-image: linear-gradient(to right, transparent 49.8%, rgba(0,0,0,0.02) 50%, transparent 50.2%);
            box-shadow: 0 30px 60px rgba(0,0,0,0.35), inset 0 0 50px rgba(180, 160, 130, 0.05);
            padding: 60px 8% 80px 8%; position: relative; transform-origin: top center;
            animation: unfold 0.6s cubic-bezier(0.2, 0, 0.2, 1) forwards;
            opacity: 0; transform: translateY(20px); border-radius: 4px; transition: border 0.3s, background-color 0.3s;
        }
        @keyframes unfold { to { opacity: 1; transform: translateY(0); } }

        .letter-sheet.my-letter { background-color: #faf6eb; border-left: 4px solid var(--color-replies); }
        .letter-sheet.partner-letter { background-color: #fcfbfa; border-left: 4px solid var(--color-inbox); }

        .letter-header-meta {
            display: flex; justify-content: space-between; font-family: var(--font-serif); font-size: 0.9rem; color: #a48c76; 
            letter-spacing: 1px; margin-bottom: 40px; position: relative; z-index: 2; border-bottom: 1px dashed rgba(160, 140, 120, 0.3); padding-bottom: 15px;
        }

        .letter-text {
            position: relative; z-index: 2; font-family: var(--font-serif); font-size: 1.12rem; color: var(--letter-ink); 
            line-height: 40px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, var(--letter-line) 39px, var(--letter-line) 40px);
            background-position: top 0 left 0; letter-spacing: 1.5px; white-space: pre-wrap; text-align: justify;
            word-break: break-word; overflow-wrap: break-word; 
        }

        #reply-text { 
            min-height: 160px; border: none; padding: 0; font-size: 1.12rem; 
            line-height: 40px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, var(--letter-line) 39px, var(--letter-line) 40px);
            background-position: top 0 left 0; background-color: transparent;
            background-attachment: local; margin-bottom: 25px; 
        }

        .letter-img-wrap { 
            display: block; width: fit-content; margin: 40px auto; text-align: center; position: relative; z-index: 2; 
            transform: rotate(-2deg); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .letter-img-wrap:hover { transform: rotate(0deg) scale(1.02); }
        .letter-img { 
            max-width: 90%; max-height: 380px; object-fit: cover; background-color: #fff;
            padding: 12px 12px 40px 12px; border: 1px solid #e6e1d6;
            box-shadow: 0 8px 25px rgba(140, 120, 100, 0.15), inset 0 0 4px rgba(0,0,0,0.05); 
            border-radius: 4px; filter: sepia(15%) contrast(90%) brightness(98%); transition: filter 0.4s; 
        }
        .letter-img:hover { filter: none; }
        .reply-sheet { padding: 50px 8%; margin-top: 20px; }

        /* ====================================================
           🖋️ 全螢幕手寫板 (Full-Screen Handwriting Overlay)
           ==================================================== */
        #hw-overlay {
            position: fixed; inset: 0; background: rgba(250, 247, 242, 0.98); 
            backdrop-filter: blur(10px); z-index: 100000; /* 極高 z-index，蓋過所有元素 */
            display: none; flex-direction: column; overflow: hidden;
            /* 加入一點信紙紋理的背景 */
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, rgba(160, 140, 120, 0.1) 39px, rgba(160, 140, 120, 0.1) 40px);
        }
        #hw-overlay.active { display: flex; animation: fadeUpIn 0.3s cubic-bezier(0.2, 0, 0.2, 1); }
        @keyframes fadeUpIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 頂部操作列與預覽區 */
        .hw-top-container {
            position: relative; z-index: 10; padding: 20px; background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-bottom: 1px solid #e3dcd1;
        }
        .hw-header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .hw-title { font-family: var(--font-serif); font-size: 1.2rem; color: var(--text); font-weight: 600; }
        .hw-btn-done { background: #1e293b; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-size: 1rem; cursor: pointer; font-family: var(--font-sans); }
        
        /* 手寫內容即時預覽框 */
        #hw-preview {
            width: 100%; min-height: 80px; max-height: 15vh; overflow-y: auto;
            background: transparent; border: none; font-family: var(--font-serif); font-size: 1.15rem; 
            line-height: 1.8; color: var(--letter-ink); outline: none; resize: none;
        }

        /* 選字與標點符號工具列 */
        .hw-toolbar { display: flex; flex-direction: column; z-index: 10; background: rgba(250, 247, 242, 0.95); box-shadow: 0 4px 15px rgba(0,0,0,0.03);}
        .hw-candidates-row {
            display: flex; gap: 5px; padding: 12px 20px; border-bottom: 1px dashed #e3dcd1;
            height: 60px; align-items: center; overflow-x: auto; white-space: nowrap;
        }
        .hw-candidate {
            font-size: 1.6rem; font-family: var(--font-serif); padding: 0 18px; cursor: pointer; color: #2c3e50;
            border-right: 1px dashed #d1c8ba; min-width: 50px; text-align: center;
        }
        .hw-candidate:last-child { border-right: none; }
        .hw-candidate:active { color: var(--color-tasks); background: #f4f0ea; border-radius: 4px; }

        .hw-punctuation-row {
            display: flex; gap: 8px; padding: 10px 20px; overflow-x: auto; white-space: nowrap; align-items: center;
            border-bottom: 1px solid #e3dcd1;
        }
        .hw-btn {
            background: #fff; border: 1px solid #c8bdae; color: #4a4238; font-family: var(--font-serif);
            font-size: 1.1rem; padding: 6px 14px; border-radius: 6px; cursor: pointer; box-shadow: 0 2px 0 #d1c8ba;
            display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .hw-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #d1c8ba; }
        .hw-btn.action { background: #d98a6c; color: white; border-color: #bc6b4c; box-shadow: 0 2px 0 #a35538; font-family: var(--font-sans); font-size: 0.9rem; margin-left: auto;}
        
        /* 畫布區域 */
        .hw-canvas-wrapper { flex: 1; position: relative; width: 100%; height: 100%; cursor: crosshair; }
        #hw-canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; /* 徹底禁止預設滑動行為 */ }
        
        .hw-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(156, 138, 117, 0.5); font-family: var(--font-serif); font-size: 1.5rem;
            pointer-events: none; text-align: center; letter-spacing: 2px; transition: opacity 0.3s;
        }

        /* Envelope Anim */
        #anim-overlay { position: fixed; inset: 0; background: rgba(250, 247, 242, 0.95); z-index: 100005; align-items: center; justify-content: center; perspective: 1200px; display: none;}
        .env-wrapper { position: relative; width: 340px; height: 230px; }
        .env-back { position: absolute; inset: 0; background: #e3d3bd; border-radius: 4px; z-index: 1; }
        .paper-anim { position: absolute; bottom: 0; left: 15px; right: 15px; height: 380px; z-index: 5; transform-style: preserve-3d; }
        .panel-anim { position: absolute; left: 0; right: 0; height: 126px; background: #fffdfa; border: 1px solid #eee; backface-visibility: hidden; }
        .p-top { top: 0; transform-origin: bottom; } .p-mid { top: 126px; } .p-bot { top: 252px; transform-origin: top; }
        .env-front-left { position: absolute; inset: 0; background: #ebdcc5; clip-path: polygon(0 0, 50% 50%, 0 100%); z-index: 11; }
        .env-front-right { position: absolute; inset: 0; background: #e6d7c0; clip-path: polygon(100% 0, 100% 100%, 50% 50%); z-index: 12; }
        .env-front-bottom { position: absolute; inset: 0; background: #dfd0b9; clip-path: polygon(0 100%, 50% 50%, 100% 100%); z-index: 13; }
        .env-flap { position: absolute; top: 0; left: 0; right: 0; height: 140px; background: #d8c8b0; clip-path: polygon(0 0, 100% 0, 50% 100%); transform-origin: top; z-index: 15; }
        .env-seal { position: absolute; top: 110px; left: 50%; transform: translate(-50%, -50%) scale(0); width: 45px; height: 45px; background: #c25953; border-radius: 50%; z-index: 20; }

        @media (max-width: 768px) {
            #auth-overlay { flex-direction: column; justify-content: center; align-items: center; }
            .auth-hero { display: none; }
            .auth-sidebar { width: 90%; max-width: 400px; padding: 40px 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.4); }
            header { flex-direction: column; align-items: flex-start; gap: 15px; margin-top: 20px; }
            .user-info { display: flex; align-items: center; width: 100%; justify-content: space-between; }
            .tabs { padding: 0 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; border-bottom: none; }
            .tab-btn { justify-content: center; font-size: 0.95rem; border: 1px solid var(--border); border-radius: 8px; padding: 12px 5px; }
            .tab-btn.active::after { display: none; }
            .tab-btn.active { background: var(--border); }
            .flex-row { flex-direction: column; gap: 15px; }
            .editor { padding: 25px 20px; }

    <script>
        let scene, camera, renderer, particles; let run3D = true;
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0xfaf7f2, 0.0025);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.z = 40;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.setClearColor(0xfaf7f2, 1);
            container.appendChild(renderer.domElement); scene.add(new THREE.AmbientLight(0xffffff, 0.7)); const dl = new THREE.DirectionalLight(0xfffaeb, 0.6); dl.position.set(20, 40, 20); scene.add(dl);
            const geo = new THREE.PlaneGeometry(1.5, 2.2); const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.9, transparent: true, opacity: 0.85 });
            particles = new THREE.Group(); scene.add(particles);
            for(let i=0; i<120; i++) {
                const m = new THREE.Mesh(geo, mat); m.position.set((Math.random()-0.5)*120, (Math.random()-0.5)*100, (Math.random()-0.5)*60);
                m.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                m.userData = { rotSpeedX:(Math.random()-0.5)*0.015, rotSpeedY:(Math.random()-0.5)*0.015, floatSpeed:Math.random()*0.03+0.01 }; particles.add(m);
            }
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }); animateThreeJS();
        }
        function animateThreeJS() { if(!run3D) return; requestAnimationFrame(animateThreeJS); particles.children.forEach(m => { m.rotation.x+=m.userData.rotSpeedX; m.rotation.y+=m.userData.rotSpeedY; m.position.y+=m.userData.floatSpeed; m.position.x+=Math.sin(m.position.y*0.05)*0.02; if(m.position.y>60) m.position.y=-60; }); renderer.render(scene, camera); }
        initThreeJS();
    </script>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzcangpOrf05ZRhxzoMUN-C9T57CS3_G80to1lLWv4opXuHbYMMMuKXzap7kkcou3BPsQ/exec"; 
        
        const firebaseConfig = {

        const ITEMS_PER_PAGE = 10; let repliesData = []; let inboxData = []; let currentPageReplies = 1; let currentPageInbox = 1;

        // 全螢幕手寫板相關變數

        auth.onAuthStateChanged(user => {

        function saveName() {

        function initApp() {

            setupNotifications(); loadMailbox(); loadReadingLogs();

        function setupNotifications() {
            const threadRef = db.ref(`user_threads/${currentUser.uid}`);
            threadRef.once('value').then(() => { isInitialLoad = false; }).catch(e => console.error(e));
            
            threadRef.on('child_changed', snap => { 
                if (!isInitialLoad && snap.val().hasUnread) {
                    triggerNotification("您收到了一則新的回覆！", snap.val().letterId); 
                }

            threadRef.on('child_added', snap => { 
                if (!isInitialLoad && !snap.val().isSender) {

                }
            });

        function triggerNotification(msg, id) {
            const b = document.getElementById('notification-banner'); 
            document.getElementById('notification-text').innerText = msg; 
            gsap.killTweensOf(b); 
            gsap.fromTo(b, {y:0, opacity:0}, {y:120, opacity:1, duration:0.6, ease:"back.out(1.5)"});
            b.onclick = () => { openChat(id); gsap.to(b, {y:0, opacity:0, duration:0.4}); };

        }

        function loadMailbox() {
            db.ref(`user_threads/${currentUser.uid}`).on('value', snap => {
                let all = Object.values(snap.val() || {}).sort((a, b) => b.lastUpdated - a.lastUpdated);
                repliesData = []; inboxData = []; hasUnrepliedLetters = false;
                let unreadInReplies = false; let unreadInInbox = false;

                all.forEach(t => {
                    if (t.isSender) { 
                        if (t.hasBeenRepliedTo) { 
                            repliesData.push(t); 
                            if(!t.hasReplied) hasUnrepliedLetters = true; 
                            if(t.hasUnread) unreadInReplies = true;
                        } 
                    } else { 
                        inboxData.push(t); 
                        if(!t.hasReplied) hasUnrepliedLetters = true; 
                        if(t.hasUnread) unreadInInbox = true;
                    }
                });

                document.querySelector('.tab-replies').classList.toggle('has-unread', unreadInReplies);
                document.querySelector('.tab-inbox').classList.toggle('has-unread', unreadInInbox);

                if (currentPageReplies > Math.ceil(repliesData.length / ITEMS_PER_PAGE) || 1) currentPageReplies = Math.ceil(repliesData.length / ITEMS_PER_PAGE) || 1;
                if (currentPageInbox > Math.ceil(inboxData.length / ITEMS_PER_PAGE) || 1) currentPageInbox = Math.ceil(inboxData.length / ITEMS_PER_PAGE) || 1;

                renderPaginatedList('replies', repliesData, currentPageReplies);
                renderPaginatedList('inbox', inboxData, currentPageInbox);
            }, err => console.error("Mailbox Error:", err));
        }

        function healPool() {
            db.ref('unassigned_letters').once('value').then(snap => {
                const pool = snap.val() || {}; const ids = Object.keys(pool).filter(id => pool[id].senderUid !== currentUser.uid);
                if (ids.length > 0) {
                    const rId = ids[Math.floor(Math.random() * ids.length)];
                    db.ref(`letters/${rId}`).once('value').then(lSnap => {
                        const lData = lSnap.val(); if(lData) {
                            db.ref(`letters/${rId}/recipientUid`).set(currentUser.uid); db.ref(`unassigned_letters/${rId}`).remove();
                            const now = firebase.database.ServerValue.TIMESTAMP;
                            db.ref(`user_threads/${currentUser.uid}/${rId}`).set({ letterId: rId, bookTitle: lData.bookTitle, isSender: false, hasUnread: true, hasReplied: false, lastUpdated: now });
                            db.ref(`user_threads/${lData.senderUid}/${rId}`).set({ letterId: rId, bookTitle: lData.bookTitle, isSender: true, hasUnread: false, hasBeenRepliedTo: false, hasReplied: false, lastUpdated: now });
                            
                            db.ref(`users/${currentUser.uid}/receivedCount`).transaction(count => (count || 0) + 1);
                        }
                    }).catch(err => console.error("配對讀取異常:", err));
                }
            }).catch(err => console.error("池子讀取異常:", err));
        }

        function renderPaginatedList(type, data, currentPage) {
            const listEl = document.getElementById(`${type}-list`);
            const pageEl = document.getElementById(`${type}-pagination`);
            listEl.innerHTML = ''; pageEl.innerHTML = '';

            if (data.length === 0) { listEl.innerHTML = `<div class="empty-state"><p>信箱空空如也，靜候佳音。</p></div>`; return; }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageData = data.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            pageData.forEach(t => {
                const timeStr = new Date(t.lastUpdated).toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
                const el = document.createElement('div'); el.className = 'list-item';
                const deleteHTML = t.hasReplied ? `<button class="delete-btn" onclick="deleteThread('${t.letterId}', event)">刪除</button>` : `<button class="delete-btn locked-btn" onclick="event.stopPropagation(); alert('請先回覆後才能刪除。');">刪除</button>`;
                let badge = !t.hasReplied ? `<span class="badge wait">待回覆</span>` : (t.hasUnread ? `<span class="badge unread">新回覆</span>` : (type==='replies' ? `<span class="badge replied">已讀</span>` : `<span class="badge replied">已回覆</span>`));
                el.onclick = () => openChat(t.letterId);
                el.innerHTML = `${badge}<div class="item-title">${type==='replies'?'關於':'筆友寄來'}《${escapeHtml(t.bookTitle)}》的${type==='replies'?'回音':'心得'}</div><div class="item-time">${timeStr}</div>${deleteHTML}`;
                listEl.appendChild(el);
            });

            const totalPages = Math.ceil(data.length / ITEMS_PER_PAGE);
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.className = `page-btn ${i === currentPage ? 'active' : ''}`; btn.innerText = i;
                    btn.onclick = () => { if (type === 'replies') currentPageReplies = i; else currentPageInbox = i; renderPaginatedList(type, type === 'replies' ? repliesData : inboxData, i); };
                    pageEl.appendChild(btn);
                }
            }
        }

            reader.readAsDataURL(file);
        }

            const title = document.getElementById('book-title').value.trim(); const page = document.getElementById('book-page').value.trim();
            const question = document.getElementById('log-question').value.trim(); const text = document.getElementById('log-content').value.trim();
            
            if (!title || !page || !question || !text) return alert("請填寫完整資訊 (書名、頁數、思考問題與心得)。");
            if (!selectedFileBase64) return alert("請務必上傳書籍畫面圖片。");
            if (text.length < 150) return alert("心得最少需要 150 字。");
            
            if (isSubmittingLog) return;
            isSubmittingLog = true;
            
            const btn = document.getElementById('btn-submit-task'); btn.innerText = "圖片上傳中，請稍候..."; btn.disabled = true;

            try {
                const response = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ fileName: selectedFileName, mimeType: 'image/jpeg', base64: selectedFileBase64 }) 
                });
                
                const responseText = await response.text();
                let result; try { result = JSON.parse(responseText); } catch (e) { throw new Error("伺服器未能回傳正確格式。"); }
                if (!result.success) throw new Error(result.error || "上傳未成功");

                const combinedText = `【目前進度】\n第 ${page} 頁\n\n【思考問題】\n${question}\n\n【閱讀心得】\n${text}`;
                playAnim('log', null, null, {title: title, text: combinedText, imageUrl: result.url});
            } catch (error) {
                alert("圖片上傳發生異常。\n詳細錯誤：" + error.message);
                isSubmittingLog = false;
                btn.innerText = "封裝寄出心得"; btn.disabled = false;
            }
        }

        function renderTasks() {
            const grid = document.getElementById('task-grid'); grid.innerHTML = ''; if (!config) return;
            const start = new Date(config.startDate); const total = Math.floor(((new Date(config.endDate) - start) / 86400000) / config.intervalDays);
            db.ref('letters').orderByChild('senderUid').equalTo(currentUser.uid).once('value').then(snap => {
                const submitted = Object.values(snap.val()||{}).map(l=>l.taskIndex); const map = {}; Object.values(snap.val()||{}).forEach(l=>map[l.taskIndex]=l.id);
                for (let i=0; i<total; i++) {
                    const d = new Date(start.getTime() + i*config.intervalDays*86400000); 
                    const today = new Date(); today.setHours(0, 0, 0, 0);
                    const unlockDate = new Date(d); unlockDate.setHours(0, 0, 0, 0);
                    const unlocked = today >= unlockDate; 

                    const done = submitted.includes(i);
                    const el = document.createElement('div'); el.className = `task-card ${done?'completed':''} ${!unlocked&&!done?'locked':''}`;
                    el.innerHTML = `<span class="task-num">第 ${i+1} 回任務</span><span class="task-date">${d.getMonth()+1}/${d.getDate()} 開放</span>`;
                    el.onclick = () => {
                        if (done) openChat(map[i]);
                        else if (unlocked) {
                            if (hasUnrepliedLetters) return alert("您有尚未回覆的信件，必須先完成回應後方可開啟新任務。");
                            selectedTaskIndex = i; document.getElementById('task-title').innerText = `撰寫任務：第 ${i+1} 回心得`;
                            document.getElementById('write-editor').style.display = 'block'; document.getElementById('write-editor').scrollIntoView({behavior:'smooth'});
                            document.getElementById('btn-submit-task').innerText = "封裝寄出心得"; document.getElementById('btn-submit-task').disabled = false;
                            document.getElementById('file-name-display').innerText = "尚未選擇圖片"; document.getElementById('image-preview').style.display = 'none';
                            selectedFileBase64 = null; document.getElementById('book-image').value = '';
                        } else alert("時空未到，尚未開放。");
                    }; grid.appendChild(el);
                }
            }).catch(err => console.error("讀取任務狀態異常:", err));
        }

        function openChat(id) {
            db.ref(`user_threads/${currentUser.uid}/${id}`).update({hasUnread: false});
            db.ref(`letters/${id}`).once('value').then(lSnap => {
                const l = lSnap.val(); if (!l) return;
                
                const flow = document.getElementById('chat-flow'); 
                const partnerUid = currentUser.uid === l.senderUid ? l.recipientUid : l.senderUid;
                
                if (currentChatRef) currentChatRef.off(); 
                currentChatRef = db.ref(`conversations/${id}`);
                
                currentChatRef.once('value').then(cSnap => {
                    const messages = cSnap.val() || {};
                    const msgKeys = Object.keys(messages);
                    let contentHTML = '';
                    
                    msgKeys.forEach((key, index) => {
                        const m = messages[key];
                        const isMe = m.senderUid === currentUser.uid; 
                        const d = new Date(m.timestamp);
                        const tStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                        
                        let formattedText = escapeHtml(m.text);
                        formattedText = formattedText.replace(/【目前進度】/g, '<span class="letter-section-divider">目前閱讀頁數</span>');
                        formattedText = formattedText.replace(/【思考問題】/g, '<span class="letter-section-divider">思考問題</span>');
                        formattedText = formattedText.replace(/【閱讀心得】/g, '<span class="letter-section-divider">閱讀感悟</span>');

                        let imgTag = m.imageUrl ? `<a href="${m.imageUrl}" target="_blank" class="letter-img-wrap" title="點擊檢視相片"><img src="${m.imageUrl}" class="letter-img" alt="隨信相片" referrerpolicy="no-referrer" loading="lazy"></a>` : '';
                        const letterClass = isMe ? 'my-letter' : 'partner-letter';
                        const letterHeaderLabel = isMe ? '✍️ 我的手札' : '📬 筆友的來信';

                        contentHTML += `
                        <div class="letter-sheet ${letterClass}" style="animation-delay: ${index * 0.15}s;">
                            <div class="letter-header-meta"><span>${letterHeaderLabel}</span><span>${tStr}</span></div>
                            <div class="letter-text">${formattedText}</div>
                            ${imgTag}
                        </div>`;
                    });

                    // 綁定手寫專用的 Reply Textarea
                    contentHTML += `
                    <div class="letter-sheet reply-sheet my-letter" style="animation-delay: ${msgKeys.length * 0.15}s;">
                        <div class="letter-header-meta"><span>✍️ 提筆回信</span><span>紙短情長</span></div>
                        <textarea id="reply-text" class="textarea handwrite-only" readonly placeholder="點此喚出全螢幕書寫板，一筆一劃寫下您的回音...（最少 100 字）"></textarea>
                        <div style="text-align: center;"><button class="btn" style="margin: 20px auto 0; padding: 12px 40px; background: var(--color-replies);" id="btn-send-reply">寄出回信</button></div>
                    </div>`;

                    flow.innerHTML = contentHTML;

                    // 綁定手寫喚醒事件
                    document.getElementById('reply-text').addEventListener('click', function() { openHwKeyboard(this); });

                    document.getElementById('btn-send-reply').onclick = () => {
                        const txt = document.getElementById('reply-text').value.trim();
                        if (!txt || txt.length < 100) return alert("回覆最少需要 100 字。");
                        if (isSubmittingReply) return;
                        isSubmittingReply = true;
                        
                        const sendBtn = document.getElementById('btn-send-reply');
                        sendBtn.disabled = true; sendBtn.innerText = "寄送中...";
                        playAnim('reply', id, partnerUid, txt);
                    };

                    document.getElementById('modal').style.display = 'flex'; 
                    lockScroll();
                });
            }).catch(err => { alert("讀取信件失敗: " + err.message); unlockScroll(); });
        }
        
        function lockScroll() { 
            if(document.body.style.overflow !== 'hidden') {
                originalBodyOverflow = document.body.style.overflow; 
                document.body.style.overflow = 'hidden'; 
            }
        }
        function unlockScroll() { 
            // 如果 modal 和 hw-overlay 都不在顯示狀態，才解鎖滾動
            const modalOpen = document.getElementById('modal').style.display === 'flex';
            const hwOpen = document.getElementById('hw-overlay').classList.contains('active');
            if(!modalOpen && !hwOpen) document.body.style.overflow = originalBodyOverflow; 
        }

        function closeModal() { 
            if (currentChatRef) currentChatRef.off(); 
            document.getElementById('modal').style.display = 'none'; 
            closeHwKeyboard();
            unlockScroll();
        }

        function playAnim(type, letterId, partnerUid, ObjectData) {
            const overlay = document.getElementById('anim-overlay'); overlay.style.display = 'flex';
            gsap.set(".env-wrapper", {y: 0, scale: 1, opacity: 1}); gsap.set("#anim-paper", {y: -120, zIndex: 5}); gsap.set("#anim-ptop", {rotateX: 0}); gsap.set("#anim-pbot", {rotateX: 0}); gsap.set("#anim-flap", {rotateX: 180, zIndex: 4}); gsap.set("#anim-seal", {scale: 0});
            gsap.timeline().to("#anim-pbot", {rotateX: 179, duration: 0.4}).to("#anim-ptop", {rotateX: -179, duration: 0.4}, "-=0.2").to("#anim-paper", {y: 70, duration: 0.5}).set("#anim-flap", {zIndex: 15}).to("#anim-flap", {rotateX: 0, duration: 0.4}).to("#anim-seal", {scale: 1, duration: 0.3, ease: "back.out(1.5)"}).to(".env-wrapper", {y: -400, scale: 0.6, opacity: 0, duration: 0.6, delay: 0.4, onComplete: () => {
                  overlay.style.display = 'none';
                  if (type === 'log') processLog(ObjectData); else processReply(letterId, partnerUid, ObjectData);
            }});
        }

        function processLog(data) {
            const ts = firebase.database.ServerValue.TIMESTAMP; const ref = db.ref('letters').push();
            
            db.ref('users').once('value').then(snap => {
                const users = snap.val() || {};
                let eligibleUids = Object.keys(users).filter(u => u !== currentUser.uid);
                let rec = "";

                if (eligibleUids.length > 0) {
                    let minCount = Infinity;
                    eligibleUids.forEach(uid => {
                        let count = users[uid].receivedCount || 0;
                        if (count < minCount) minCount = count;
                    });
                    
                    let candidates = eligibleUids.filter(uid => (users[uid].receivedCount || 0) === minCount);
                    rec = candidates[Math.floor(Math.random() * candidates.length)];
                    
                    db.ref(`users/${rec}/receivedCount`).set(minCount + 1);
                }

                ref.set({ id: ref.key, senderUid: currentUser.uid, bookTitle: data.title, timestamp: ts, taskIndex: selectedTaskIndex, recipientUid: rec }).then(() => {
                    db.ref(`user_threads/${currentUser.uid}/${ref.key}`).set({ letterId: ref.key, bookTitle: data.title, isSender: true, hasUnread: false, hasBeenRepliedTo: false, hasReplied: false, lastUpdated: ts });
                    if (rec) db.ref(`user_threads/${rec}/${ref.key}`).set({ letterId: ref.key, bookTitle: data.title, isSender: false, hasUnread: true, hasReplied: false, lastUpdated: ts });
                    else db.ref(`unassigned_letters/${ref.key}`).set({ senderUid: currentUser.uid });
                    
                    db.ref(`conversations/${ref.key}`).push({ senderUid: currentUser.uid, text: data.text, imageUrl: data.imageUrl, timestamp: ts }).then(() => {
                        isSubmittingLog = false;
                        document.getElementById('book-title').value = ''; document.getElementById('book-page').value = ''; document.getElementById('log-question').value = ''; document.getElementById('log-content').value = ''; 
                        document.getElementById('book-image').value=''; selectedFileBase64=null; document.getElementById('file-name-display').innerText="尚未選擇圖片"; document.getElementById('image-preview').style.display = 'none';
                        document.getElementById('write-editor').style.display = 'none'; 
                        renderTasks(); alert('心得已寄出！'); switchTab('tab-tasks', document.querySelector('.tab-tasks'));
                    });
                }).catch(err => {
                    isSubmittingLog = false; const btn = document.getElementById('btn-submit-task'); if (btn) { btn.disabled = false; btn.innerText = "封裝寄出心得"; } alert("發送失敗：" + err.message);
                });
            }).catch(err => {
                isSubmittingLog = false; const btn = document.getElementById('btn-submit-task'); if (btn) { btn.disabled = false; btn.innerText = "封裝寄出心得"; } alert("配對異常：" + err.message);
            });
        }
        
        function processReply(id, pUid, text) {
            const ts = firebase.database.ServerValue.TIMESTAMP;
            db.ref(`conversations/${id}`).push({ senderUid: currentUser.uid, text, timestamp: ts }).then(() => {
                if (pUid) db.ref(`user_threads/${pUid}/${id}`).update({ hasUnread: true, lastUpdated: ts, hasBeenRepliedTo: true });
                db.ref(`user_threads/${currentUser.uid}/${id}`).update({ hasUnread: false, hasReplied: true, lastUpdated: ts }).then(() => {
                    isSubmittingReply = false; closeModal();
                });
            }).catch(err => {
                isSubmittingReply = false; const sendBtn = document.getElementById('btn-send-reply'); if (sendBtn) { sendBtn.disabled = false; sendBtn.innerText = "寄出回信"; } alert("回信失敗，請重試：" + err.message);
            });
        }

        function toggleReadingLog() {
            const editor = document.getElementById('mylog-editor');
            if (editor.style.display === 'none') {
                editor.style.display = 'block'; gsap.fromTo(editor, {height: 0, opacity: 0}, {height: 'auto', opacity: 1, duration: 0.4});
            } else gsap.to(editor, {opacity: 0, duration: 0.3, onComplete: () => editor.style.display = 'none'});
        }

        function submitReadingLog() {
            const title = document.getElementById('mylog-title').value.trim(); const notes = document.getElementById('mylog-notes').value.trim();
            if(!title) return alert("請輸入書籍名稱。");
            const btn = document.getElementById('btn-save-log'); btn.disabled = true; btn.innerText = "保存中...";
            db.ref(`reading_logs/${currentUser.uid}`).push({ bookTitle: title, notes: notes, timestamp: firebase.database.ServerValue.TIMESTAMP }).then(() => {
                document.getElementById('mylog-title').value = ''; document.getElementById('mylog-notes').value = ''; alert("已成功保存紀錄！"); toggleReadingLog();
                btn.disabled = false; btn.innerText = "保存紀錄";
            }).catch(err => { alert("保存失敗：" + err.message); btn.disabled = false; btn.innerText = "保存紀錄"; });
        }

        function loadReadingLogs() {
            db.ref(`reading_logs/${currentUser.uid}`).on('value', snap => {
                const list = document.getElementById('mylog-list'); list.innerHTML = '';
                const logsArray = Object.keys(snap.val() || {}).map(k => ({id: k, ...snap.val()[k]})).sort((a,b) => b.timestamp - a.timestamp);
                if(logsArray.length === 0) { list.innerHTML = `<div class="empty-state"><p>閱讀紀錄空空如也，點擊上方按鈕添加第一本書吧！</p></div>`; return; }
                logsArray.forEach(log => {
                    const d = new Date(log.timestamp); const el = document.createElement('div'); el.className = 'log-card';
                    el.innerHTML = `<h4>《${escapeHtml(log.bookTitle)}》</h4>${log.notes ? `<p>${escapeHtml(log.notes)}</p>` : ''}<div class="date">建立於 ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}</div><button class="delete-btn" onclick="deleteReadingLog('${log.id}')">刪除</button>`;
                    list.appendChild(el);
                });
            });
        }
        window.deleteReadingLog = function(id) { if(confirm("確定要將這本書從紀錄中移除嗎？")) db.ref(`reading_logs/${currentUser.uid}/${id}`).remove().catch(e=>alert("刪除失敗")); };
        function switchTab(id, btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); btn.classList.add('active'); document.getElementById(id).classList.add('active'); }
        function escapeHtml(s) { return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):s; }

        /* ====================================================
           🖋️ 全螢幕手寫核心邏輯 (Immersive Handwriting)
           ==================================================== */
        
        document.addEventListener("DOMContentLoaded", () => {
            const q = document.getElementById('log-question');
            const c = document.getElementById('log-content');
            if(q) q.addEventListener('click', function() { openHwKeyboard(this); });
            if(c) c.addEventListener('click', function() { openHwKeyboard(this); });
            
            // 防禦實體鍵盤
            document.querySelectorAll('.handwrite-only').forEach(el => {
                el.addEventListener('keydown', e => { if(e.key !== 'Backspace') e.preventDefault(); });
                el.addEventListener('paste', e => e.preventDefault());
            });
        });

        function initHandwriting() {
            hwCanvas = document.getElementById('hw-canvas');
            hwCtx = hwCanvas.getContext('2d');
            
            function resizeCanvas() {
                const rect = hwCanvas.parentElement.getBoundingClientRect();
                hwCanvas.width = rect.width; hwCanvas.height = rect.height;
                hwCtx.lineCap = "round"; hwCtx.lineJoin = "round";
            }
            window.addEventListener('resize', () => {
                if(document.getElementById('hw-overlay').classList.contains('active')) resizeCanvas();
            });
            // 初始綁定
            setTimeout(resizeCanvas, 500);

            hwCanvas.addEventListener('pointerdown', startStroke);
            hwCanvas.addEventListener('pointermove', drawStroke);
            hwCanvas.addEventListener('pointerup', endStroke);
            hwCanvas.addEventListener('pointercancel', endStroke);
        }

        function getPointerPos(e) {
            const rect = hwCanvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function startStroke(e) {
            e.preventDefault(); isDrawing = true;
            document.getElementById('hw-hint').style.opacity = '0'; // 隱藏提示字
            const pos = getPointerPos(e);
            currentStroke = [[pos.x], [pos.y], [Date.now()]];
            hwCtx.beginPath(); hwCtx.moveTo(pos.x, pos.y);
            hwCtx.lineWidth = 5; hwCtx.strokeStyle = "rgba(74, 66, 56, 0.85)";
            clearTimeout(hwTimeout);
        }

        function drawStroke(e) {
            if (!isDrawing) return; e.preventDefault();
            const pos = getPointerPos(e);
            currentStroke[0].push(pos.x); currentStroke[1].push(pos.y); currentStroke[2].push(Date.now());
            hwCtx.lineTo(pos.x, pos.y); hwCtx.stroke();
        }

        function endStroke(e) {
            if (!isDrawing) return; isDrawing = false; e.preventDefault();
            if (currentStroke[0].length > 0) strokes.push(currentStroke);
            
            // 延長等待時間，允許連續寫複雜中文字 (800毫秒)
            hwTimeout = setTimeout(recognizeHandwriting, 800); 
        }

        function recognizeHandwriting() {
            if (strokes.length === 0) return;
            const data = {
                "options": "enable_pre_space",
                "requests": [{
                    "writing_guide": { "width": hwCanvas.width, "height": hwCanvas.height },
                    "ink": strokes, "language": "zh-TW"
                }]
            };

            fetch("https://inputtools.google.com/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8", {
                method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if (res[0] === "SUCCESS" && res[1][0]) {
                    const results = res[1][0][1];
                    renderHwCandidates(results);
                }
            }).catch(e => console.error("辨識失敗", e));
        }

        function renderHwCandidates(words) {
            const container = document.getElementById('hw-candidates');
            container.innerHTML = '';
            if (!words || words.length === 0) {
                container.innerHTML = '<div style="color:#ef4444; font-size:0.95rem;">無法辨識，請按清除畫板重寫。</div>';
                return;
            }
            words.forEach(word => {
                const span = document.createElement('div');
                span.className = 'hw-candidate'; span.innerText = word;
                span.onclick = () => { insertChar(word); clearHwCanvas(false); };
                container.appendChild(span);
            });
        }

        function clearHwCanvas(resetHint = false) {
            strokes = []; hwCtx.clearRect(0, 0, hwCanvas.width, hwCanvas.height);
            document.getElementById('hw-candidates').innerHTML = '<div style="color:#9c8a75; font-size:0.95rem;">請在下方畫布書寫文字，辨識結果將顯示於此...</div>';
            if(resetHint) document.getElementById('hw-hint').style.opacity = '1';
        }

        function openHwKeyboard(targetInput) {
            activeHwInput = targetInput;
            const overlay = document.getElementById('hw-overlay');
            const preview = document.getElementById('hw-preview');
            
            overlay.classList.add('active');
            preview.value = activeHwInput.value; // 同步現有文字到預覽區
            preview.scrollTop = preview.scrollHeight;

            lockScroll(); // 鎖定底層網頁
            clearHwCanvas(true);
            
            // 觸發視窗重算畫布大小
            setTimeout(() => {
                const rect = hwCanvas.parentElement.getBoundingClientRect();
                if(hwCanvas.width !== rect.width) { 
                    hwCanvas.width = rect.width; hwCanvas.height = rect.height; 
                    hwCtx.lineCap = "round"; hwCtx.lineJoin = "round";
                }
            }, 100);
        }

        function closeHwKeyboard() { 
            document.getElementById('hw-overlay').classList.remove('active'); 
            clearHwCanvas();
            unlockScroll(); 
        }

        // 插入字元/標點符號 (同時更新底層 Input 與 頂層 Preview)
        function insertChar(char) {
            if (!activeHwInput) return;
            const preview = document.getElementById('hw-preview');
            
            activeHwInput.value += char;
            preview.value += char;
            
            activeHwInput.scrollTop = activeHwInput.scrollHeight; 
            preview.scrollTop = preview.scrollHeight; 
        }

        // 退格刪除鍵
        function hwBackspace() {
            if (!activeHwInput || activeHwInput.value.length === 0) return;
            const preview = document.getElementById('hw-preview');
            
            activeHwInput.value = activeHwInput.value.slice(0, -1);
            preview.value = preview.value.slice(0, -1);
        }
    </script>
</body>
