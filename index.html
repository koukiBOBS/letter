<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閱讀交流</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #f9f7f4;
            --paper: #ffffff;
            --text: #333333;
            --text-muted: #888888;
            --primary: #4a5c50;
            --danger: #b35959;
            --border: #e0dcd5;
            --font: 'Noto Serif TC', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Notifications */
        #notification-banner {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--paper); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 10001; display: flex; align-items: center; gap: 10px; cursor: pointer;
            font-size: 0.9rem; transition: top 0.4s ease;
        }
        #notification-banner.show { top: 20px; }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .panel {
            background: var(--paper); border: 1px solid var(--border);
            padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            max-width: 400px; width: 100%; text-align: center;
        }
        .panel h1 { font-size: 1.8rem; font-weight: 400; margin-bottom: 20px; }
        .panel p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-box {
            width: 100%; background: transparent; border: 1px solid var(--border);
            padding: 12px; font-family: var(--font); font-size: 1rem; color: var(--text);
            border-radius: 4px; outline: none;
        }
        .input-box:focus { border-color: var(--primary); }

        .btn {
            background: var(--text); color: var(--paper); border: none;
            padding: 12px 24px; font-size: 1rem; border-radius: 4px;
            cursor: pointer; transition: background 0.3s; width: 100%;
        }
        .btn:hover { background: var(--primary); }

        /* Header & Nav */
        header {
            max-width: 900px; margin: 40px auto 20px; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h2 { font-size: 1.5rem; font-weight: 600; }
        .user-info { font-size: 0.85rem; color: var(--text-muted); }
        .user-info a { color: var(--danger); cursor: pointer; margin-left: 10px; text-decoration: none; }

        .tabs {
            max-width: 900px; margin: 0 auto 30px; padding: 0 20px;
            display: flex; border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            background: none; border: none; font-family: var(--font);
            font-size: 1rem; cursor: pointer; color: var(--text-muted);
            padding: 12px 24px; transition: color 0.3s; position: relative;
        }
        .tab-btn.active { color: var(--text); font-weight: 600; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
            height: 2px; background: var(--text);
        }

        main { max-width: 900px; margin: 0 auto 100px; padding: 0 20px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Task List */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .task-card {
            border: 1px solid var(--border); background: var(--paper); border-radius: 6px;
            padding: 20px 10px; text-align: center; cursor: pointer; transition: transform 0.2s;
        }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .task-card.completed { border-color: var(--primary); background: #f0f5f1; }
        .task-card.locked { opacity: 0.5; cursor: not-allowed; }
        .task-num { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; display: block; }
        .task-date { font-size: 0.75rem; color: var(--text-muted); }

        /* Editor */
        .editor { background: var(--paper); padding: 30px; border-radius: 6px; border: 1px solid var(--border); }
        .editor h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .textarea {
            width: 100%; border: 1px solid var(--border); border-radius: 4px;
            padding: 15px; font-family: var(--font); font-size: 1rem; color: var(--text);
            min-height: 200px; resize: vertical; margin-bottom: 20px; outline: none;
        }
        .textarea:focus { border-color: var(--primary); }

        /* Mailbox */
        .list-container { background: var(--paper); border: 1px solid var(--border); border-radius: 6px; }
        .list-item {
            display: flex; align-items: center; padding: 15px 20px;
            border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s;
        }
        .list-item:hover { background: #faf9f7; }
        .list-item:last-child { border-bottom: none; }
        
        .badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; margin-right: 15px; white-space: nowrap; }
        .badge.unread { background: var(--danger); color: white; }
        .badge.read { background: #eee; color: #666; }
        .badge.replied { background: var(--primary); color: white; }
        .badge.wait { background: #ffaa00; color: white; }

        .item-title { flex-grow: 1; font-size: 0.95rem; }
        .item-time { font-size: 0.8rem; color: var(--text-muted); margin-left: 15px; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state svg { width: 50px; height: 50px; stroke: #ccc; margin-bottom: 15px; }

        /* Modal Chat */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            background: var(--paper); border-radius: 8px; width: 100%; max-width: 600px;
            max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative;
        }
        .modal-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 1.1rem; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
        .chat-flow { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
        .msg { padding: 15px; border-radius: 6px; font-size: 0.95rem; line-height: 1.6; max-width: 85%; }
        .msg-self { background: var(--paper); align-self: flex-end; border: 1px solid var(--border); }
        .msg-other { background: #eef1ef; align-self: flex-start; }
        .msg-info { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; }
        .reply-area { padding: 20px; border-top: 1px solid var(--border); background: var(--paper); }

        /* Animation Overlay (Envelope Sequence) */
        #anim-overlay {
            display: none; position: fixed; inset: 0; background: rgba(249, 247, 244, 0.95);
            z-index: 9999; align-items: center; justify-content: center; perspective: 1000px;
        }
        .env-wrapper { position: relative; width: 320px; height: 220px; }
        .env-back { position: absolute; inset: 0; background: #e3d3bd; border-radius: 4px; z-index: 1; }
        .paper-anim {
            position: absolute; bottom: 0; left: 10px; right: 10px; height: 360px;
            z-index: 5; transform-style: preserve-3d;
        }
        .panel-anim { position: absolute; left: 0; right: 0; height: 120px; background: #fffdfa; border: 1px solid #eee; backface-visibility: hidden; }
        .p-top { top: 0; transform-origin: bottom; }
        .p-mid { top: 120px; }
        .p-bot { top: 240px; transform-origin: top; }
        
        .env-front-left { position: absolute; inset: 0; background: #ebdcc5; clip-path: polygon(0 0, 50% 50%, 0 100%); z-index: 11; border-radius: 4px; }
        .env-front-right { position: absolute; inset: 0; background: #e6d7c0; clip-path: polygon(100% 0, 100% 100%, 50% 50%); z-index: 12; border-radius: 4px; }
        .env-front-bottom { position: absolute; inset: 0; background: #dfd0b9; clip-path: polygon(0 100%, 50% 50%, 100% 100%); z-index: 13; border-radius: 4px; }
        
        .env-flap {
            position: absolute; top: 0; left: 0; right: 0; height: 130px; background: #d8c8b0;
            clip-path: polygon(0 0, 100% 0, 50% 100%); transform-origin: top; z-index: 15;
        }
        .env-seal {
            position: absolute; top: 100px; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 40px; height: 40px; background: #a63f3f; border-radius: 50%; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="notification-banner">
        <span>您有新訊息。</span>
    </div>

    <div id="auth-overlay">
        <div id="login-container" class="panel">
            <h1>閱讀交流</h1>
            <p>登入以分享閱讀心得</p>
            <button class="btn" onclick="signIn()">Google 登入</button>
        </div>
        
        <div id="name-setup-container" class="panel" style="display:none;">
            <h1>設定姓名</h1>
            <p>請輸入姓名</p>
            <div class="input-group">
                <input type="text" id="setup-name" class="input-box" placeholder="姓名">
            </div>
            <button class="btn" onclick="saveName()">確認</button>
        </div>
    </div>

    <!-- Animation Mask -->
    <div id="anim-overlay">
        <div class="env-wrapper">
            <div class="env-back"></div>
            <div class="paper-anim" id="anim-paper">
                <div class="panel-anim p-top" id="anim-ptop"></div>
                <div class="panel-anim p-mid"></div>
                <div class="panel-anim p-bot" id="anim-pbot"></div>
            </div>
            <div class="env-front-left"></div>
            <div class="env-front-right"></div>
            <div class="env-front-bottom"></div>
            <div class="env-flap" id="anim-flap"></div>
            <div class="env-seal" id="anim-seal"></div>
        </div>
    </div>

    <header>
        <h2>閱讀交流</h2>
        <div class="user-info">
            <span id="user-name">載入中...</span>
            <a onclick="signOut()">[登出]</a>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-replies', this)">別人對我的回覆</button>
        <button class="tab-btn" onclick="switchTab('tab-inbox', this)">別人寄來的心得</button>
        <button class="tab-btn" onclick="switchTab('tab-tasks', this)">我的任務</button>
    </nav>

    <main>
        <!-- Tab 1: Others replying to my logs -->
        <section id="tab-replies" class="section active">
            <div class="list-container" id="replies-list"></div>
        </section>

        <!-- Tab 2: Logs from others assigned to me -->
        <section id="tab-inbox" class="section">
            <div class="list-container" id="inbox-list"></div>
        </section>

        <!-- Tab 3: Write new logs -->
        <section id="tab-tasks" class="section">
            <div class="grid" id="task-grid"></div>

            <div class="editor" id="write-editor" style="display: none;">
                <h3 id="task-title">任務</h3>
                <input type="text" id="book-title" class="input-box" style="margin-bottom:15px;" placeholder="書名">
                <textarea id="log-content" class="textarea" placeholder="請輸入心得（最少 150 字）"></textarea>
                <div style="text-align: right;">
                    <button class="btn" style="width: auto;" onclick="submitLog()">發送心得</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal for Reading & Replying -->
    <div id="modal">
        <div class="modal-box" id="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">討論內容</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="chat-flow" id="chat-flow"></div>
            <div class="reply-area">
                <textarea id="reply-text" class="textarea" style="min-height:100px; margin-bottom:10px;" placeholder="請輸入回覆（最少 100 字）"></textarea>
                <div style="text-align: right;">
                    <button class="btn" style="width: auto;" id="btn-send-reply">發送回覆</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCkGPRej1rMWVfm7Et6zJlrj3Bnm5-IVms",
            authDomain: "letter-a74d1.firebaseapp.com",
            databaseURL: "https://letter-a74d1-default-rtdb.firebaseio.com",
            projectId: "letter-a74d1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let config = null;
        let selectedTaskIndex = null;
        let hasUnrepliedLetters = false;
        let currentChatRef = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                db.ref(`users/${user.uid}`).once('value', snap => {
                    if (snap.val() && snap.val().name) {
                        document.getElementById('user-name').innerText = snap.val().name;
                        document.getElementById('auth-overlay').style.display = 'none';
                        initApp();
                    } else {
                        document.getElementById('login-container').style.display = 'none';
                        document.getElementById('name-setup-container').style.display = 'block';
                    }
                });
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('login-container').style.display = 'block';
                document.getElementById('name-setup-container').style.display = 'none';
            }
        });

        function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function signOut() { auth.signOut().then(() => window.location.reload()); }
        
        function saveName() {
            const name = document.getElementById('setup-name').value.trim();
            if (!name) return alert("請輸入姓名");
            db.ref(`users/${currentUser.uid}`).set({ name, email: currentUser.email }).then(() => {
                document.getElementById('user-name').innerText = name;
                document.getElementById('auth-overlay').style.display = 'none';
                initApp();
            });
        }

        function initApp() {
            healPool();
            db.ref('settings/taskConfig').on('value', snap => { config = snap.val(); renderTasks(); });
            loadMailbox();
        }

        function healPool() {
            db.ref('unassigned_letters').once('value', snap => {
                const pool = snap.val() || {};
                const ids = Object.keys(pool).filter(id => pool[id].senderUid !== currentUser.uid);
                if (ids.length > 0) {
                    const rId = ids[Math.floor(Math.random() * ids.length)];
                    db.ref(`letters/${rId}`).once('value', lSnap => {
                        const lData = lSnap.val();
                        if (lData) {
                            db.ref(`letters/${rId}/recipientUid`).set(currentUser.uid);
                            db.ref(`unassigned_letters/${rId}`).remove();
                            const now = firebase.database.ServerValue.TIMESTAMP;
                            db.ref(`user_threads/${currentUser.uid}/${rId}`).set({ letterId: rId, bookTitle: lData.bookTitle, isSender: false, hasUnread: true, hasReplied: false, lastUpdated: now });
                            db.ref(`user_threads/${lData.senderUid}/${rId}`).set({ letterId: rId, bookTitle: lData.bookTitle, isSender: true, hasUnread: true, lastUpdated: now });
                        }
                    });
                }
            });
        }

        function loadMailbox() {
            db.ref(`user_threads/${currentUser.uid}`).on('value', snap => {
                const threads = snap.val() || {};
                const repliesList = document.getElementById('replies-list');
                const inboxList = document.getElementById('inbox-list');
                
                repliesList.innerHTML = ''; inboxList.innerHTML = '';
                let pendingReplies = false;

                const emptyUI = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7.00005L10.2 11.65C11.2667 12.45 12.7333 12.45 13.8 11.65L20 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><p>目前沒有信件</p></div>`;

                let repliesCount = 0; let inboxCount = 0;

                Object.values(threads).sort((a,b)=>b.lastUpdated - a.lastUpdated).forEach(t => {
                    const timeStr = new Date(t.lastUpdated).toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    const el = document.createElement('div');
                    el.className = 'list-item';
                    
                    if (t.isSender) {
                        repliesCount++;
                        const badge = t.hasUnread ? `<span class="badge unread">新回覆</span>` : `<span class="badge read">已讀</span>`;
                        el.innerHTML = `${badge}<div class="item-title">《${escapeHtml(t.bookTitle)}》的討論</div><div class="item-time">${timeStr}</div>`;
                        el.onclick = () => openChat(t.letterId);
                        repliesList.appendChild(el);
                    } else {
                        inboxCount++;
                        let badge = '';
                        if (!t.hasReplied) { badge = `<span class="badge wait">待回覆</span>`; pendingReplies = true; }
                        else if (t.hasUnread) { badge = `<span class="badge unread">新回覆</span>`; }
                        else { badge = `<span class="badge read">已讀</span>`; }
                        
                        el.innerHTML = `${badge}<div class="item-title">收到《${escapeHtml(t.bookTitle)}》的心得</div><div class="item-time">${timeStr}</div>`;
                        el.onclick = () => openChat(t.letterId);
                        inboxList.appendChild(el);
                    }
                });

                hasUnrepliedLetters = pendingReplies;
                if (repliesCount === 0) repliesList.innerHTML = emptyUI;
                if (inboxCount === 0) inboxList.innerHTML = emptyUI;
            });
        }

        function renderTasks() {
            const grid = document.getElementById('task-grid');
            grid.innerHTML = '';
            if (!config) return;
            
            const start = new Date(config.startDate);
            const total = Math.floor(((new Date(config.endDate) - start) / 86400000) / config.intervalDays);

            db.ref('letters').orderByChild('senderUid').equalTo(currentUser.uid).once('value', snap => {
                const letters = snap.val() || {};
                const submitted = Object.values(letters).map(l => l.taskIndex);
                const map = {}; Object.values(letters).forEach(l => map[l.taskIndex] = l.id);

                for (let i = 0; i < total; i++) {
                    const d = new Date(start.getTime() + i * config.intervalDays * 86400000);
                    const unlocked = new Date() >= d;
                    const done = submitted.includes(i);
                    
                    const el = document.createElement('div');
                    el.className = `task-card ${done ? 'completed' : ''} ${!unlocked && !done ? 'locked' : ''}`;
                    el.innerHTML = `<span class="task-num">第 ${i+1} 回</span><span class="task-date">${d.getMonth()+1}/${d.getDate()}</span>`;
                    
                    el.onclick = () => {
                        if (done) openChat(map[i]);
                        else if (unlocked) {
                            if (hasUnrepliedLetters) return alert("您有尚未回覆的來信，請先至「他人寄來的心得」回覆。");
                            selectedTaskIndex = i;
                            document.getElementById('task-title').innerText = `任務：第 ${i+1} 回`;
                            document.getElementById('write-editor').style.display = 'block';
                            document.getElementById('write-editor').scrollIntoView({behavior:'smooth'});
                        } else alert("任務尚未開放。");
                    };
                    grid.appendChild(el);
                }
            });
        }

        function submitLog() {
            const title = document.getElementById('book-title').value.trim();
            const text = document.getElementById('log-content').value.trim();
            if (!title || !text) return alert("請填寫書名與心得。");
            if (text.length < 150) return alert("心得最少需要 150 字。");
            playAnim('log', null, null, {title, text});
        }

        function openChat(id) {
            db.ref(`user_threads/${currentUser.uid}/${id}`).update({hasUnread: false});
            db.ref(`letters/${id}`).once('value', lSnap => {
                const l = lSnap.val(); if (!l) return;
                
                document.getElementById('modal-title').innerText = `《${l.bookTitle}》`;
                const flow = document.getElementById('chat-flow');
                const partnerUid = currentUser.uid === l.senderUid ? l.recipientUid : l.senderUid;

                document.getElementById('btn-send-reply').onclick = () => {
                    const txt = document.getElementById('reply-text').value.trim();
                    if (!txt) return alert("請填寫回覆。");
                    if (txt.length < 100) return alert("回覆最少需要 100 字。");
                    playAnim('reply', id, partnerUid, txt);
                };

                if (currentChatRef) currentChatRef.off();
                currentChatRef = db.ref(`conversations/${id}`);
                currentChatRef.on('value', cSnap => {
                    flow.innerHTML = '';
                    const chats = cSnap.val() || {};
                    Object.values(chats).forEach(m => {
                        const isMe = m.senderUid === currentUser.uid;
                        const d = new Date(m.timestamp);
                        const tStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                        flow.innerHTML += `
                            <div class="msg ${isMe ? 'msg-self' : 'msg-other'}">
                                <div class="msg-info">${isMe ? '我' : '對方'} · ${tStr}</div>
                                <div style="white-space:pre-wrap;">${escapeHtml(m.text)}</div>
                            </div>
                        `;
                    });
                    flow.scrollTop = flow.scrollHeight;
                });

                document.getElementById('modal').style.display = 'flex';
                gsap.fromTo("#modal-content", {y: 30, opacity: 0}, {y: 0, opacity: 1, duration: 0.3});
            });
        }

        function closeModal() {
            if (currentChatRef) { currentChatRef.off(); currentChatRef = null; }
            gsap.to("#modal-content", {y: 30, opacity: 0, duration: 0.2, onComplete: () => {
                document.getElementById('modal').style.display = 'none';
            }});
        }

        function playAnim(type, letterId, partnerUid, data) {
            const overlay = document.getElementById('anim-overlay');
            overlay.style.display = 'flex';
            
            gsap.set(".env-wrapper", {y: 0, scale: 1, opacity: 1});
            gsap.set("#anim-paper", {y: -100, zIndex: 5});
            gsap.set("#anim-ptop", {rotateX: 0});
            gsap.set("#anim-pbot", {rotateX: 0});
            gsap.set("#anim-flap", {rotateX: 180, zIndex: 4});
            gsap.set("#anim-seal", {scale: 0});

            const tl = gsap.timeline();
            tl.to("#anim-pbot", {rotateX: 179, duration: 0.4, ease: "power2.inOut"})
              .to("#anim-ptop", {rotateX: -179, duration: 0.4, ease: "power2.inOut"}, "-=0.2")
              .to("#anim-paper", {y: 60, duration: 0.4, ease: "power2.in"})
              .set("#anim-flap", {zIndex: 15})
              .to("#anim-flap", {rotateX: 0, duration: 0.4})
              .to("#anim-seal", {scale: 1, duration: 0.3, ease: "back.out(1.5)"})
              .to(".env-wrapper", {y: -300, scale: 0.7, opacity: 0, duration: 0.5, delay: 0.3, onComplete: () => {
                  overlay.style.display = 'none';
                  if (type === 'log') processLog(data);
                  else processReply(letterId, partnerUid, data);
              }});
        }

        function processLog(data) {
            const ts = firebase.database.ServerValue.TIMESTAMP;
            const ref = db.ref('letters').push();
            db.ref('users').once('value', snap => {
                const uids = Object.keys(snap.val() || {}).filter(u => u !== currentUser.uid);
                const rec = uids.length ? uids[Math.floor(Math.random() * uids.length)] : "";
                
                ref.set({ id: ref.key, senderUid: currentUser.uid, bookTitle: data.title, reflections: data.text, timestamp: ts, taskIndex: selectedTaskIndex, recipientUid: rec }).then(() => {
                    db.ref(`user_threads/${currentUser.uid}/${ref.key}`).set({ letterId: ref.key, bookTitle: data.title, isSender: true, hasUnread: false, lastUpdated: ts });
                    if (rec) db.ref(`user_threads/${rec}/${ref.key}`).set({ letterId: ref.key, bookTitle: data.title, isSender: false, hasUnread: true, hasReplied: false, lastUpdated: ts });
                    else db.ref(`unassigned_letters/${ref.key}`).set({ senderUid: currentUser.uid });
                    
                    db.ref(`conversations/${ref.key}`).push({ senderUid: currentUser.uid, text: data.text, timestamp: ts });
                    document.getElementById('book-title').value = ''; document.getElementById('log-content').value = '';
                    document.getElementById('write-editor').style.display = 'none';
                    renderTasks(); switchTab('tab-replies', document.querySelector('.tab-btn'));
                });
            });
        }

        function processReply(id, pUid, text) {
            const ts = firebase.database.ServerValue.TIMESTAMP;
            db.ref(`conversations/${id}`).push({ senderUid: currentUser.uid, text, timestamp: ts }).then(() => {
                if (pUid) db.ref(`user_threads/${pUid}/${id}`).update({ hasUnread: true, lastUpdated: ts });
                db.ref(`user_threads/${currentUser.uid}/${id}`).update({ hasUnread: false, hasReplied: true, lastUpdated: ts });
                document.getElementById('reply-text').value = ''; closeModal();
            });
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active'); document.getElementById(id).classList.add('active');
        }

        function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    </script>
</body>
</html>
